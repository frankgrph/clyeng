    // 巴士/小巴一旦真正離開總站，總站嗰邊嘅「即將到站」清單就唔會再列出
    // 佢（呢啲 API 淨係顯示「未來將到」，唔會保留「啱啱開出」嘅歷史記錄），
    // 所以呢個檢查對於「真正已經開出」嘅班次幾乎必然搵唔到脗合，反而會將
    // 大量正常、已經開出嘅班次誤判做「未經總站確認」而降級，帶嚟反效果。
    // 而家改返用上游 ETA API（hk-bus-eta）本身喺 rmk 入面標示嘅「預定/原定/
    // scheduled」字眼嚟判斷呢個班次係咪淨係按時刻表推算、未必已經真正開出，
    // 呢個先係現有 API 提供、真正可靠嘅信號。
    for (let e of etasBoard) {
      const isScheduled = e.isFallback || 
        String(e.rmk || "").toLowerCase().includes("預定") || 
        String(e.rmk || "").toLowerCase().includes("原定") || 
        String(e.rmk || "").toLowerCase().includes("scheduled");
      
      let boardCoIdx = seg.boardIdx;
      if (e._resolvedCo !== seg.primaryCo) {
        const equivIdx = findEquivalentStopIdx(r, e._resolvedCo, seg.boardStopId);
        if (equivIdx >= 0) boardCoIdx = equivIdx;
      }

      if (isScheduled && boardCoIdx > 0) {
        const stops = r.stops[e._resolvedCo] || r.stops[r.primaryCo];
        let mins = await getBaselineSegmentMinutes(e._resolvedCo, r.route, stops, 0, boardCoIdx, e.etaDate);
        if (mins === null) {
          mins = estimateSegmentDuration(r, e._resolvedCo, 0, boardCoIdx, e.etaDate);
        }
        e.etaDate = new Date(e.etaDate.getTime() + Math.round(mins) * 60000);
        e.isTerminusAdjusted = true;
      }
    }
    etasBoard.sort((a,b) => a.etaDate - b.etaDate);

    let etasAlight = [];
    const alightPromises = seg.companies.map(co => {
      let alightCoIdx = seg.alightIdx;
      if (co !== seg.primaryCo) {
        const equivIdx = findEquivalentStopIdx(r, co, seg.alightStopId);
        if (equivIdx >= 0) alightCoIdx = equivIdx;
      }
      return getEtasCached(seg.routeId, r, co, alightCoIdx);
    });
    const alightResults = await Promise.all(alightPromises);
    alightResults.forEach((list, index) => {
      const co = seg.companies[index];
      list.forEach(e => { etasAlight.push({...e, _resolvedCo: co}); });
    });
    etasAlight.sort((a,b) => a.etaDate - b.etaDate);

    // === 下車站點預定時間 ===
    for (let e of etasAlight) {
      const isScheduled = e.isFallback || 
        String(e.rmk || "").toLowerCase().includes("預定") || 
        String(e.rmk || "").toLowerCase().includes("原定") || 
        String(e.rmk || "").toLowerCase().includes("scheduled");
      
      let alightCoIdx = seg.alightIdx;
      if (e._resolvedCo !== seg.primaryCo) {
        const equivIdx = findEquivalentStopIdx(r, e._resolvedCo, seg.alightStopId);
        if (equivIdx >= 0) alightCoIdx = equivIdx;
      }

      if (isScheduled && alightCoIdx > 0) {
        const stops = r.stops[e._resolvedCo] || r.stops[r.primaryCo];
        let mins = await getBaselineSegmentMinutes(e._resolvedCo, r.route, stops, 0, alightCoIdx, e.etaDate);
        if (mins === null) {
          mins = estimateSegmentDuration(r, e._resolvedCo, 0, alightCoIdx, e.etaDate);
        }
        e.etaDate = new Date(e.etaDate.getTime() + Math.round(mins) * 60000);
        e.isTerminusAdjusted = true;
      }
    }
    etasAlight.sort((a,b) => a.etaDate - b.etaDate);

    let validDepEtas = etasBoard.filter(e => e.etaDate >= new Date(currentTime.getTime() - 60000)).slice(0, 5);

    if (validDepEtas.length === 0) {
      // 明確用「鄰近兩小時」窗口（前後對稱）交叉比對 GTFS stop_times/frequencies/calendar，
      // 咁樣搵到嘅唔止未來班次，仲有過去兩小時內嘅班次，用嚟輔助判斷條路線今日係咪其實
      // 仲有服務（只係暫時喺兩班車之間嘅空檔），減少誤判「尾班車已經開出」。
      const NEARBY_WINDOW_MIN = 260;
      const staticSchedule = await getStopArrivalScheduleList(seg.primaryCo, r.route, seg.boardStopId, currentTime, NEARBY_WINDOW_MIN);
      const futureTrips = staticSchedule.found
        ? staticSchedule.all
            .filter(t => t.etaDate >= new Date(currentTime.getTime() - 30000))
            // 【修正幽靈班次】就算 GTFS 靜態排班表話搵到「預定」班次，都要
            // 經返呢個常識檢查——通宵線唔應該出現喺日頭，日間線唔應該
            // 出現喺凌晨。呢個信號比純粹「搵到 trip_id」更貼近實際，可以
            // 擋住個別因為爬蟲 calendar/service_id 對錯日子而生成嘅假班次。
            .filter(t => isPlausibleServiceHour(r.route, t.etaDate))
        : [];
      const recentPastTrips = staticSchedule.found
        ? staticSchedule.all.filter(t => t.etaDate < new Date(currentTime.getTime() - 30000))
        : [];

      if (staticSchedule.found && futureTrips.length > 0) {
        for (const t of futureTrips.slice(0, 5)) {
          validDepEtas.push({
            etaDate: t.etaDate,
            _resolvedCo: seg.primaryCo,
            isFallback: true,
            isGeneric: false,
            rmk: "預定",
            _tripId: t.tripId
          });
        }
      } else {
        const headwayResult = await isRouteCurrentlyInService(seg.primaryCo, seg.r.route, currentTime);
        const isFirstRide = (rideCount === 0);

        let activeFromEarlierStops = false;
        if (seg.boardIdx > 0) {
           try {
               const originEtas = await getEtasCached(seg.routeId, r, seg.primaryCo, 0);
               // 【修正時光倒流】必須用 currentTime（呢一程實際上車嗰一刻，已計及
               // 之前所有程數嘅到達時間）嚟篩總站班次，唔可以用 now（成個搜尋開始
               // 時嘅原始時間）。用 now 會漏咗啲相對 now 嚟講「未來」但相對
               // currentTime（上一程實際到達之後）嚟講其實已經開走嘅班次，推算出
               // 嘅上車時間就會早過上一程到達時間，變成「未到就已經上到車」。
               const futureOriginEtas = (originEtas || []).filter(e => e.etaDate >= new Date(currentTime.getTime() - 30000));
               if (futureOriginEtas.length > 0) {
                   activeFromEarlierStops = true;

                   // 【新增：分站無自己 ETA 時，用總站實時時間推算，唔淨係做布林旗標】
                   // 以往呢度搵到「總站有實時 ETA」就淨係set一個 activeFromEarlierStops=true
                   // 嘅布林值，用嚟豁免下面 headwayResult===false 嘅嚴格判斷，但完全冇
                   // 攞總站嗰個實際開出時間去用——結果呢一程仍然要跌落去用粗略嘅
                   // scheduleFallback／r.freq 班距估算，甚至因為冇 GTFS 靜態資料而
                   // 直接 return null。呢正正就係「A28 呢類分站冇獨立 ETA 上報嘅路線，
                   // 搜尋明明搵到 402 米嘅上車站候選，最終卻只有行去總站嗰個版本先
                   // 計得出結果」嘅根本原因：唔係搵唔到候選站，而係候選站計唔到有效
                   // 到站時間，喺 evaluateCandidate() 呢一步就靜靜雞被淘汰。
                   // 而家改為直接用返總站嘅真實開出時間，加返總站到呢個分站嘅
                   // 估算車程（同 4007-4028 行「isScheduled」分站時間校正用嘅
                   // 一套機制），推算一個貼近事實嘅到站時間，等呢個分站候選有
                   // 機會同總站候選公平competing，而唔係一開始就冇資格入圍。
                   const stops0 = r.stops[seg.primaryCo] || r.stops[r.primaryCo];
                   for (const oe of futureOriginEtas.slice(0, 5)) {
                       let segMins = await getBaselineSegmentMinutes(seg.primaryCo, r.route, stops0, 0, seg.boardIdx, oe.etaDate);
                       if (segMins === null) {
                           segMins = estimateSegmentDuration(r, seg.primaryCo, 0, seg.boardIdx, oe.etaDate);
                       }
                       if (Number.isFinite(segMins)) {
                           validDepEtas.push({
                               etaDate: new Date(oe.etaDate.getTime() + Math.round(segMins) * 60000),
                               _resolvedCo: seg.primaryCo,
                               isFallback: true,
                               isTerminusAdjusted: true,
                               isGeneric: false,
                               rmk: "預定"
                           });
                       }
                   }
                   if (validDepEtas.length > 0) {
                       validDepEtas.sort((a,b) => a.etaDate - b.etaDate);
                   }
               }
           } catch (err) {}
        }

        // GTFS 鄰近兩小時窗口內若曾經有班次（哪怕已經係過去），代表條路線今日確實仲有服務，
        // 只係啱啱好搭唔到跟腳嗰班，唔應該即刻當「完全冇服務」咁武斷咁判失敗。
        const hasNearbyGtfsEvidence = recentPastTrips.length > 0;

        // 【新增】如果上面已經靠總站實時 ETA＋分站車程估算，成功推算出
        // validDepEtas，就冇必要再落去用更粗略嘅 headwayResult／scheduleFallback／
        // r.freq 兜底估算——嗰套機制本身係為咗「完全冇任何實時線索」嘅情況先
        // 設計，總站實時時間推算出嚟嘅結果遠比佢哋準確，亦唔應該被下面任何
        // return null 判走。
        if (validDepEtas.length === 0) {

        // 上一版曾經改成 relaxed 模式先兜底估算，但呢個做法會喺 GTFS
        // 明確話「今日冇服務」嘅路線度都砌一個「預計」班次出嚟，令搜尋結果出現
        // 大量唔存在嘅假班次（用戶反映嘅 4 轉車、成程都係「預計班次(預計)」嘅組合）。
        // 呢個係關乎「準確性」嘅底線，寧願搵少啲結果都唔應該報大話班次，所以
        // 一般搜尋（beam search）呢度預設做無條件 return null：搵唔到組合嘅問題
        // 應該喺 runBeamSearch 果邊，透過放寬直線距離／繞路容忍度，等佢有機會
        // 搵到市區／轉車站等其他真正有服務嘅轉乘路徑，而唔係靠呢度作大話。
        // 【修正】headwayResult===false 係 GTFS frequencies/stop_times 對「呢一個
        // 確實時刻」嘅判斷，可信，但唔等於「今日完全冇服務」——佢淨係話「GTFS
        // 時刻表冚唔到呢一刻」，好多時候只係時刻表資料本身有缺口／粒度唔夠細
        // （尤其係小巴路線，例如 107P 呢類），而唔係嗰程車真係唔存在。喺一般
        // 搜尋（beam search）入面，因為仲有大把其他候選路線／轉車點可以頂替，
        // 直接摒棄呢個組合冇問題；但自選行程係用戶自己揀好晒每一程嘅路線同
        // 上落車站，一旦第一程之後（rideCount > 0，即次程）嘅某一程行到呢度就
        // return null，成個組合就即刻報「無法計算」，完全冇第二個候選可以
        // 頂替——呢個正正係用戶反映「次程未有完全嘅落車 ETA，成個組合就計唔到」
        // 嘅根本原因。
        // 所以：自選行程嘅次程（treatSecondaryLegsRelaxed && rideCount > 0），
        // 唔再淨係因為 headwayResult===false 呢一個較弱信號就一刀切令成程
        // 失敗，而係跟返「搜尋模式」原本已有嘅做法——落去用 timeIntervalDb／
        // scheduleFallback 等同一套嘅估算機制（見下面 estimateSegmentDuration／
        // sumTimeIntervalSeconds）推算返合理嘅車程，避免顯示「無法計算」。
        // 但更強、更確切嘅信號依然要尊重、唔會被呢個放寬影響：
        //   - svcActiveToday === false（GTFS calendar 明確話今日完全冇服務）
        //   - pastLastKnownTrip（靜態排班表證明咗尾班車確實已經開出）
        // 呢兩個信號喺落面仍然會照舊令組合失敗，唔會因為係自選行程次程就
        // 假扮有車。
        const isCustomSecondaryLeg = treatSecondaryLegsRelaxed && rideCount > 0;

        // 【一般搜尋模式全程 freq 核實寬鬆】用戶反映：明明有直達車（例如
        // 6C／102 美孚 直達 衛理道），但因為第一程（rideCount === 0）冇
        // 即時 ETA 就被上面 headwayResult===false 嘅嚴格檢查直接判死，
        // 令成個直達方案完全消失，搜尋結果反而剩低一啲要轉車嘅方案。
        // 呢個問題原本只喺次程（rideCount > 0）先有寬鬆處理，而家擴展到
        // 第一程都可以用同一套核實機制：用 isRouteActiveAroundTime()
        // 核實返 r.freq 官方班次表本身係否認為呢個上車站、呢一刻（未來
        // 一小時窗口內）應該有服務——
        //   - 核實到「有」→ 當呢程寬鬆處理，落去用 scheduleFallback／
        //     estimateSegmentDuration 推算合理車程，唔會因為單一嘅實時
        //     ETA 缺口就令一條確實存在嘅直達路線完全消失。
        //   - 核實到「冇」→ 維持原有嚴格檢查，唔會靠估估一程根本唔存在
        //     嘅車。
        const freqVerifiedThisLeg = !isCustomSecondaryLeg &&
          isRouteActiveAroundTime(r, currentTime, seg.boardStopId, 60);
        const isRelaxableSecondaryLeg = isCustomSecondaryLeg || freqVerifiedThisLeg;

        if (headwayResult === false && !activeFromEarlierStops && !hasNearbyGtfsEvidence && !isRelaxableSecondaryLeg) {
          if (DEBUG_MODE) console.log(`[候選被淘汰] 路線=${r.route} co=${seg.primaryCo} 上車站=${stopName(seg.boardStopId)} 原因=headwayResult false 且冇 activeFromEarlierStops/hasNearbyGtfsEvidence/isRelaxableSecondaryLeg`);
          return null;
        }

        // 【修正幽靈班次】GTFS 靜態排班表（stop_times.txt／frequencies.txt）
        // 如果對呢條路線係「有實際記錄」（staticSchedule.found），但喺鄰近
        // 窗口入面已經搵唔到任何未來班次（futureTrips 得返 0 個），而過去
        // 窗口入面確實搵到過班次（recentPastTrips > 0）——即係話呢個唔係
        // 「冇資料判斷唔到」，而係「有實際排班表證明尾班車已經過咗」，
        // 例如通宵線去到清晨、尾班車已經開出。呢個係最直接可信嘅信號，
        // scheduleFallback() 淨係靠 r.freq 粗略班距表估算（好多通宵線根本
        // 冇 freq 資料，就會不分青紅皂白噏「+35分鐘」呢個保底估算），
        // 唔應該喺已經有實際證據話「冇下一班」嘅情況下，仲砌多個假嘅
        // 「推算」班次出嚟。
        const pastLastKnownTripNarrowWindow = staticSchedule.found && futureTrips.length === 0 && recentPastTrips.length > 0;

        // 【修正稀疏班次（例如全日得一班）嘅尾班車誤判】上面嘅
        // pastLastKnownTripNarrowWindow 淨係睇 getStopArrivalScheduleList()
        // 嗰個 ±windowMinutes（通常 ±130 分鐘左右）窗口入面嘅紀錄。如果
        // 條路線好似 798P 咁全日淨係朝早一班，而家已經係下晝，該班次
        // 早已跌出窗口範圍之外，窗口入面就乜都搵唔到（futureTrips 同
        // recentPastTrips 都係空），令 pastLastKnownTripNarrowWindow
        // 錯誤咁維持 false，跌落去俾 scheduleFallback 用粗略 freq 估算
        // 砌一個唔存在嘅「推算班次」出嚟。呢度加多一重唔受窗口限制、
        // 掃描「今日成日」嘅檢查（見 hasAnyRemainingTripToday()），只要
        // 佢明確答到「今日搵到過班次紀錄，但全部都已經開出」，就當尾班車
        // 已開，唔理會窄窗口嗰邊嘅結果。
        let pastLastKnownTrip = pastLastKnownTripNarrowWindow;
        if (!pastLastKnownTrip) {
          const wholeDayStatus = await hasAnyRemainingTripToday(seg.primaryCo, r.route, seg.boardStopId, currentTime);
          if (wholeDayStatus === false) {
            pastLastKnownTrip = true;
            if (DEBUG_MODE) console.log(`[尾班車判定] 路線=${r.route} co=${seg.primaryCo} 上車站=${stopName(seg.boardStopId)}：窄窗口搵唔到紀錄，但全日掃描證實尾班車已開出`);
          }
        }

        // 無論係咪 segRelaxed，用嚟兜底嘅「預計」班次都必須先經 GTFS calendar
        // (calendar.txt / calendar_dates.txt) 確認條路線今日真係有服務，先至
        // 畀 scheduleFallback／落面嘅粗略估算生效，避免喺「今日完全冇服務」
        // 嘅路線度都推算一個唔存在嘅班次出嚟。
        const svcActiveToday = await isServiceActiveForRouteOnDate(seg.primaryCo, r.route, currentTime);

        let fallbackTime = (pastLastKnownTrip && !isRelaxableSecondaryLeg) ? null : scheduleFallback(r, currentTime, isCandidateLongHaul);
        if (fallbackTime) {
          // 【改善 GTFS 服務檢查】scheduleFallback 淨係靠 r.freq 嗰個粗略嘅
          // 「平日/星期六/星期日」班距表推算，冇比對 calendar.txt /
          // calendar_dates.txt 嘅實際服務例外（例如當日路線暫停服務、
          // 公眾假期特別更改），有機會喺條路線今日根本冇服務嘅情況下，
          // 都砌一個「預計」班次出嚟。所以呢度先額外用返 calendar 資料
          // 做多一重確認，只有喺明確判定「今日冇服務」（=== false）先
          // 捨棄呢個推算班次；如果冇足夠資料判斷（null）就維持原有寬鬆
          // 處理，唔會過度剪走結果。
          // 【再修正】isRelaxableSecondaryLeg（自選行程嘅次程，或者一般
          // 搜尋入面經 freq 核實過現時日子類型＋時段確實有服務嘅次程）
          // 例外：都唔應該即刻令成個組合完全顯示唔到——寧願繼續用返
          // scheduleFallback 呢個 GTFS 班距推算出嚟嘅「預計」時間，都好過
          // 乜都冇。
          if (svcActiveToday === false && !isRelaxableSecondaryLeg) {
            fallbackTime = null;
          }
        }
        if (fallbackTime) {
          validDepEtas.push({
            etaDate: fallbackTime,
            _resolvedCo: seg.primaryCo,
            isFallback: true,
            isGeneric: true,
            rmk: "預計"
          });
        } else {
          if (!segRelaxed && !isRelaxableSecondaryLeg) {
            if (DEBUG_MODE) console.log(`[候選被淘汰] 路線=${r.route} co=${seg.primaryCo} 上車站=${stopName(seg.boardStopId)} 原因=fallbackTime 為 null 且 !segRelaxed && !isRelaxableSecondaryLeg`);
            return null;
          }
          // 【指定時間出發／自選行程第一程之後嘅車程／一般搜尋經 freq 核實
          // 過寬鬆嘅次程，共用嘅最後一重兜底估算】呢度已經冇 scheduleFallback
          // 嘅具體班次時間，純粹靠粗略 headway 估算，所以更加要 respect GTFS
          // calendar 嘅「今日冇服務」判斷，否則喺明確冇服務嘅日子都會生成一個
          // 假嘅「預計」班次。
          // 【再修正】isRelaxableSecondaryLeg——自選行程嘅次程，或者一般搜尋
          // 入面經 isRouteActiveAroundTime() 核實過現時日子類型＋時段確實應該
          // 有服務嘅次程：即使連呢一重都冇具體證據（既冇 scheduleFallback 嘅
          // 班次時間，GTFS calendar 又話今日冇服務，或者排班表話尾班車已經
          // 開出），都唔再 return null 令成程完全計唔到，而係進入寬鬆模式，用
          // 貼近現時時段嘅 r.freq 班距估算一個「預計」開車時間頂住，車程時間
          // 就交返落面嘅 estimateSegmentDuration（連埋 timeIntervalDb 逐站
          // 觀測秒數）去估算，確保次程一定計得到，避免顯示「無法計算」。一般
          // 搜尋（beam search）同自選行程第一程唔受呢個放寬影響，依然照舊
          // 尊重呢兩個信號。
          if (!isRelaxableSecondaryLeg) {
            if (svcActiveToday === false) {
              if (DEBUG_MODE) console.log(`[候選被淘汰] 路線=${r.route} co=${seg.primaryCo} 上車站=${stopName(seg.boardStopId)} 原因=svcActiveToday===false（GTFS calendar 話今日冇服務）`);
              return null;
            }
            if (pastLastKnownTrip) {
              if (DEBUG_MODE) console.log(`[候選被淘汰] 路線=${r.route} co=${seg.primaryCo} 上車站=${stopName(seg.boardStopId)} 原因=pastLastKnownTrip（尾班車已開出）`);
              return null;
            }
          }

          // 【以 freq 估算等候時間】以往呢度盲目攞 r.freq 第一個日子類型／第一個
          // 時段嘅班距數字，同「而家係邊個日子類型、邊個時段」完全冇關係，估算
          // 出嚟嘅等候時間好易同現實脫節。而家改用同 isRouteActiveAroundTime／
          // scheduleFallback 一致嘅日子類型（平日／星期六／星期日及假日）＋
          // 時段區間匹配邏輯，搵返「現時呢一刻」真正落喺邊一個 freq 時段，先用
          // 嗰個時段嘅班距數字；搵唔到先退返用嗰個日子類型入面最疏嘅班距做保底
          // （寧願等耐啲都好過完全冇預計）。
          let waitMin = 20;
          if (r.freq) {
            const dayKey = _resolveFreqDayTypeKey(r.freq, currentTime);
            const table = dayKey ? r.freq[dayKey] : null;
            if (table) {
              const times = Object.keys(table).sort((a, b) => to30HMinutes(a, currentTime) - to30HMinutes(b, currentTime));
              const nowMins = to30HMinutes(currentTime);
              let matchedEntry = null;
              for (let i = 0; i < times.length; i++) {
                const key = times[i];
                const nextKey = i < times.length - 1 ? times[i + 1] : null;
                const { start: tMins, end: tEndMins } = getIntervalRange(key, currentTime, nextKey);
                if (nowMins >= tMins && nowMins < tEndMins) { matchedEntry = table[key]; break; }
              }
              if (matchedEntry == null) {
                // 搵唔到現時適用時段（例如已經過咗最後一個時段），保守噏最疏
                // 果個時段嘅班距做保底估算。
                const allMins = times.map(k => _freqEntryToMinutes(table[k])).filter(m => m !== null);
                if (allMins.length) waitMin = Math.max(...allMins);
              } else {
                const mins = _freqEntryToMinutes(matchedEntry);
                if (mins !== null) waitMin = mins;
              }
            }
          }
          validDepEtas.push({
            etaDate: new Date(currentTime.getTime() + waitMin * 60000),
            _resolvedCo: seg.primaryCo,
            isFallback: true,
            isGeneric: true,
            rmk: "預計"
          });
        }
        } // 閂 if (validDepEtas.length === 0) —— 總站推算已成功就跳過呢一大段兜底
      }
    }

    const branches = [];
    for (const dep of validDepEtas) {
      let durationMins = null;

      // 【純 GTFS 排班 fallback】完全冇實時 ETA，靠 GTFS 靜態 trip 直接讀站到站時間
      if (dep._tripId && !dep.isGeneric) {
        durationMins = await getTripStopDurationByTripId(dep._tripId, seg.boardStopId, seg.alightStopId);
      }

      // 【第一優先／第二優先】起點有實時 ETA：優先嘗試完整起訖 ETA 直接相減（第一優先，
      // 且落車時間須喺查詢後一小時內），唔得先退返用 GTFS 校準比率估算（第二優先，
      // 並確認當日喺 calendar.txt 服務時間以內）。
      if (durationMins === null && !dep.isFallback) {
        durationMins = await calibrateDurationOneSidedGeneral(
          r, seg, dep._resolvedCo, dep, currentTime, etasAlight,
          async (from, to) => {
            const stops = r.stops[dep._resolvedCo] || r.stops[r.primaryCo];
            const baseline = await getBaselineSegmentMinutes(dep._resolvedCo, r.route, stops, from, to, dep.etaDate);
            if (baseline !== null) return baseline;
            return estimateSegmentDuration(r, dep._resolvedCo, from, to, dep.etaDate);
          },
          now
        );
      }

      if (durationMins === null) {
        const stops = r.stops[dep._resolvedCo] || r.stops[r.primaryCo];
        durationMins = await getBaselineSegmentMinutes(dep._resolvedCo, r.route, stops, seg.boardIdx, seg.alightIdx, dep.etaDate);
        if (durationMins === null) {
          durationMins = estimateSegmentDuration(r, dep._resolvedCo, seg.boardIdx, seg.alightIdx, dep.etaDate);
        }
      }
      // 無論以上邊個估算方式，若最終唔係有限數字（例如 NaN／Infinity），
      // 一律 fallback 用最基本嘅啟發式估算，確保一定計到到站時間，唔會令結果顯示 --:--
      if (!Number.isFinite(durationMins)) {
        durationMins = estimateSegmentDuration(r, dep._resolvedCo, seg.boardIdx, seg.alightIdx, dep.etaDate);
      }

      const alightTime = new Date(dep.etaDate.getTime() + durationMins * 60000);
      const fare = getSegFare(r, dep._resolvedCo, seg.boardIdx, seg.alightIdx, dep.etaDate);
      
      const newLegs = pathLegs.slice();
      newLegs.push({
        type: "ride",
        routeId: seg.routeId,
        routeNo: r.route,
        co: dep._resolvedCo,
        r,
        boardStopId: seg.boardStopId,
        alightStopId: seg.alightStopId,
        departTime: dep.etaDate,
        arriveTime: alightTime,
        rmk: dep.rmk,
        isSpeculative: dep.isFallback,
        fare
      });

      const res = await dfs(segIdx + 1, alightTime, newLegs, rideCount + 1);
      if (res) branches.push(res);
    }

    if (branches.length === 0) return null;
    branches.sort((a,b) => a.arriveTime - b.arriveTime);
    return branches[0];
  }

  const initialTime = now;
  let finalResult = await dfs(0, initialTime, [], 0);
  
  // 【修正】以往呢度重試時冇真正將 relaxed 開關切換做 true，dfs() 入面所有
  // `if (!relaxed) return null;` 判斷都仲然生效，令呢個「放寬重試」形同虛設 ——
  // 完全冇真實班次／GTFS 靜態班次資料嘅組合（例如自選行程入面用戶自己揀嘅路線＋站，
  // 淨係得呢一個候選組合，冇其他候選可以頂替）就會直接失敗，搜尋唔到結果。
  // 而家重新賦值 relaxed 呢個參數，令 dfs() 閉包入面嘅判斷確實生效，
  // 容許用「粗略估算班次時間」嚟兜底，令組合仍然計到結果。
  if (!finalResult && !relaxed) {
    relaxed = true;
    finalResult = await dfs(0, initialTime, [], 0);
  }
  return finalResult;
}

// 利用 Geolocation API 獲取用戶位置並自動填入「起點」的按鈕邏輯
$("#gpsBtn").addEventListener("click", async () => {
  const gpsBtn = $("#gpsBtn");
  if (!navigator.geolocation) {
    alert("瀏覽器不支援 GPS 定位服務");
    return;
  }
  
  gpsBtn.disabled = true;
  gpsBtn.textContent = "定位中";
  
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      
      if (!etaDb) {
        gpsBtn.disabled = false;
        gpsBtn.textContent = "取用 GPS 為起點";
        alert("資料庫載入中，請稍後再試");
        return;
      }
      
      const near = nearbyStops(lat, lng, 600);
      if (!near.length) {
        gpsBtn.disabled = false;
        gpsBtn.textContent = "取用 GPS 為起點";
        alert("附近 600 米內找不到任何巴士站");
        return;
      }
      
      const closestStopId = near[0].stopId;
      const s = etaDb.stopList[closestStopId];
      // 以往呢度將 origin.lat/lng 都覆寫成「最近巴士站」嘅座標，
      // 導致 runBeamSearch 入面第一個 originAlts（{stopId, dist:0}）永遠假設用戶已經企喺
      // 嗰個站，完全冇補返「由用戶實際 GPS 位置，步行去嗰個上車站」呢一段步行時間／距離。
      // 而家保留返用戶嘅真實 GPS 經緯度，並唔再帶 stopId（等 runBeamSearch 用
      // nearbyStops() 對所有候選車站，計返準確嘅步行距離同時間，包括最近嗰個站）。
      origin = { stopId: null, name: "📍 我的位置 (近" + (s.name.zh || s.name.en) + ")", lat: lat, lng: lng };
      originInput.value = "📍 我的位置 (近" + (s.name.zh || s.name.en) + ")";
      
      gpsBtn.disabled = false;
      gpsBtn.textContent = "定位成功";
      setTimeout(() => {
        gpsBtn.textContent = "取用 GPS 為起點";
      }, 3000);
    },
    (err) => {
      console.error(err);
      gpsBtn.disabled = false;
      gpsBtn.textContent = "取用 GPS 為起點";
      alert("請確保已開啟瀏覽器 GPS 權限");
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
});

searchBtn.addEventListener("click", async () => {
  if (!origin || !destination) {
    statusLine.textContent = "請先輸入並選擇起點同終點巴士站";
    statusLine.classList.add("err");
    return;
  }
  if (origin.stopId && origin.stopId === destination.stopId) {
    statusLine.textContent = "起點同終點不能為同一站";
    statusLine.classList.add("err");
    return;
  }

  statusLine.textContent = "";
  statusLine.classList.remove("err");
  searchBtn.disabled = true;
  searchBtn.textContent = "計算路線中";
  resultsWrap.innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      正在搜尋班次
    </div>
  `;

  try {
    etaCache.clear();
    const startTime = useSpecifiedTime ? new Date(customTimeInput.value) : new Date();
    
    const candidates = await runBeamSearch(origin, destination, new Set(), startTime);
    
    if (!candidates.length) {
      resultsWrap.innerHTML = `<div class="empty-state">搵唔到可行嘅行程組合，或超出步行搜尋限制</div>`;
      searchBtn.disabled = false;
      searchBtn.textContent = "搜尋行程";
      return;
    }

    const evaluated = [];
    const step = 15;
    for (let i = 0; i < candidates.length; i += step) {
      const chunk = candidates.slice(i, i + step);
      // 指定時間出發時，未來時段未必有實時 ETA 資料，改用寬鬆模式，
      // 靠 GTFS calendar／班次表推算該時段是否有服務，避免因為冇實時
      // 數據就將成條路線判失敗。
      const chunkRes = await Promise.all(chunk.map(c => evaluateCandidate(c, startTime, useSpecifiedTime)));
      chunkRes.forEach(r => { if (r) evaluated.push(r); });
      if (evaluated.length >= 25) break; 
    }

    if (!evaluated.length) {
      resultsWrap.innerHTML = `<div class="empty-state">目前無實時班次，或該時段路線皆已停駛。</div>`;
      searchBtn.disabled = false;
      searchBtn.textContent = "搜尋行程";
      return;
    }

    const uniquePlans = [];
    const seenPlanKeys = new Set();
    for (const plan of evaluated) {
      const planKey = plan.legs.map(l => l.type === "ride" ? l.routeId + "@" + l.boardStopId : "walk").join("->");
      if (!seenPlanKeys.has(planKey)) {
        seenPlanKeys.add(planKey);
        uniquePlans.push(plan);
      }
    }

    lastResults = pruneDominatedPlans(uniquePlans);
    sortResults(lastResults);
    renderResults(lastResults.slice(0, RESULTS_TO_SHOW));

  } catch (err) {
    console.error(err);
    statusLine.textContent = "發生未知錯誤,請重試";
    statusLine.classList.add("err");
    resultsWrap.innerHTML = "";
  } finally {
    searchBtn.disabled = false;
    searchBtn.textContent = "搜尋行程";
  }
});

// 計算成個行程組合入面所有「步行」路段嘅總距離（米），用嚟喺到達時間／
// 轉車次數／車費都一樣嘅情況下，判斷邊個組合先至真係「行少啲」，
// 避免因為 candidates 陣列順序而隨機揀咗個要行多咗嘅版本。
function totalWalkDistM(plan){
  return (plan.legs || []).reduce((sum, l) => sum + (l.type === "walk" ? (l.distM || 0) : 0), 0);
}

function sortResults(results){
  const fareOf = p => typeof p.totalFare === "number" ? p.totalFare : Infinity;
  if (sortMode === "time") {
    // 最早到達模式：淨係比較實際到達時間，唔再加返轉車／跨公司轉車等人為懲罰分數
    // (嗰啲懲罰淨係喺搜尋階段用嚟揀路線，唔應該再影響最終「邊個最早到」嘅排序)，
    // 到達時間一樣先至用總車費做次要比較準則。
    results.sort((a,b) => {
      const timeDiff = a.arriveTime - b.arriveTime;
      if (timeDiff !== 0) return timeDiff;
      const fareDiff = fareOf(a) - fareOf(b);
      if (fareDiff !== 0) return fareDiff;
      // 到達時間、車費都一樣，先至比較邊個組合行少啲路（避免無謂步行嘅版本
      // 純粹因為順序關係排咗喺前面）。
      return totalWalkDistM(a) - totalWalkDistM(b);
    });
  } else if (sortMode === "fare") {
    // 車費模式：優先車費平嘅放最上，車費一樣先至比較邊個到達時間較早。
    results.sort((a,b) => {
      const fareDiff = fareOf(a) - fareOf(b);
      if (fareDiff !== 0) return fareDiff;
      return a.arriveTime - b.arriveTime;
    });
  } else if (sortMode === "transfers") {
    // 轉車最少模式：優先轉車次數少嘅放最上，轉車次數一樣先至比較總車費邊個平。
    results.sort((a,b) => {
      if (a.transfers !== b.transfers) return a.transfers - b.transfers;
      return fareOf(a) - fareOf(b);
    });
  }
}

// 剔除「被支配」嘅組合：如果另一個組合到達時間唔遲於佢、轉車次數唔多過佢、
// 車費都唔貴過佢、行嘅路都唔行多過佢，而且喺其中最少一項係實際上更好，
// 咁呢個組合就係無謂嘅——
// 例如搭緊 87D 途中提早落車再轉車，但其實坐同一班 87D 直達已經有得計到（且更快更平），
// 咁前者純粹製造多餘步行同轉車，應該過濾走，唔應該擺出嚟畀用戶揀。
// 【修正】以往呢度冇比較「總步行距離」，令兩個到達時間／轉車／車費完全
// 一樣，但其中一個要行多好多路先上到車嘅組合，都會一齊被視為「冇被支配」
// 而保留低嚟，最終邊個排先淨係靠陣列原有順序決定，令「明明起點附近已經
// 有得上車」嘅版本有機會被埋沒。而家加返步行距離做多一個判斷維度。
function pruneDominatedPlans(plans){
  return plans.filter(p => {
    const pWalk = totalWalkDistM(p);
    return !plans.some(q => {
      if (q === p) return false;
      const notLaterArrival = q.arriveTime <= p.arriveTime;
      const notMoreTransfers = q.transfers <= p.transfers;
      const qFare = typeof q.totalFare === "number" ? q.totalFare : null;
      const pFare = typeof p.totalFare === "number" ? p.totalFare : null;
      const notCostlier = (qFare === null || pFare === null) ? true : qFare <= pFare;
      const qWalk = totalWalkDistM(q);
      const notMoreWalk = qWalk <= pWalk;
      if (!notLaterArrival || !notMoreTransfers || !notCostlier || !notMoreWalk) return false;
      const strictlyBetter =
        q.arriveTime < p.arriveTime ||
        q.transfers < p.transfers ||
        (qFare !== null && pFare !== null && qFare < pFare) ||
        qWalk < pWalk;
      return strictlyBetter;
    });
  });
}

        const isInterchange = lIdx > 0 && lIdx < plan.legs.length - 1;
        legEl.innerHTML = `
          <div class="rail"><div class="dot"></div><div class="bar"></div></div>
          <div class="content">
            <div class="stopname">${escapeHtml(leg.fromName)}</div>
            <div class="walkbox">
              🚶 ${isInterchange ? "轉乘步行" : "步行"}約 ${fmtDist(leg.distM)} (約 ${leg.minutes} 分鐘)
            </div>
          </div>
        `;
      } else {
        legEl.className = "leg ride";
        const isLive = !leg.isSpeculative;
        const tagHtml = isLive 
          ? `<span class="live-tag">實時班次</span>`
          : `<span class="est-tag">推算班次</span>`;
        const fareHtml = typeof leg.fare === "number" ? `<span class="dur">$${leg.fare.toFixed(1)}</span>` : "";
        // 城巴 L1/L2 轉乘優惠：官方資料證實有折扣資格，但原始資料源冇提供
        // 實際 $ 金額，所以唔改動上面顯示嘅車費數字，淨係加個提示話俾
        // 用戶知實際拍卡應該平過現時顯示嘅價錢
        const ctbDiscountHint = leg.hasUnquantifiedCtbDiscount
          ? `<span class="ctb-discount-hint" title="城巴官方資料顯示呢程符合轉乘優惠資格，但未有提供實際扣減金額，實際車費以拍卡為準">符合城巴轉乘優惠</span>`
          : "";
        
        // 判斷是否為同名站點，若是則標註原站轉乘
        const prevLeg = lIdx > 0 ? plan.legs[lIdx-1] : null;
        const isSameStopTransfer = prevLeg && prevLeg.type === "walk" && prevLeg.distM === 0;
        const sameStopLabel = isSameStopTransfer ? `<span class="samestop"> 原站轉乘</span>` : "";

        legEl.innerHTML = `
          <div class="rail"><div class="dot"></div><div class="bar"></div></div>
          <div class="content">
            <div class="stopname">
              ${escapeHtml(stopName(leg.boardStopId))}${sameStopLabel}
              <span class="t">${fmtTime(leg.departTime)}</span>
            </div>
            <div class="ridebox">
              <span class="routeno ${leg.co}">${escapeHtml(leg.routeNo)}</span>
              往 ${escapeHtml(leg.r?.dest?.zh || "目的地")} 
              <span class="dur">(約 ${Math.round((leg.arriveTime - leg.departTime)/60000)} 分鐘)</span>
              ${fareHtml}
              ${tagHtml}
              ${ctbDiscountHint}
            </div>
            <div class="stopname" style="margin-top:4px;">
              ${escapeHtml(stopName(leg.alightStopId))}
              <span class="t">${fmtTime(leg.arriveTime)}</span>
            </div>
          </div>
        `;
      }
      
      if (lIdx === plan.legs.length - 1) {
        const bar = legEl.querySelector(".bar");
        if (bar) bar.style.display = "none";
      }
      
      legsContainer.appendChild(legEl);
    });

    resultsWrap.appendChild(card);
  });
}

const customLegsContainer = $("#customLegsContainer");
const addCustomLegBtn = $("#addCustomLegBtn");
const calcCustomBtn = $("#calcCustomBtn");
let customLegCount = 0;

function addCustomLeg() {

    </div>

      <div>
        <label style="font-size: 10px; font-weight: bold; color: var(--muted); display:block; margin-bottom: 4px;">上車車站</label>
        <select class="custom-board-select"><option value="">先輸入並選擇路線</option></select>

addCustomLegBtn.addEventListener("click", addCustomLeg);

// 城巴分支名稱（由已載入嘅 ctb_route_ids.json／ctbRouteIdsDb 提供）：同一路線
// ＋方向底下可能有多個服務分支（例如「正常路線」／「晨早班次，經金鐘」等），
// 單憑起訖點名稱完全睇唔出分支差異（見自選行程搜尋結果會出現多條睇落一樣
// 嘅 788 往中環），所以要額外查表攞返分支名稱顯示出嚟，方便用戶分辨清楚
// 揀啱班次。ctbRouteIdsDb 結構：{ [路線]: { [方向 O/I]: { variants: {
// [serviceType]: { longId: "序號||類型||路線分支碼||分支描述||內部完整ID||" } } } } }，
// 分支描述就係 longId 用 "||" 分隔後嘅第 4 個欄位（index 3）。
function getCtbVariantDesc(r) {
  if (!r || !ctbRouteIdsDb) return null;
  // 【修正冇顯示分支名】以往呢度假設 r.co／r.bound／r.serviceType 一定係
  // 「用公司代號做 key」嘅物件（例如 {ctb:"O"}），但 hk-bus-eta 對於只有
  // 一間公司經營嘅路線，呢幾個欄位有時會係直接一個字串（例如 "O"、"1"），
  // 唔一定包一層 {ctb: ...}。以往嘅寫法一撞到呢種形狀就會 return null，
  // 城巴嘅分支名完全顯示唔出嚕，即使 ctb_route_ids.json 明明有資料。
  // 而家改為兩種形狀都支援。
  const coList = r.co;
  const isCtb = Array.isArray(coList)
    ? coList.includes("ctb")
    : typeof coList === "string"
      ? coList.toLowerCase().includes("ctb")
      : false;
  if (!isCtb) return null;
  const routeKey = String(r.route || "").toUpperCase().trim();
  const boundsObj = ctbRouteIdsDb[routeKey];
  if (!boundsObj) return null;
  const rawBound = r.bound && typeof r.bound === "object" ? r.bound.ctb : r.bound;
  if (!rawBound) return null;
  const boundData = boundsObj[rawBound] || boundsObj[String(rawBound).toUpperCase()] || boundsObj[String(rawBound).toLowerCase()];
  if (!boundData || !boundData.variants) return null;
  const rawSvcType = r.serviceType && typeof r.serviceType === "object" ? r.serviceType.ctb : r.serviceType;
  if (!rawSvcType) return null;
  const svcKey = String(rawSvcType).trim();
  const variant = boundData.variants[svcKey] || boundData.variants[svcKey.replace(/^0+/, "")];
  if (!variant || !variant.longId) return null;
  const parts = String(variant.longId).split("||");
  const desc = parts[3] ? parts[3].trim() : "";
  return desc || null;
}

// 搜尋邏輯
function searchRoutes(query, limit = 10) {
  const q = query.trim().toUpperCase();
  if (!q || !etaDb || !etaDb.routeList) return [];
  
  const out = [];
  for (const [routeId, r] of Object.entries(etaDb.routeList)) {
    if (!r || !r.route) continue;
    
    const routeStr = String(r.route).toUpperCase();
    if (routeStr.includes(q)) {
      out.push({ 
        routeId, 
        route: r.route, 
        orig: r.orig?.zh || r.orig || "", 
        dest: r.dest?.zh || r.dest || "",
        ctbVariant: getCtbVariantDesc(r)
      });
    }
  }

  out.sort((a, b) => {
    const aRoute = String(a.route).toUpperCase();
    const bRoute = String(b.route).toUpperCase();
    
    const aExact = aRoute === q;
    const bExact = bRoute === q;
    if (aExact && !bExact) return -1;
    if (!aExact && bExact) return 1;
    
    const aStart = aRoute.startsWith(q);
    const bStart = bRoute.startsWith(q);
    if (aStart && !bStart) return -1;
    if (!aStart && bStart) return 1;
    
    if (aRoute.length !== bRoute.length) {
      return aRoute.length - bRoute.length;
    }
    
    return aRoute.localeCompare(bRoute, undefined, { numeric: true });
  });

  return out.slice(0, limit);
}

function wireCustomLegEvents(card) {
  const routeInput = card.querySelector(".custom-route-input");
  const routeSuggest = card.querySelector(".custom-route-suggest");
  const boardSelect = card.querySelector(".custom-board-select");
  const alightSelect = card.querySelector(".custom-alight-select");
  
  let selectedRoute = null;
  let debounce;
  
  function getCleanQuery(val) {
    let q = val.trim();
    const bracketIdx = q.indexOf(" (往");
    if (bracketIdx !== -1) {
      q = q.substring(0, bracketIdx);
    }
    return q;
  }
  
  routeInput.addEventListener("input", () => {
    clearTimeout(debounce);
    const cleanVal = getCleanQuery(routeInput.value);
    
    if (!cleanVal) {
      routeSuggest.innerHTML = "";
      routeSuggest.hidden = true;
      return;
    }
    
    debounce = setTimeout(() => {
      const results = searchRoutes(cleanVal);
      renderRouteSuggest(routeSuggest, results, (routeObj) => {
        selectedRoute = etaDb.routeList[routeObj.routeId];
        selectedRoute.routeId = routeObj.routeId;
        const variantDesc = routeObj.ctbVariant || getCtbVariantDesc(selectedRoute);
        const destName = selectedRoute.dest.zh || selectedRoute.dest;
        routeInput.value = variantDesc
          ? `${selectedRoute.route} (往 ${destName}・${variantDesc})`
          : `${selectedRoute.route} (往 ${destName})`;
        card.dataset.routeId = routeObj.routeId;
        
        populateStops(selectedRoute, boardSelect, alightSelect);
      });
    }, 120);
  });
  
  routeInput.addEventListener("focus", () => {
    routeInput.select();
    
    const cleanVal = getCleanQuery(routeInput.value);
    if (cleanVal) {
      renderRouteSuggest(routeSuggest, searchRoutes(cleanVal), (routeObj) => {
        selectedRoute = etaDb.routeList[routeObj.routeId];
        selectedRoute.routeId = routeObj.routeId;
        const variantDesc = routeObj.ctbVariant || getCtbVariantDesc(selectedRoute);
        const destName = selectedRoute.dest.zh || selectedRoute.dest;
        routeInput.value = variantDesc
          ? `${selectedRoute.route} (往 ${destName}・${variantDesc})`
          : `${selectedRoute.route} (往 ${destName})`;
        card.dataset.routeId = routeObj.routeId;
        populateStops(selectedRoute, boardSelect, alightSelect);
      });
    }
  });
  
  document.addEventListener("click", (e) => {
    if (!routeSuggest.contains(e.target) && e.target !== routeInput) routeSuggest.hidden = true;
  });
}

function renderRouteSuggest(suggestEl, results, onPick) {
  suggestEl.innerHTML = "";
  if (!results.length) {
    suggestEl.innerHTML = `<div class="empty">搵唔到相符嘅巴士線</div>`;
    suggestEl.hidden = false;
    return;
  }
  for (const r of results) {
    const btn = document.createElement("button");
    btn.type = "button";
    const variantBadge = r.ctbVariant
      ? `<small style="display:inline-block; color:var(--ctb); background:rgba(246,168,0,.14); border-radius:8px; padding:1px 7px; margin-left:6px; font-weight:700;">${escapeHtml(r.ctbVariant)}</small>`
      : "";
    btn.innerHTML = `<b style="font-size:15px; color:var(--kmb);">${escapeHtml(r.route)}</b> <small style="display:inline; color:var(--muted); margin-left:8px;">往 ${escapeHtml(r.dest)}</small>${variantBadge}`;
    btn.addEventListener("click", () => {
      onPick(r);
      suggestEl.hidden = true;
    });
    suggestEl.appendChild(btn);
  }
  suggestEl.hidden = false;
}

// 填充站點安全化
function populateStops(route, boardSelect, alightSelect) {
  boardSelect.innerHTML = `<option value="">請選擇上車站</option>`;
  alightSelect.innerHTML = `<option value="">請選擇下車站</option>`;
  
  const companies = getCompanies(route);
  if (!companies || !companies.length) return;
  
  const stops = (route.stops && route.stops[companies[0]]) ? route.stops[companies[0]] : null;
  if (!stops) return;
  
  stops.forEach((stopId, idx) => {
    const s = etaDb.stopList ? etaDb.stopList[stopId] : null;
    if (!s) return;
    
    // 確保我們取得有效的中文及英文站名
    const zhName = s.name?.zh || s.name || "未知站點";
    const enName = s.name?.en || "";
    const displayName = `${idx + 1}. ${zhName}`;
    
    // 將站點的所有必要關鍵欄位打包進 option.value，防止後面取值時丟失
    const stopData = { 
      stopId, 
      idx, 
      co: companies[0],
      name: { zh: zhName, en: enName },
      location: s.location || null
    };
    
    const optBoard = document.createElement("option");
    optBoard.value = JSON.stringify(stopData);
    optBoard.textContent = displayName;
    boardSelect.appendChild(optBoard);
    
    const optAlight = document.createElement("option");
    optAlight.value = JSON.stringify(stopData);
    optAlight.textContent = displayName;
    alightSelect.appendChild(optAlight);
  });
}

calcCustomBtn.addEventListener("click", async () => {
  const cards = customLegsContainer.querySelectorAll(".custom-leg-card");
  if (!cards.length) return;
  
  statusLine.textContent = "";
  statusLine.classList.remove("err");
  calcCustomBtn.disabled = true;
  calcCustomBtn.textContent = "計算實時到站中";
  resultsWrap.innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      正在搜尋
    </div>
  `;
  
  try {
    if (typeof etaCache !== 'undefined' && etaCache.clear) {
      etaCache.clear();
    }
    const startTime = useSpecifiedTime ? new Date(customTimeInput.value) : new Date();
    
    // 構建自選路線虛擬 Candidate
    const segs = [];
    
    for (let i = 0; i < cards.length; i++) {
      const card = cards[i];
      const routeId = card.dataset.routeId;
      const boardVal = card.querySelector(".custom-board-select").value;
      const alightVal = card.querySelector(".custom-alight-select").value;
      
      if (!routeId || !boardVal || !alightVal) {
        throw new Error(`請填妥第 ${i+1} 程的所有路線及上下車車站`);
      }
      
      const route = etaDb.routeList[routeId];
      const board = JSON.parse(boardVal);
      const alight = JSON.parse(alightVal);
      
      if (board.idx >= alight.idx) {
        throw new Error(`第 ${i+1} 程的下車站必須在車程上車站之後`);
      }
      
      // 🚨 【超級安全防護門】：注入虛擬站點至 etaDb.stopList 中！
      // 避免核心計算/渲染引擎試圖用 stopId 查表卻查到 null，進而噴出 "Cannot read properties of null (reading 'name')"
      if (etaDb && etaDb.stopList) {
        if (!etaDb.stopList[board.stopId]) {
          etaDb.stopList[board.stopId] = { name: board.name, location: board.location };
        }
        if (!etaDb.stopList[alight.stopId]) {
          etaDb.stopList[alight.stopId] = { name: alight.name, location: alight.location };
        }
      }
      
      // 如果不是第一程，且上一程下車和本程上車屬於不同物理位置，自動插入步行
      if (i > 0) {
        const prevAlightVal = cards[i-1].querySelector(".custom-alight-select").value;
        const prevAlight = JSON.parse(prevAlightVal);
        
        // 取得位置的安全防禦
        const prevLoc = prevAlight.location || (etaDb.stopList[prevAlight.stopId] ? etaDb.stopList[prevAlight.stopId].location : null);
        const currLoc = board.location || (etaDb.stopList[board.stopId] ? etaDb.stopList[board.stopId].location : null);
        
        if (prevLoc && currLoc) {
          const distance = distM(prevLoc, currLoc);
          if (distance > 15) { // 超過 15 米視為需要步行/移動
            segs.push({
              type: "walk",
              fromStopId: prevAlight.stopId,
              toStopId: board.stopId,
              distM: distance
            });
          }
        }
      }
      
      segs.push({
        type: "ride",
        routeId,
        companies: getCompanies(route),
        primaryCo: board.co,
        r: route,
        boardStopId: board.stopId,
        boardIdx: board.idx,
        alightStopId: alight.stopId,
        alightIdx: alight.idx
      });
    }
    
    const virtualCandidate = { segs, isCircuitous: false, hasRedundantHop: false };
    // 自選行程：
    // 1) 若用戶揀咗「指定時間出發」，未來時段未必有實時 ETA，全程一律用
    //    寬鬆模式，靠 GTFS 估算是否有服務。
    // 2) 就算係「現在出發」，第一程之後嘅車程都應該用寬鬆模式（見
    //    treatSecondaryLegsRelaxed），確保用戶自己揀嘅組合唔會因為個別
    //    車程冇實時 ETA 就令成程「無法計算」。
    const plan = await evaluateCandidate(virtualCandidate, startTime, useSpecifiedTime, { treatSecondaryLegsRelaxed: true });
    
    if (!plan) {
      resultsWrap.innerHTML = `<div class="empty-state">無法計算該組合。可能是所選路線今日已過尾班車，或實時數據連接失敗</div>`;
      return;
    }
    
    renderResults([plan]);
    
  } catch (err) {
    statusLine.textContent = err.message || "計算自選路線出錯";
    statusLine.classList.add("err");
    resultsWrap.innerHTML = "";
  } finally {
    calcCustomBtn.disabled = false;
    calcCustomBtn.textContent = "計算自選行程到站時間";
  }
});
</script>
