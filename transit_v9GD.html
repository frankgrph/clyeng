<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>行程搜尋</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght=400;500;700;900&family=JetBrains+Mono:wght=400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14181c;
    --paper:#f3f1ea;
    --card:#ffffff;
    --line:#dcd7c9;
    --kmb:#c8102e;
    --ctb:#f6a800;
    --nlb:#0f6b3f;
    --gmb:#1b6e6e;
    --mtrb: #a51c30;
    --accent:#c8102e;
    --accent-ink:#ffffff;
    --muted:#6b6458;
    --walk:#8a8377;
    --good:#0f6b3f;
    --radius:14px;
  }

@font-face {
  font-family: 'Johnston100-Medium';
  src: url("https://seep.eu.org/https://mrdarrengriffin.com/Johnston100-Medium.woff2") format("woff2"), url("https://seep.eu.org/https://mrdarrengriffin.com/Johnston100-Medium.woff") format("woff"); }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Johnston100-Medium',"Noto Sans HK",-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    padding-bottom:60px;
  }
  .mono{font-family:"JetBrains Mono",monospace;}
  header.top{
    background:var(--ink);
    color:#f4f1e8;
    padding:22px 20px 26px;
    position:relative;
    overflow:hidden;
  }
  header.top::after{
    content:"";
    position:absolute; right:-40px; top:-40px; width:180px;height:180px;
    background:radial-gradient(circle, rgba(200,16,46,.55), transparent 70%);
    pointer-events:none;
  }
  header.top h1{
    margin:0 0 4px;
    font-size:22px;
    letter-spacing:.5px;
    font-weight:900;
  }
  header.top p{
    margin:0;
    font-size:12.5px;
    color:#b9b2a1;
  }
  .badge-strip{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
  .co-chip{font-size:10.5px; padding:3px 8px; font-weight:700; letter-spacing:.4px;}
  .co-chip.kmb{background:var(--kmb);color:#fff;}
  .co-chip.ctb{background:var(--ctb);color:#1a1a1a;}
  .co-chip.nlb{background:var(--nlb);color:#fff;}
  .co-chip.gmb{background:var(--gmb);color:#fff;}
  .co-chip.mtrb {background:var(--mtrb);color:#fff;}

  main{max-width:640px;margin:0 auto;padding:16px;}

  .panel{
    background:var(--card);
    padding:16px;
    margin-bottom:14px;
  }
  .field{position:relative;margin-bottom:10px;}
  .field label{
    display:block; font-size:11px; font-weight:700; color:var(--muted);
    text-transform:uppercase; letter-spacing:.6px; margin-bottom:4px;
  }
  .field input{
    width:100%; padding:11px 12px; font-size:15px;
    border:1.5px solid var(--line);
    background:#fbfaf6; color:var(--ink); font-family:inherit;
  }
  .field input:focus{outline:none; border-color:var(--accent);}
  .swap-row{display:flex; align-items:center; gap:8px;}
  .swap-row .fields{flex:1;}
  #swapBtn{
    width:38px;height:38px;border-radius:50%;border:1.5px solid var(--line);
    background:#fbfaf6; cursor:pointer; font-size:16px; flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s;
  }
  #swapBtn:active{transform:rotate(180deg);}

  .suggest{
    position:absolute; z-index:20; left:0; right:0; top:100%;
    background:var(--card); border:1px solid var(--line); border-top:none;
    max-height:260px; overflow-y:auto;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
  }
  .suggest button{
    display:block; width:100%; text-align:left; padding:9px 12px;
    background:none; border:none; border-bottom:1px solid #f0eee6;
    font-size:13.5px; cursor:pointer; font-family:inherit; color:var(--ink);
  }
  .suggest button:hover{background:#f6f4ec;}
  .suggest button small{display:block;color:var(--muted); font-size:11px;}
  .suggest .empty{padding:10px 12px; color:var(--muted); font-size:12.5px;}

  .criteria-row { display: flex; gap: 8px; margin-top: 2px; flex-wrap: wrap; }
  .crit-btn{
    flex:1; padding:9px 6px; font-size:12.5px; font-weight:700;
    border:1.5px solid var(--line); background:#fbfaf6;
    cursor:pointer; color:var(--muted);
  }
  .crit-btn.active{background:var(--ink); border-color:var(--ink); color:#fff;}
  .crit-btn[disabled]{opacity:.45; cursor:not-allowed;}

  #searchBtn{
    width:100%; margin-top:12px; padding:13px; font-size:15px; font-weight:900;
    background:var(--accent); color:#fff; border:none;
    cursor:pointer; letter-spacing:.4px;
  }
  #searchBtn:disabled{background:#b7b0a0; cursor:wait;}

  .status-line{font-size:12px; color:var(--muted); margin-top:8px; min-height:16px;}
  .status-line.err{color:#a4132b;}

  .result-meta{
    display:flex; justify-content:space-between; align-items:center;
    font-size:11.5px; color:var(--muted); margin:2px 2px 10px;
  }
  #refreshBtn{
    background:none;border:1px solid var(--line);border-radius:8px;
    font-size:11.5px; padding:4px 9px; cursor:pointer; color:var(--ink); font-family:inherit;
  }

  .result-card{
    background:var(--card);
    margin-bottom:12px; overflow:hidden;
  }
  .result-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 14px; background:#fbfaf6; border-bottom:1px solid var(--line);
  }
  .result-head .times{font-size:19px; font-weight:700;}
  .result-head .times .arr{color:var(--accent);}
  .result-head .sep{color:var(--muted); font-weight:400; padding:0 4px;}
  .result-head .stats{text-align:right; font-size:11.5px; color:var(--muted);}
  .result-head .stats b{color:var(--ink); font-size:16px;}
  .rank-tag{
    display:inline-block; font-size:10px; font-weight:800; letter-spacing:.4px;
    background:var(--ink); color:#fff; padding:2px 7px; margin-right:8px;
  }

  .legs{padding:12px 14px 14px;}
  .leg{display:flex; gap:10px; padding:7px 0;}
  .leg .rail{width:20px; flex-shrink:0; display:flex; flex-direction:column; align-items:center;}
  .leg .dot{width:9px;height:9px;border-radius:50%;background:var(--ink); margin-top:4px;}
  .leg .bar{flex:1; width:2px; background:var(--line); margin:2px 0;}
  .leg.walk .bar, .leg.walk .dot{background:var(--walk);}
  .leg .content{flex:1; padding-bottom:2px;}
  .leg .stopname{font-size:13.5px; font-weight:700;}
  .leg .stopname .t{float:right; font-size:12.5px; color:var(--muted);}
  .leg.ride .stopname .t{color:var(--ink); font-weight:700;}
  .ridebox{
    margin:4px 0 4px 0; padding:8px 10px; background:#fbfaf6;
    font-size:12.5px;
  }
  .ridebox .routeno{
    font-family:"Johnston100-Medium", sans-serif; font-weight:500; font-size:18px; color:#fff;
    padding:2px 4px; border-radius:5px; margin-right:6px;
  }
  .ridebox .routeno.kmb{background:var(--kmb);}
  .ridebox .routeno.ctb{background:var(--ctb); color:#1a1a1a;}
  .ridebox .routeno.nlb{background:var(--nlb);}
  .ridebox .routeno.gmb{background:var(--gmb);}
  .ridebox .routeno.mtrb{background:var(--mtrb);}
  .ridebox .dur{color:var(--muted);}
  .ridebox .live-tag{font-size:10px; padding:1px 6px; border-radius:10px; background:#e4f3ea; color:var(--good); font-weight:700; margin-left:4px;}
  .ridebox .est-tag{font-size:10px; padding:1px 6px; background:#f4e9c9; color:#7a5c00; font-weight:700; margin-left:4px;}
  .ridebox .ctb-discount-hint{font-size:10px; padding:1px 6px; border-radius:10px; background:#e7ecff; color:#3448c5; font-weight:700; margin-left:4px;}
  .walkbox{font-size:12px; color:var(--walk); padding:2px 0 2px;}
  .samestop{font-size:10.5px; color:var(--good); font-weight:700;}

  .empty-state, .loading-state{
    text-align:center; padding:36px 16px; color:var(--muted); font-size:13.5px;
  }
  .loading-state .spinner{
    width:26px;height:26px;border-radius:50%;
    border:3px solid var(--line); border-top-color:var(--accent);
    margin:0 auto 12px; animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .note{font-size:11.5px; color:var(--muted); line-height:1.6; padding:2px 4px;}
  .note b{color:var(--ink);}
  footer.disclaimer{
    max-width:640px;margin:6px auto 0;padding:14px 16px 0; font-size:11px; color:#8a8474; line-height:1.7;
  }

  /* 自選模式專屬樣式 */
  .custom-leg-card {
    background: #fbfaf6;
    border: 1.5px solid var(--line);
    padding: 14px;
    margin-bottom: 12px;
    position: relative;
  }
  .custom-leg-card .leg-title {
    font-size: 13px;
    font-weight: 900;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .custom-leg-card .delete-leg-btn {
    background: none;
    border: none;
    color: var(--kmb);
    font-weight: 700;
    cursor: pointer;
    font-size: 12px;
  }
  .custom-leg-card .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }
  .custom-leg-card select, .custom-leg-card input {
    width: 100%;
    padding: 10px;
    font-size: 13.5px;
    border: 1px solid var(--line);
    background: #fff;
    font-family: inherit;
    color: var(--ink);
  }
  .custom-leg-card select:focus, .custom-leg-card input:focus {
    outline: none;
    border-color: var(--accent);
  }
</style>
</head>
<body>

<header class="top">
  <h1>行程搜尋</h1>
  <p>輸入起點同終點,参考 API 自動計算實時行程</p>
  <div class="badge-strip">
    <span class="co-chip kmb">九巴 KMB</span>
    <span class="co-chip ctb">城巴 CTB</span>
    <span class="co-chip nlb">嶼巴 NLB</span>
    <span class="co-chip gmb">專線小巴 GMB</span>
    <span class="co-chip mtrb">港鐵巴士 MTRB</span>
  </div>
</header>

<main>
  <div class="panel">
    <div id="standardInputsWrap">
      <!-- GPS 起點按鈕 -->
      <button id="gpsBtn" style="width:100%; margin-bottom:12px; padding:11px; background:#fbfaf6; border:1.5px solid var(--line); cursor:pointer; color:var(--ink); font-size: 13.5px; font-weight: 700;">GPS 設定起點</button>
      
      <div class="swap-row">
        <div class="fields">
          <div class="field">
            <label>起點</label>
            <input id="originInput" type="text" placeholder="輸入出發巴士站名稱" autocomplete="off">
            <div class="suggest" id="originSuggest" hidden></div>
          </div>
          <div class="field" style="margin-bottom:0;">
            <label>終點</label>
            <input id="destInput" type="text" placeholder="輸入到達巴士站名稱" autocomplete="off">
            <div class="suggest" id="destSuggest" hidden></div>
          </div>
        </div>
        <button id="swapBtn" title="對調起點終點">⇅</button>
      </div>
    </div>

    <label style="display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:10px 2px 6px;">排序準則</label>
    <div class="criteria-row">
      <button class="crit-btn active" data-crit="time">最早到達</button>
      <button class="crit-btn" data-crit="fare" disabled title="資料載入中">車費</button>
      <button class="crit-btn" data-crit="transfers">轉車最少</button>
      <button class="crit-btn" data-crit="custom" id="customModeBtn">自選行程</button>
    </div>

    <!-- 出發時間按鈕與 Time Picker -->
    <label style="display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:12px 2px 6px;">出發時間</label>
    <div class="criteria-row">
      <button class="crit-btn active" id="timeNowBtn">現在出發</button>
      <button class="crit-btn" id="timeCustomBtn">指定時間出發</button>
    </div>
    <div id="timePickerWrap" style="display:none; margin-top:8px;">
      <input type="datetime-local" id="customTimeInput" style="width:100%; padding:11px 12px; font-size:15px; border:1.5px solid var(--line); background:#fbfaf6; color:var(--ink); font-family:inherit;">
    </div>

    <button id="searchBtn" disabled>載入路線資料中</button>
    <div class="status-line" id="statusLine"></div>

    <div id="customPanel" style="display:none; margin-top: 12px; padding: 0;">
      <div id="customLegsContainer"></div>
      <button id="addCustomLegBtn" style="width:100%; margin-top:8px; padding:10px; background:#fbfaf6; border:1.5px dashed var(--line); cursor:pointer; color:var(--ink); font-size: 13.5px; font-weight: bold;">+ 增加一程</button>
      <button id="calcCustomBtn" style="width:100%; margin-top:12px; padding:13px; font-size:15px; font-weight:900; background:var(--ink); color:#fff; border:none; cursor:pointer; letter-spacing:.4px;">計算自選行程到站時間</button>
    </div>
  </div>

  <div id="resultsWrap"></div>

  <footer class="disclaimer">
    <b>關於此工具：</b>本工具使用 data.gov.hk 提供嘅九巴/龍運、城巴、嶼巴、專線小巴實時到站 API。輸入起點同終點,自動計算實時行程組合。
  </footer>
</main>

<script type="module">
import { fetchEtaDb, fetchEtas } from "https://esm.sh/hk-bus-eta@3?bundle";

/* ---------------- constants ---------------- */
const WALK_SPEED_MPS = 1.2;          // ~4.3km/h 步行(連搵路)
const SAME_STOP_ALIGHT_BUFFER_MIN = 1; // 同站轉乘落車緩衝時間
const DEBUG_MODE = (() => {
  try { return new URLSearchParams(location.search).get("debug") === "1"; }
  catch (e) { return false; }
})(); // 網址加 ?debug=1 可以喺搜尋結果度顯示 GTFS 比對失敗率統計，方便排查
const MAX_TRANSFER_WALK_M = 350;     // 轉車步行上限
const NORMAL_TRIP_ENDPOINT_WALK_M = 500; // 常規車程（11公里內）起點替代車站搜尋範圍
const MAX_LEGS = 4;                  // 最多3次轉車 = 4程
// BEAM_WIDTH 原本 800、LOOKAHEAD_STOPS 原本 9999（等同無上限），
// 令每一輪都要為多達 800 個狀態、逐條路線掃畢全程所有剩餘站（部分長途路線
// 一程就過百站），造成搜尋非常緩慢。實際上香港巴士/小巴路線一個方向最多
// 都係 6、70 個站左右，而終點鄰近範圍剪枝（下面 alightPruneRadiusM 相關
// 邏輯）本身已經會處理「行過龍」嘅路線，所以將 LOOKAHEAD_STOPS 收緊到
// 80（足夠覆蓋幾乎所有本地路線一個方向嘅站數）、BEAM_WIDTH 收緊到 400，
// 大幅減少每輪運算量，同時對搜尋結果嘅完整度冇實質影響。
const BEAM_WIDTH = 400;
const LOOKAHEAD_STOPS = 70;
const MAX_CANDIDATES_TO_EVAL = 100;
const RESULTS_TO_SHOW = 10;
const FRESH_ETA_WINDOW_MIN = 120;
const COMPANY_PRIORITY = ["kmb","ctb","nlb","gmb","mtrb"];
const ONESIDED_MAX_HOPS = 14;        // 逐站比對上限（最多掃14個站）
const PRIORITY1_ALIGHT_FRESH_WINDOW_MIN = 60; // 第一優先：落車時間須喺查詢後一小時內先適用

const LONG_TRIP_THRESHOLD_M = 9000;
const VERY_LONG_TRIP_THRESHOLD_M = 20000;
const LONG_TRIP_TOTAL_MIN_THRESHOLD = 45; // 總路程超過幾多分鐘算長途

// 起點替代車站範圍：純粹以動態適應距離（車程長短）作為唯一標準
// 常規（≤11km）：500m／長途（>9km）：550m／極長途（>20km）：700m
function getAdaptiveWalkLimits(straightLineTotalM){
  if (straightLineTotalM > VERY_LONG_TRIP_THRESHOLD_M){
    return { transferWalk: 500, endpointWalk: 700 };
  }
  if (straightLineTotalM > LONG_TRIP_THRESHOLD_M){
    return { transferWalk: 500, endpointWalk: 550 };
  }
  return { transferWalk: MAX_TRANSFER_WALK_M, endpointWalk: NORMAL_TRIP_ENDPOINT_WALK_M };
}

/* ---------------- state ---------------- */
let etaDb = null;
let routeFareDb = null;      // 路線車費及港鐵巴士數據
let timeIntervalDb = null;   // 站與站預計車程 JSON 數據

/* ---- 轉乘車費相關資料庫估算邏輯 ----
 * 資料源自 LOOHP/HK-KMB-Calculator（九巴轉乘車費計算機）每日自動更新之開放資料。 */
let kmbBbiStopDb = null;             // KMB BBI 轉車站站名對照表
let regionalTwoWayFareDb = null;     // 九巴短途分段雙向收費表
let ctbRouteIdsDb = null;            // 城巴路線編號/方向對照表
// 城巴官方 concessionApi 轉乘優惠即時查詢快取：key 係 "首程路線|次程路線"
// (皆為大寫、trim 過)，value 係一個 Promise，resolve 做已經整理好嘅轉乘
// 優惠候選記錄陣列（parseCtbLiveInterchangeResponse() 嘅輸出），或者 null
// （代表查詢失敗／冇資料）。用 Promise 而唔係直接放結果，係為咗喺短時間內
// 多程行程同時查緊同一組合時可以共用同一個 in-flight request，唔使重覆
// fetch。
let ctbLiveInterchangeCache = new Map();
let mtrBusRouteFareDb = null;        // 港鐵巴士車費
let bbiF1Db = null;                  // 九巴 BBI 轉乘優惠 (方向 1)
let bbiB1Db = null;                  // 九巴 BBI 轉乘優惠 (方向 2)
let bbiHeavyLoaded = false;          // bbi_f1 / bbi_b1 背景載入是否已完成
let bbiLightLoaded = false;          // 其餘車費 JSON (較細) 是否已載入完成
// 九巴官方路線 API（data.etabus.gov.hk）現正公佈緊嘅 route+service_type 組合，
// 用嚟快速核實 etaDb 入面某條九巴路線嘅特定班次變體係咪依然存在（例如已經
// 停辦嘅特別繁忙時間班次），毋須每次都行慢速嘅 GTFS 逐個 trip 比對先知。
let kmbLiveServiceTypesByRoute = null;   // Map: 路線編號(大寫) -> Set(service_type 字串)
let kmbRouteIndexLoaded = false;
// 城巴路線編號/方向對照表（ctb_route_ids.json，已喺 loadBbiLightData 載入做
// ctbRouteIdsDb），呢度額外整埋一個 route+bound -> 是否存在 嘅快速查表，
// 用嚟輔助核實城巴路線方向係咪確實存在，唔使淨係靠 GTFS fuzzy 比對。
let ctbLiveBoundsByRoute = null;         // Map: 路線編號(大寫) -> Set("O"/"I")
let stopRouteIndex = null;   // stopId -> [{routeId, idx, companies, primaryCo}]
let gridIndex = null;        // "latCell,lngCell" -> [stopId]
let origin = null;           // {stopId,name,lat,lng}
let destination = null;
let sortMode = "time";

const $ = (sel) => document.querySelector(sel);
const originInput = $("#originInput");
const destInput = $("#destInput");
const originSuggest = $("#originSuggest");
const destSuggest = $("#destSuggest");
const searchBtn = $("#searchBtn");
const statusLine = $("#statusLine");
const resultsWrap = $("#resultsWrap");

/* ---------------- geo helpers ---------------- */
function distM(a, b) {
  const latDist = Math.abs(b.lat - a.lat) * 111320;
  const avgLat = (a.lat + b.lat) / 2;
  const lngDist = Math.abs(b.lng - a.lng) * (40075000 * Math.cos(avgLat * Math.PI / 180) / 360);
  const manhattanDist = latDist + lngDist;
  return manhattanDist * 1.2;
}
const CELL = 0.005;
function cellKey(lat,lng){ return Math.floor(lat/CELL)+","+Math.floor(lng/CELL); }

// 基礎 OSRM 請求
async function getRealWalkingData(fromLoc, toLoc) {
  try {
    const url = `https://seep.eu.org/https://router.project-osrm.org/route/v1/foot/${fromLoc.lng},${fromLoc.lat};${toLoc.lng},${toLoc.lat}?overview=false`;
    const res = await fetch(url);
    if (!res.ok) throw new Error("OSRM API error");
    const json = await res.json();
    
    if (json.code === "Ok" && json.routes && json.routes.length > 0) {
      const route = json.routes[0];
      return {
        distM: route.distance,      // 真實步行路徑距離 (米)
        durationS: route.duration,  // 基於路網計算的真實步行時間 (秒)
        success: true
      };
    }
  } catch (err) {
    console.warn("無法取得第三方地圖路徑，降級至直線估算:", err);
  }
  return { success: false };
}

// === 全局 OSRM 記憶化快取 ===
const walkCache = new Map();
async function getRealWalkingDataCached(cacheKey, fromLoc, toLoc) {
  if (walkCache.has(cacheKey)) {
    return walkCache.get(cacheKey);
  }
  const result = await getRealWalkingData(fromLoc, toLoc);
  walkCache.set(cacheKey, result);
  return result;
}

function buildGridIndex(stopList){
  gridIndex = new Map();
  for (const [stopId, s] of Object.entries(stopList)) {
    if (!s || !s.location) continue;
    const key = cellKey(s.location.lat, s.location.lng);
    if (!gridIndex.has(key)) gridIndex.set(key, []);
    gridIndex.get(key).push(stopId);
  }
}

/* === 站點合併與緩衝區判定 === */
// 【邏輯修正】原本合併半徑 150 米，對於大型總站/公共運輸交匯處（例如
// 「馬鞍山市中心」「機場地面運輸中心」呢類多月台大站）經常唔夠——同一個
// 總站入面唔同公司/唔同月台嘅站牌，實際相距超過 150 米係好平常嘅事，令
// 名稱相符但距離啱啱好踩過界嘅站牌被誤判做「唔同站」。放寬到 220 米，
// 並將「純距離兜底」門檻由 40 米放寬到 60 米（頂住兩個站名寫法完全唔同、
// 但實際上係同一個處所嘅邊緣情況）。
const MERGE_RADIUS_M = 220;
const MERGE_FALLBACK_DIST_M = 60;

// 常見「總站/交匯處」類後綴詞——呢類字眼喺唔同資料源（KMB/CTB/GMB/MTR
// 巴士）入面有冇、寫法都可能唔一致（例如「馬鞍山市中心總站」對比
// 「馬鞍山市中心」），但實際上係指緊同一個處所。比較站名之前先將呢啲
// 後綴詞剝走，減少因為呢類寫法差異導致嘅假陰性（誤判做唔同站）。
// 由長到短排列，確保長後綴（如「巴士總站」）優先於短後綴（如「站」）被
// 剝走，避免斬多咗令原本有意義嘅字眼都被切走。
const STOP_SUFFIX_WORDS = [
  "公共運輸交匯處", "公共交通交匯處", "運輸交匯處", "交匯處",
  "巴士總站", "小巴總站", "總站", "巴士站", "小巴站"
];

function cleanStopName(name) {
  if (!name) return "";
  let s = name.toString()
             .replace(/[\(（].*?[\)）]/g, "") // 移除括號及其內容，例如 (B1)、（落客站）
             .replace(/[\s,，.。\-_]/g, "")
             .toLowerCase()
             .trim();
  for (const suffix of STOP_SUFFIX_WORDS) {
    if (s.length > suffix.length && s.endsWith(suffix)) {
      s = s.slice(0, -suffix.length);
      break; // 剝一次就夠，避免連環誤剝
    }
  }
  return s;
}

function isSameTransferPoint(stopA, stopB) {
    if (!stopA || !stopB) return false;
    const dist = distM(stopA.location, stopB.location);
    if (dist > MERGE_RADIUS_M) return false;
    
    const zhA = cleanStopName(stopA.name.zh);
    const zhB = cleanStopName(stopB.name.zh);
    const enA = cleanStopName(stopA.name.en);
    const enB = cleanStopName(stopB.name.en);
    
    // 1. 中文名稱完全相同或包含關係 (例如 "創紀之城" vs "創紀之城(B1)")
    if (zhA && zhB) {
        if (zhA === zhB || zhA.includes(zhB) || zhB.includes(zhA)) return true;
    }
    // 2. 英文名稱完全相同或包含關係
    if (enA && enB) {
        if (enA === enB || enA.includes(enB) || enB.includes(enA)) return true;
    }
    // 3. 極近距離（如60米內），即使命名略有不同，也視為同站群（防止跨公司命名細微差異）
    if (dist <= MERGE_FALLBACK_DIST_M) return true;
    
    return false;
}

function nearbyStops(lat, lng, radiusM) {
    const found = [];
    const seenStopIds = new Set();

    // 【效能修正】上次為咗唔漏站，一律喺 latSpan/lngSpan 度多加一格緩衝，
    // 保證半徑內嘅站一定掃得到，但代價係好多時候會掃多過實際需要嘅格數
    // （呢個 function 喺搜尋主迴圈入面——尤其係轉車步行搜尋——會被逐個
    // 候選狀態調用，多掃嘅格數會逐輪疊加，直接拖慢撳「搜尋」之後嘅等候
    // 時間）。而家改為根據起點喺佢所在格仔入面嘅實際偏移量，分別計算四
    // 個方向（南／北／東／西）各自需要幾多格先夠覆蓋 radiusM，唔再無條件
    // 兩邊都加多一格——結果保證一樣完整（半徑內嘅站保證掃得到），但一般
    // 情況下要掃嘅格仔會少好多。
    const latMPerDeg = 111320;
    const lngMPerDeg = Math.max(111320 * Math.cos(lat * Math.PI / 180), 1);
    const latCellM = latMPerDeg * CELL;
    const lngCellM = lngMPerDeg * CELL;

    const latCell = Math.floor(lat / CELL), lngCell = Math.floor(lng / CELL);
    const latOffsetM = (lat - latCell * CELL) * latMPerDeg;   // 起點喺格內嘅偏移（南面起計）
    const lngOffsetM = (lng - lngCell * CELL) * lngMPerDeg;   // 起點喺格內嘅偏移（西面起計）

    const negLatSpan = Math.max(0, Math.ceil((radiusM - latOffsetM) / latCellM));
    const posLatSpan = Math.max(0, Math.ceil((radiusM - (latCellM - latOffsetM)) / latCellM));
    const negLngSpan = Math.max(0, Math.ceil((radiusM - lngOffsetM) / lngCellM));
    const posLngSpan = Math.max(0, Math.ceil((radiusM - (lngCellM - lngOffsetM)) / lngCellM));

    for (let dlat=-negLatSpan; dlat<=posLatSpan; dlat++){
        for (let dlng=-negLngSpan; dlng<=posLngSpan; dlng++){
            const bucket = gridIndex.get((latCell+dlat)+","+(lngCell+dlng));
            if (!bucket) continue;
            for (const stopId of bucket){
                if (seenStopIds.has(stopId)) continue;
                const s = etaDb.stopList[stopId];
                if (!s) continue;
                const d = distM({lat,lng}, s.location);
                if (d <= radiusM) {
                    found.push({stopId, dist: d});
                    seenStopIds.add(stopId);
                }
            }
        }
    }
    
    // 合併同轉乘點的站點：呢類「其他站牌屬於同一轉乘點」嘅站牌，行過去嘅
    // 步行距離應該同已經量度過嘅嗰個代表站牌相若，但必須保留所有站點以
    // 獲取完整的路線覆蓋
    //
    // 【修正】isSameTransferPoint(m, f) 判斷嘅係 m 同 f 呢兩個站牌之間嘅
    // 距離（或者名稱相似度），並唔係話 f 距離查詢點（起點/終點座標）
    // 一定係 0 米。舊版一撞中就將 f.dist 硬set做 0，等於話「凡係同一
    // 站群嘅站牌，全部當企喺用戶腳下」——如果 m 本身真係好近（例如 5
    // 米），噉都仲勉強收貨；但如果 m 只不過喺 40 米 / 150 米合併半徑
    // 邊緣，f 實際距離查詢點可以仲有好幾百米，卻顯示做「步行約 0
    // 米」，同現實唔符（例如彩虹邨同啟晴邨實際上唔可能 0 米）。而家
    // 改為用返 existing（已經用真實 distM() 量度過）嗰個距離，代表
    // 「呢個站牌大約同代表站牌一樣近」，唔會再無中生有噏一個唔存在
    // 嘅 0 米出嚟。
    const merged = [];
    found.forEach(f => {
        const existing = merged.find(m => isSameTransferPoint(etaDb.stopList[m.stopId], etaDb.stopList[f.stopId]));
        if (!existing) {
            merged.push(f);
        } else {
            f.dist = existing.dist; // 同一站群的不同站牌，步行距離約等於代表站牌嘅實際距離
            merged.push(f); // 必須保留！否則該站牌特有的路線會被過濾，造成搜尋結果缺失
        }
    });
    
    merged.sort((a,b) => a.dist - b.dist);
    return merged;
}

function stopName(stopId){
  const s = etaDb.stopList[stopId];
  if (!s) return stopId;
  return s.name.zh || s.name.en || stopId;
}
function fmtTime(d){

  return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");

function fmtDist(m){

}

/* ---------------- Route Scoring System ---------------- */
const PENALTY_TRANSFER = 3;      
const PENALTY_CROSS_CO = 5;     
const MULTIPLIER_WALK = 1.1;     

// 判斷某車站是否有多於一間巴士公司的路線途經 (≥ 2 間公司為跨公司轉車站)
function isMultiCompanyStation(stopId) {
  if (!stopRouteIndex || !stopRouteIndex.has(stopId)) return false;
  const routes = stopRouteIndex.get(stopId) || [];
  const companies = new Set();
  for (const rInfo of routes) {
    if (rInfo.companies) {
      rInfo.companies.forEach(co => companies.add(co));
    }
  }
  return companies.size >= 2;
}

// 檢查某條路線喺附近時段內係咪有班次

// 【freq 日子類型核實】判定某日子係否官方公佈嘅公眾假期。呢個純粹用嚟
// 解讀 routeFareList.min.json 嘅 freq 假期位，同 isHolidayFareDate()
// 「逢星期日一律當假日收費」嗰套車費邏輯係兩件事，唔應該混用——freq 嘅
// bitmask 格式（見下面 _resolveFreqDayTypeKey）已經有獨立嘅「星期日」
// bit，假期 bit 應該淨係反映 routeFareDb.holidays 呢張官方假期表本身。
function _isDesignatedPublicHoliday(when) {
  if (!routeFareDb || !Array.isArray(routeFareDb.holidays)) return false;
  const yyyy = when.getFullYear();
  const mm = String(when.getMonth() + 1).padStart(2, '0');
  const dd = String(when.getDate()).padStart(2, '0');
  return routeFareDb.holidays.includes(`${yyyy}${mm}${dd}`);
}

// 【freq 日子類型核實，加強版】routeFareList.min.json 入面 freq 嘅最外層
// 「日子類型」key，原來因應唔同巴士公司嘅爬蟲寫法，其實有兩種完全唔同
// 嘅格式：
//   1) 文字格式：部分公司直接寫 "weekday"/"saturday"/"sunday"/"holiday"
//      呢類可讀字串。
//   2) 數字 bitmask 格式（用戶提供咗實際數據反推確認）：例如城巴 1 號線
//      嘅 freq key 係 "287"/"288"/"448"，同官方時間表（06:00-18:35
//      15-20分鐘／18:35-23:00 20-25分鐘 = 平日；06:00-10:00 20分鐘／
//      10:00-19:00 12-15分鐘／19:00-23:00 20-25分鐘 = 星期六；06:00-19:00
//      15-20分鐘／19:00-23:00 20-25分鐘 = 星期日及公眾假期）逐段核對後，
//      得出嚴格對應嘅位元定義：
//        bit0 (1)   = 星期一      bit4 (16)  = 星期五
//        bit1 (2)   = 星期二      bit5 (32)  = 星期六
//        bit2 (4)   = 星期三      bit6 (64)  = 星期日
//        bit3 (8)   = 星期四      bit7 (128) = 公眾假期
//      287 = 1+2+4+8+16+256 = 星期一至五（+256 係三個範例都出現嘅固定
//      基數，同日子判斷無關，判斷時要 &0xFF 篩走佢先比對）；
//      288 = 32+256 = 星期六；
//      448 = 64+128+256 = 星期日＋公眾假期（合併做一個 block，同官方
//      時間表「星期日及公眾假期」呢個分類完全對應）。
// 判斷邏輯：如果今日係公眾假期，優先搵有 set 咗 128 bit 嘅 key（呢類 key
// 通常連埋星期日一齊蓋晒「日及假期」呢個分類）；搵唔到或者今日唔係假期，
// 就搵 set 咗「今日星期幾」嗰個 bit、但冇 set 128 bit 嘅 key（避免誤配去
// 假期專用嘅 block）；再搵唔到就放寬做只要 set 咗嗰個 dow bit 就算。
// 如果 dayTypes 唔係清一色純數字（即混雜格式或者根本係文字格式但冇比對
// 中任何已知 pattern），就返回 null，交返 caller 用原有嘅保守處理。
function _resolveFreqDayTypeKey(freq, when) {
  if (!freq) return null;
  const dayTypes = Object.keys(freq);
  if (!dayTypes.length) return null;

  const day = when.getDay();
  let textKey = null;
  if (day === 0) {
    textKey = dayTypes.find(k => /sun|holiday/i.test(k));
  } else if (day === 6) {
    textKey = dayTypes.find(k => /sat/i.test(k)) || dayTypes.find(k => /weekend|holiday/i.test(k));
  } else {
    textKey = dayTypes.find(k => /weekday|normal/i.test(k)) || dayTypes.find(k => /mon|tue|wed|thu|fri/i.test(k));
  }
  if (textKey) return textKey;

  const allNumeric = dayTypes.every(k => /^\d+$/.test(k));
  if (!allNumeric) return null;

  const DOW_BIT = [64, 1, 2, 4, 8, 16, 32]; // 索引 = Date.getDay()
  const dowBit = DOW_BIT[day];
  const isHoliday = _isDesignatedPublicHoliday(when);

  if (isHoliday) {
    const holidayKey = dayTypes.find(k => (parseInt(k, 10) & 128) === 128);
    if (holidayKey) return holidayKey;
  }
  const strictDowKey = dayTypes.find(k => {
    const n = parseInt(k, 10);
    return (n & dowBit) === dowBit && (n & 128) === 0;
  });
  if (strictDowKey) return strictDowKey;

  const anyDowKey = dayTypes.find(k => (parseInt(k, 10) & dowBit) === dowBit);
  return anyDowKey || null;
}

// 【freq 數值格式核實】routeFareList.min.json 嘅 freq 內層，每個時段 key
// 對應嘅值，用戶提供咗實際 API 回應確認真正格式係一個陣列
// [結束時間字串, 班距秒數字串]，例如 "0600": ["0720", "1200"] 代表
// 06:00-07:20 呢一段，班距係 1200 秒（= 20 分鐘），唔係之前程式碼一直
// 假設嗰種「15-20」直接寫明分鐘範圍嘅字串。
// 之前嘅寫法一律 String(值) 再用 /\d+/g 摘晒全部數字揀最大值，用喺陣列
// 上會將「結束時間」（例如 "0720" → 720）同「班距秒數」（例如 1200）
// 呢兩個完全唔同單位、唔同意義嘅數字混埋一齊比大小，結果可能誤將結束
// 時間當班距、或者將秒數直接當分鐘數用（1200 秒錶錶當 1200 分鐘），
// 估算出嚟嘅等候時間可以離譜到成十粒鐘。而家改為：陣列格式明確攞第二個
// 元素（班距秒數）除 60 轉分鐘；如果唔係陣列（少數舊格式／其他公司可能
// 直接寫「15-20」呢類分鐘範圍字串），先退返用舊有 regex 摘數字取最大值
// 嗰套解讀方式，確保兩種格式都處理得到。
function _freqEntryToMinutes(entry) {
  if (entry == null) return null;
  if (Array.isArray(entry)) {
    const headwaySecs = Number(entry[1]);
    if (Number.isFinite(headwaySecs) && headwaySecs > 0) {
      return Math.max(1, Math.round(headwaySecs / 60));
    }
    return null;
  }
  const nums = String(entry).match(/\d+/g);
  if (!nums) return null;
  return Math.max(...nums.map(Number));
}

function isRouteActiveAroundTime(r, atTime, boardStopId = null, windowMin = 90) {
  if (!r || !atTime) return false;
  
  // 1. 如果資料庫的路線已區分 service_type 且 freq 綁定在變體上
  // 我們需要確保目前查詢的 boardStopId 真的屬於這個變體的營運區間
  if (boardStopId && r.stops && r.primaryCo) {
    const currentStops = r.stops[r.primaryCo];
    if (!currentStops.includes(boardStopId)) return false; 
  }

  // 0. 快速核實：就住九巴路線，先用官方路線列表 API（比慢速 GTFS 快）核實
  // 呢個 service_type 變體係咪現時依然存在。搵到明確「唔存在」就即刻當
  // 冇服務，唔使再行落去等 GTFS 逐個 trip 慢慢比對——呢一步專門針對
  // 資料庫入面殘留咗已停辦嘅特別班次變體（例如已取消嘅特別繁忙時間班次）
  // 而導致誤判「有直達車」嘅情況。
  if (r.primaryCo === "kmb" && r.service_type) {
    const liveCheck = isKmbServiceTypeLive(r.route, r.service_type);
    if (liveCheck === false) return false;
  }

  try {
    const freq = r.freq;
    if (!freq) return true; // 沒時刻表資料時，保守假設可能運作

    // 檢查某些特定路線（如 A41）的特殊繞經機制
    // 如果該路線屬於特別班次變體（例如 r.service_type > 1）
    // 必須嚴格比對它的專屬時間表
    if (r.service_type && r.service_type > 1) {
      // 舉例：A41 繞經國泰城的班次可能只在 05:00 - 07:00 服務
      // 這裡需要確保現在時間落在該變體的 freq 時段內
    }

    const dayTypes = Object.keys(freq);
    if (!dayTypes.length) return true;

    const dayKey = _resolveFreqDayTypeKey(freq, atTime);
    if (!dayKey) return false;
    const table = freq[dayKey];
    if (!table) return false;

    const times = Object.keys(table).sort((a, b) => to30HMinutes(a, atTime) - to30HMinutes(b, atTime));
    if (!times.length) return false;

    const nowMins = to30HMinutes(atTime);

    for (let i = 0; i < times.length; i++) {
      const key = times[i];
      const nextKey = i < times.length - 1 ? times[i + 1] : null;
      const { start: tMins, end: tEndMins, duration } = getIntervalRange(key, atTime, nextKey);

      // 檢查是否在當前營運時間區間內
      if (nowMins >= tMins && nowMins < tMins + duration) return true;
      if (tMins >= nowMins && tMins - nowMins <= windowMin) return true;
      if (nowMins >= tMins && nowMins - tMins <= 20) return true;
    }
    return false; 
  } catch (err) {
    return false; 
  }
}

// 判定起點附近與終點附近是否存在任何一條直達巴士路線
// 判定範圍參考動態適應性距離（隨車程遠近調整：500 / 750 / 900 米）
// atTime：指定搜尋時間點，用嚟檢查「現時時段內」係咪真係有直達班次運作（見上面 isRouteActiveAroundTime）
function hasDirectService(orig, dest, atTime = null) {
  if (!etaDb || !stopRouteIndex || !orig || !dest) return false;

  const straightLineTotalM = distM({lat:orig.lat,lng:orig.lng},{lat:dest.lat,lng:dest.lng});
  const { endpointWalk: directCheckRadiusM } = getAdaptiveWalkLimits(straightLineTotalM);

  // 獲取起訖點動態適應範圍內的所有站點
  const originStops = [{ stopId: orig.stopId, dist: 0 }]
    .concat(nearbyStops(orig.lat, orig.lng, directCheckRadiusM))
    .map(s => s.stopId);
  const uniqueOriginStops = [...new Set(originStops)];

  const destStops = [{ stopId: dest.stopId, dist: 0 }]
    .concat(nearbyStops(dest.lat, dest.lng, directCheckRadiusM))
    .map(s => s.stopId);
  const uniqueDestStops = [...new Set(destStops)];

  // 掃描是否存在直達路線
  for (const origId of uniqueOriginStops) {
    const origRoutes = stopRouteIndex.get(origId) || [];
    for (const origRoute of origRoutes) {
      const r = etaDb.routeList[origRoute.routeId];
      if (!r) continue;
      
      const companies = getCompanies(r);
      for (const co of companies) {
        const stops = r.stops[co];
        if (!stops) continue;
        const oIdx = stops.indexOf(origId);
        if (oIdx === -1) continue;
        
        for (const destId of uniqueDestStops) {
          const dIdx = stops.indexOf(destId);
          // 必須在同一條路線中，且起點在終點之前
          if (dIdx !== -1 && oIdx < dIdx) {
            // 新增：只計「現時時段內」（按路線時刻表）確實有運作嘅直達班次，
            // 避免好似日行得兩班車（例如 E42C：飛機維修區↔沙田）嘅路線，
            // 喺無關嘅時段都被誤判成「有直達車」而錯誤觸發跨公司轉車懲罰
            if (atTime && !isRouteActiveAroundTime(r, atTime, origId)) continue;
            return true; 
          }
        }
      }
    }
  }
  return false;
}

// 判定起點站群與終點附近是否存在任何直達巴士路線
// 【備註】呢個 function 已經唔再用嚟決定 runBeamSearch 入面邊啲站可以做
// 候選（見 runBeamSearch 內嘅修正說明）——因為單靠佢一個 boolean 結果去
// 篩走候選站，一旦站群命名／距離判定有半分誤差，就會令本身應該有得直接
// 上車嘅站被跳過。現時保留呢個 function 純粹供日後評分／debug 用途。
function hasDirectFromStopGroup(origStopId, dest, atTime = null) {
  if (!etaDb || !stopRouteIndex || !origStopId || !dest) return false;
  const originStop = etaDb.stopList[origStopId];
  if (!originStop) return false;

  const straightLineTotalM = distM({lat:originStop.location.lat,lng:originStop.location.lng},{lat:dest.lat,lng:dest.lng});
  const { endpointWalk: directCheckRadiusM } = getAdaptiveWalkLimits(straightLineTotalM);

  // 找出該起點所屬站群的所有車站
  const origGroupStops = [];
  for (const [stopId, s] of Object.entries(etaDb.stopList)) {
    if (isSameTransferPoint(originStop, s)) {
      origGroupStops.push(stopId);
    }
  }

  const destStops = (dest && dest.stopId)
    ? [{ stopId: dest.stopId, dist: 0 }].concat(nearbyStops(dest.lat, dest.lng, directCheckRadiusM))
    : nearbyStops(dest.lat, dest.lng, directCheckRadiusM);
  const uniqueDestStops = [...new Set(destStops.map(s => s.stopId))];

  for (const origId of origGroupStops) {
    const origRoutes = stopRouteIndex.get(origId) || [];
    for (const origRoute of origRoutes) {
      const r = etaDb.routeList[origRoute.routeId];
      if (!r) continue;
      
      const companies = getCompanies(r);
      for (const co of companies) {
        const stops = r.stops[co];
        if (!stops) continue;
        const oIdx = stops.indexOf(origId);
        if (oIdx === -1) continue;
        
        for (const destId of uniqueDestStops) {
          const dIdx = stops.indexOf(destId);
          if (dIdx !== -1 && oIdx < dIdx) {
            if (atTime && !isRouteActiveAroundTime(r, atTime)) continue;
            return true; 
          }
        }
      }
    }
  }
  return false;
}

async function calculateRouteScore(legs, searchTime) {
  if (!legs || legs.length === 0) return { actualDuration: 0, score: Infinity, transferCount: 0 };
  
  // 定義深夜時段 (00:00-06:00)
  const tripStartTime = legs[0].departTime;
  const isDeepNight = tripStartTime.getHours() >= 0 && tripStartTime.getHours() < 6;

  // 判定是否存在現時時段內實際運作嘅直達服務
  // 自選行程模式唔會填寫頁面頂部嘅起點/終點輸入框，令全域 origin/destination
  // 保持 null，所以呢度同 evaluateCandidate() 一樣用預設空物件頂住，避免
  // 讀取 origin.name 嗰陣爆 "Cannot read properties of null" 錯誤。
  const safeOrigin = origin || { name: "", lat: 0, lng: 0 };
  const safeDestination = destination || { name: "", lat: 0, lng: 0 };
  const directExists = hasDirectService(origin, destination, searchTime || tripStartTime);
  
  // 根據直達車判定，調整對應懲罰系數
  const penaltyTransfer = directExists ? PENALTY_TRANSFER : 0; 

  let score = 0;
  let transferCount = 0;
  let prevCompany = null;
  let prevAlightStopId = null; 
  
  const startTime = legs[0].departTime;
  const endTime = legs[legs.length - 1].arriveTime;
  const actualDuration = (endTime - startTime) / 60000; 
  
  const waitTime = searchTime ? Math.max(0, (startTime - searchTime) / 60000) : 0;

  const totalMinutes = actualDuration + waitTime;
  score += Math.ceil(totalMinutes / 5) * 0.5;

  const isLantau = computeIsLantauTrip(safeOrigin, safeDestination);
  
  // === 判定北大嶼山本地行程 ===
  const isLocalTCOrAirport = isLantau && isTungChungOrAirportLocal(safeOrigin, safeDestination);

  legs.forEach((leg, idx) => {
    if (leg.type === "walk") {
      const isTransferWalk = !directExists && (idx > 0 && idx < legs.length - 1);
      if (!isTransferWalk) {
        // 已取消步行分數懲罰
        const walkPenalty = 0;
        score += walkPenalty + (leg.minutes * MULTIPLIER_WALK);
      }
    } else if (leg.type === "ride") {
      if (prevCompany !== null) {
        transferCount++;
        
        // 深夜取消轉乘及跨公司懲罰
        if (!isDeepNight) {
            // 轉車站判定：同時檢查落車站同上車站個名，並加入跨公司轉車站判斷 (isMultiCompanyStation)，
            const alightStopName = etaDb.stopList[prevAlightStopId]?.name?.zh || "";
            const boardStopName = etaDb.stopList[leg.boardStopId]?.name?.zh || "";
            const isOfficialInterchange =
              isOfficialInterchangeName(alightStopName) ||
              isOfficialInterchangeName(boardStopName) ||
              isMultiCompanyStation(prevAlightStopId) ||
              isMultiCompanyStation(leg.boardStopId);
            
            let currentPenaltyTransfer = penaltyTransfer;
            
            if (isOfficialInterchange) {
                // 免除從區內前往位於區內轉車站的轉車懲罰
                currentPenaltyTransfer = 0; 
                
                // 如果是九巴路線，盡量使用旗下轉車站轉車 (給予獎勵)
                if (leg.co === "kmb" && prevCompany === "kmb") {
                    score -= 15; 
                }
            }

            score += currentPenaltyTransfer; 
            
            const isExempt = !directExists;
            if (!isExempt) {
              score += PENALTY_CROSS_CO; 
            }
        }
      }
      
      prevCompany = leg.co;
      prevAlightStopId = leg.alightStopId;

      // === 大嶼山路線評分邏輯 ===
      if (isLantau) {
        if (isLocalTCOrAirport) {
          const isERoute = /^E\d+/i.test(leg.routeNo) && !/^E21/i.test(leg.routeNo);
          const isCityboundE = isERoute && leg.r && !LANTAU_KEYWORDS.test(leg.r.dest?.zh || "");
          const isSouthLantauRoute = /^(3M|11|23)$/i.test(leg.routeNo);
          const isSouthLantauOutbound = isSouthLantauRoute && leg.r && !/東涌|機場/i.test(leg.r.dest?.zh || "");

          if (isCityboundE || isSouthLantauOutbound) {
            score += 10; 
          }
        } else {
          const alightStopName = etaDb.stopList[leg.alightStopId]?.name?.zh || "";
          const isLantauGatewayInterchange = /青嶼幹線|屯門赤鱲角隧道/i.test(alightStopName);
          const isCityboundAE = /^[AE]/i.test(leg.routeNo) && leg.r && !LANTAU_KEYWORDS.test(leg.r.dest?.zh || "");
          const isExemptGateway = isLantauGatewayInterchange && isCityboundAE;

          const isPreferred = /^E21/i.test(leg.routeNo) || /^S/i.test(leg.routeNo) || leg.co === "nlb" || isExemptGateway;
          if (!isPreferred) {
            score += 40; 
          }
        }
      }
    }
  });

// 如果用戶設定排序準則為車費，分數計算權重轉化為以車費為主，時間為次
  if (sortMode === "fare") {
    const rideLegsForScore = legs.filter(l => l.type === "ride");
    const fareResultForScore = await computeTripFare(rideLegsForScore);
    // 冇齊車費資料嘅組合，車費排序時要排到最後，唔應該當佢係 0 蚊而錯誤排前
    score = (typeof fareResultForScore.totalFare === "number" ? fareResultForScore.totalFare : 9999) * 10 + actualDuration * 0.1;
  }

  return { actualDuration, score, transferCount };
}

/* ---------------- Trip detection ---------------- */
const LANTAU_KEYWORDS = /機場|東涌|迪士尼|博覽館|港珠澳|大嶼山|赤鱲角|國泰城|航天城|後勤區|飛機|大澳|梅窩|塘福|石壁|石門甲|昂坪|愉景灣|欣澳|東邨|東薈城|空運|航空|大橋香港口岸|客運大樓|貨運站|地面運輸中心|維修區/i;
const OFFICIAL_INTERCHANGE_REGEX = /轉車站|轉乘站|城門隧道|大欖隧道|大老山隧道|獅子山隧道|青沙公路|屯門公路|粉嶺公路|將軍澳隧道|啟德隧道|西區海底隧道|海底隧道|東區海底隧道|青嶼幹線|屯門赤鱲角隧道|將藍隧道|香港仔隧道/i;

// 九巴路線，引用轉車站名單（kmb_bbi_stop_id.json）擴充官方轉車站嘅判斷。
let kmbBbiInterchangeNames = new Set();
function buildKmbBbiInterchangeNames(kmbBbiStopDb) {
  kmbBbiInterchangeNames = new Set();
  if (!kmbBbiStopDb) return;
  for (const entries of Object.values(kmbBbiStopDb)) {
    if (!Array.isArray(entries)) continue;
    for (const e of entries) {
      const zh = (e && e.zh) ? cleanStopName(e.zh) : "";
      if (zh) kmbBbiInterchangeNames.add(zh);
    }
  }
}
function isOfficialInterchangeName(name) {
  if (!name) return false;
  if (OFFICIAL_INTERCHANGE_REGEX.test(name)) return true;
  if (!kmbBbiInterchangeNames.size) return false;
  const cleaned = cleanStopName(name);
  if (!cleaned) return false;
  for (const bbiName of kmbBbiInterchangeNames) {
    if (cleaned.includes(bbiName) || bbiName.includes(cleaned)) return true;
  }
  return false;
}

function isLantauCoord(lat, lng){
  return lat >= 22.19 && lat <= 22.36 && lng >= 113.83 && lng <= 114.06;
}
function computeIsLantauTrip(origin, destination){
  if (LANTAU_KEYWORDS.test(origin.name) || LANTAU_KEYWORDS.test(destination.name)) return true;
  if (isLantauCoord(origin.lat, origin.lng) || isLantauCoord(destination.lat, destination.lng)) return true;
  return false;
}

const HK_ISLAND_KEYWORDS = /中環|金鐘|灣仔|銅鑼灣|天后|炮台山|北角|鰂魚涌|太古|西灣河|筲箕灣|柴灣|小西灣|堅尼地城|西營盤|香港大學|薄扶林|數碼港|香港仔|黃竹坑|鴨脷洲|海洋公園|赤柱|淺水灣|跑馬地|大坑/i;

function isHKIslandCoord(lat, lng){
  return lat >= 22.19 && lat <= 22.30 && lng >= 114.11 && lng <= 114.27;
}

function computeIsCrossHarbourTrip(orig, dest){
  const origHKI = HK_ISLAND_KEYWORDS.test(orig.name) || isHKIslandCoord(orig.lat, orig.lng);
  const destHKI = HK_ISLAND_KEYWORDS.test(dest.name) || isHKIslandCoord(dest.lat, dest.lng);
  return origHKI !== destHKI;
}

function getRegionWalkLimit(lat, lng, name) {
  const KOWLOON_KEYWORDS = /尖沙咀|尖東|旺角|油麻地|佐敦|深水埗|長沙灣|荔枝角|美孚|九龍城|土瓜灣|紅磡|啟德|新蒲崗|黃大仙|鑽石山|慈雲山|牛池灣|九龍灣|牛頭角|觀塘|藍田|油塘|秀茂坪|順利|九龍塘|何文田|大角咀|石夾尾/;
  
  // 港島地區判定
  const isHKIsland = isHKIslandCoord(lat, lng) || HK_ISLAND_KEYWORDS.test(name);
  
  // 九龍地區判定
  const isKowloon = KOWLOON_KEYWORDS.test(name) || (lat > 22.298 && lat <= 22.355 && lng >= 114.09 && lng <= 114.24);

  // 港島與九龍統一為 500m
  if (isHKIsland || isKowloon) {
    return 500; 
  }

  // 新界及離島預設為 700m
  return 700; 
}

// 判定行程是否屬於「東涌市中心內」或「來往機場」的本地行程
function isTungChungOrAirportLocal(orig, dest) {
  if (!orig || !dest) return false;
  
  // 東涌各屋邨及機場相關關鍵字
  const localKeywords = /東涌|逸東|滿東|迎東|裕雅|富東|裕東|映灣園|藍天海岸|昇薈|東環|機場|博覽館|航天城|國泰城|後勤區|飛機維修區|民航處|客運大樓|地面運輸中心/i;
  
  // 北大嶼山本地（東涌及機場）的經緯度範圍
  const isLocalCoord = (lat, lng) => lat >= 22.27 && lat <= 22.34 && lng >= 113.88 && lng <= 113.97;
  
  const origLocal = localKeywords.test(orig.name) || isLocalCoord(orig.lat, orig.lng);
  const destLocal = localKeywords.test(dest.name) || isLocalCoord(dest.lat, dest.lng);
  
  return origLocal && destLocal;
}

/* ---------------- 車費計算 ---------------- */
function isHolidayFareDate(when) {
  const w = when || new Date();
  if (w.getDay() === 0) return true; // 星期日普遍當假日收費
  if (!routeFareDb || !Array.isArray(routeFareDb.holidays)) return false;
  const yyyy = w.getFullYear();
  const mm = String(w.getMonth() + 1).padStart(2, '0');
  const dd = String(w.getDate()).padStart(2, '0');
  return routeFareDb.holidays.includes(`${yyyy}${mm}${dd}`);
}

function _fareNameNorm(s) {
  return String(s || "")
    .replace(/\(.*?\)|（.*?）/g, "")   // 去除括住嘅備註，例如「(拍卡機設於翠寧花園)」
    .replace(/[\s　]/g, "")
    .trim();
}

// 港鐵巴士全程劃一收費
function buildMtrBusFareIndex(mtrBusRoutesJson) {
  const out = {};
  if (!mtrBusRoutesJson || typeof mtrBusRoutesJson !== "object") return out;
  for (const rec of Object.values(mtrBusRoutesJson)) {
    if (!rec || !rec.route) continue;
    const bound = (rec.bound && rec.bound["mtr-bus"]) || "O";
    const fares = Array.isArray(rec.fares) ? rec.fares.map(parseFloat).filter(Number.isFinite) : [];
    const faresHol = Array.isArray(rec.faresHoliday) ? rec.faresHoliday.map(parseFloat).filter(Number.isFinite) : [];
    if (!fares.length) continue;
    const flatFare = fares[0];
    const flatFareHol = faresHol.length ? faresHol[0] : null;
    if (!out[rec.route]) out[rec.route] = {};
    out[rec.route][bound] = { fare: flatFare, fareHoliday: flatFareHol };
  }
  return out;
}

// 九巴短途分段雙向收費
function _findStopIdxByName(stops, targetName) {
  const target = _fareNameNorm(targetName);
  if (!target || !stops) return -1;
  let best = -1;
  for (let i = 0; i < stops.length; i++) {
    const s = etaDb.stopList[stops[i]];
    if (!s) continue;
    const name = _fareNameNorm(s.name?.zh || s.name?.en || "");
    if (!name) continue;
    if (name === target) return i; // 完全相符優先
    if (best === -1 && (name.includes(target) || target.includes(name))) best = i;
  }
  return best;
}

function getRegionalTwoWayFare(r, co, boardIdx, alightIdx) {
  if (!regionalTwoWayFareDb || !Array.isArray(regionalTwoWayFareDb.routes)) return null;
  if (co !== "kmb" && co !== "nlb") return null;
  const routeNo = String(r.route || "").toUpperCase();
  const candidates = regionalTwoWayFareDb.routes.filter(x => String(x.route_number || "").toUpperCase() === routeNo);
  if (!candidates.length) return null;
  const stops = (r.stops && (r.stops[co] || r.stops[r.primaryCo])) || null;
  if (!stops) return null;

  let bestFare = null;
  for (const cand of candidates) {
    const idxA = _findStopIdxByName(stops, cand.start);
    const idxB = _findStopIdxByName(stops, cand.end);
    if (idxA < 0 || idxB < 0) continue;
    const lo = Math.min(idxA, idxB), hi = Math.max(idxA, idxB);
    // 雙向收費：只要上車同落車都喺呢個範圍之內就適用（唔理方向）
    if (boardIdx >= lo && boardIdx <= hi && alightIdx >= lo && alightIdx <= hi) {
      const f = parseFloat(cand.fare);
      if (Number.isFinite(f) && (bestFare === null || f < bestFare)) bestFare = f;
    }
  }
  return bestFare;
}

function getSegFare(r, co, boardIdx, alightIdx, when) {
  if (!r || boardIdx == null || alightIdx == null || alightIdx <= boardIdx) return null;

const stops = (r.stops && (r.stops[co] || r.stops[r.primaryCo])) || null;

  // 城門隧道轉車站，途經路線必須使用上車站計算優惠的車費
  if (stops && boardIdx + 1 < stops.length) {
    const currentStopId = stops[boardIdx];
    const nextStopId = stops[boardIdx + 1];
    if (currentStopId && nextStopId) {
      const currentName = _fareNameNorm(etaDb.stopList[currentStopId]?.name?.zh || "");
      const nextName = _fareNameNorm(etaDb.stopList[nextStopId]?.name?.zh || "");
      if (currentName.includes("城門隧道轉車站") && nextName.includes("城門隧道轉車站")) {
        boardIdx = boardIdx + 1;
      }
    }
  }

  // 港鐵巴士劃一收費，唔理會上落車站
  if ((co === "mtrb" || co === "mtr-bus") && mtrBusRouteFareDb) {
    const routeEntry = mtrBusRouteFareDb[r.route];
    if (routeEntry) {
      const bound = (r.bound && (r.bound[co] || r.bound.mtrb || r.bound["mtr-bus"])) || Object.keys(routeEntry)[0];
      const info = routeEntry[bound] || routeEntry[Object.keys(routeEntry)[0]];
      if (info) {
        const isHol = isHolidayFareDate(when);
        const v = (isHol && Number.isFinite(info.fareHoliday)) ? info.fareHoliday : info.fare;
        if (Number.isFinite(v)) return Math.round(v * 10) / 10;
      }
    }
  }

  // 九巴短途雙向分段收費
  const regionalFare = getRegionalTwoWayFare(r, co, boardIdx, alightIdx);

  const isHol = isHolidayFareDate(when);
  const table = (isHol && Array.isArray(r.faresHoliday) && r.faresHoliday.length) ? r.faresHoliday : r.fares;

  let normalFare = null;
  if (Array.isArray(table) && table.length) {
    const stops = (r.stops && (r.stops[co] || r.stops[r.primaryCo])) || null;
    if (stops && table.length === stops.length - 1) {
      //直接讀取上車站對應的車費，不與落車站相減
      const fareVal = parseFloat(table[boardIdx]);
      if (Number.isFinite(fareVal)) {
        normalFare = Math.round(fareVal * 10) / 10;
      }
    } else if (table.length === 1) {
      // 【修正 NLB 假日車費未能顯示】新大嶼山巴士（同部分其他路線）好多時
      // 全程劃一收費，fares／faresHoliday 陣列淨係得一個數，同上面「陣列
      // 長度必須等於站數減一」呢個假設對唔上——之前呢個情況直接跌漏晒，
      // 完全冇車費顯示（假日 faresHoliday 通常只得一個劃一價，比平日
      // fares 陣列更容易撞正呢個情況，所以睇落好似專係假日車費唔見）。
      // 呢度加返呢個 fallback：陣列淨係一個元素就當全程劃一價使用，
      // 唔理上車站索引。
      const fareVal = parseFloat(table[0]);
      if (Number.isFinite(fareVal)) {
        normalFare = Math.round(fareVal * 10) / 10;
      }
    } else if (stops && stops.length > 1) {
      // 【修正】分段／分區收費路線嘅車費陣列長度，成日同「站數減一」對唔
      // 上——例如嶼巴 1 號線（梅窩碼頭→大澳）實際係 56 個站但只得 52 個
      // 收費级距，因為連續幾個站會共用同一個价位（stage/zone fare），
      // 陣列本身冇要求同站數一一對應。舊版淨係處理「啱啱好對得上」同
      // 「全程劃一價」呢兩種情況，一旦兩者都對唔上（好似呢條路線咁），
      // 就完全跌漏、乜車費都冇顯示。而家改為按上車站喺全程嘅相對位置，
      // 按比例映射去收費表對應嘅级距，保留收費级距遞增/遞減嘅單調關係，
      // 好過完全計唔到車費。
      const ratio = boardIdx / (stops.length - 1);
      const idx = Math.min(table.length - 1, Math.max(0, Math.floor(ratio * table.length)));
      const fareVal = parseFloat(table[idx]);
      if (Number.isFinite(fareVal)) {
        normalFare = Math.round(fareVal * 10) / 10;
      }
    }
  }

  if (regionalFare !== null) {
    // 短途雙向收費只喺佢平過正常收費先套用，避免因為地名配對誤中而抬高／扣減錯車費
    if (normalFare === null || regionalFare < normalFare) return Math.round(regionalFare * 10) / 10;
  }
  return normalFare;
}

/* ---------------- 轉乘優惠計算 ----------------
 * 用嚟取代「每程車費直接相加」嘅粗疏做法。九巴部分用 bbi_f1.json / bbi_b1.json
 * （官方 BBI_routeF1.js / BBI_routeB1.js 整理版，含明確 $ 折扣金額）；城巴/新巴部分
 * 用 ctb_bbi_data.json。由於呢批資料入面嘅「建議轉車站」係用九巴/城巴自己內部嘅站
 * 代號表示，同呢個網站用緊嘅 stopId 體系對應唔上，所以配對邏輯用「路線組合 + 轉乘
 * 時限」嚟判斷是否適用（呢個亦係實際上落 Octopus 系統認定轉乘優惠嘅核心條件），
 * 而唔強行要求轉車站完全一致 —— 未能 100% 還原「必須喺指定站轉乘」呢個細節，但已經
 * 遠比「完全唔計轉乘優惠」準確。
 */
function _routeKeyForBbi(routeNo) {
  return String(routeNo || "").toUpperCase().trim();
}

function _transferGapMinutes(prevLeg, nextLeg) {
  if (!prevLeg || !nextLeg || !prevLeg.departTime || !nextLeg.departTime) return null;
  return Math.max(0, (nextLeg.departTime.getTime() - prevLeg.departTime.getTime()) / 60000);
}

function _kmbBbiDiscountFor(prevLeg, nextLeg, transferIndex = 1) {
  if (!bbiHeavyLoaded || (!bbiF1Db && !bbiB1Db)) return 0;
  if (prevLeg.co !== "kmb" || nextLeg.co !== "kmb") return 0;
  const gap = _transferGapMinutes(prevLeg, nextLeg);
  if (gap === null) return 0;

  const key = _routeKeyForBbi(prevLeg.routeNo);
  const nextRoute = _routeKeyForBbi(nextLeg.routeNo);
  const tables = [bbiF1Db, bbiB1Db];

  let best = 0;
  for (const table of tables) {
    if (!table) continue;
    const entries = table[key] || table[prevLeg.routeNo] || null;
    if (!Array.isArray(entries)) continue;
    for (const e of entries) {
      if (_routeKeyForBbi(e.bbi_route_number) !== nextRoute) continue;

      // 【修正】用戶核實返官方 KMB BBI 資料入面嘅 "max_change" 欄位，
      // 代表「呢個轉乘優惠最多適用喺第幾程連續轉乘」（例如 max_change=1
      // 即係淨係第一程轉乘先啱用，跟住嘅第二、第三程轉乘就唔應該再
      // 套用呢個優惠，要收全費）。之前一個版本誤以為呢個欄位係
      // success_cnt（歷史比對次數）而移除咗呢個檢查，導致好似
      // 89D→88→600 呢類已經用咗一次轉乘優惠、去到第二程轉乘
      // （88→600）本應收全費嘅組合，都錯誤地又攞咗一次折扣。而家
      // 改為：如果呢個優惠有明確 max_change 上限，而目前呢一程屬於
      // 超出上限嘅連續轉乘次數（transferIndex > max_change），就唔
      // 攞呢條優惠，跳過去搵下一條符合資格嘅記錄（搵唔到就全費）。
      const maxChange = parseInt(e.max_change, 10);
      if (Number.isFinite(maxChange) && maxChange > 0 && transferIndex > maxChange) continue;

      const timeLimit = parseFloat(e.time_limit);
      if (Number.isFinite(timeLimit) && gap > timeLimit) continue;

      // discount_raw／discount_type 決定咗 e.discount 呢個數字實際代表乜嘢，
      // 唔可以不分青紅皂白全部當「應扣減金額」，否則例如 discount_raw 係
      // 「兩程合共 $X」（discount_type = combined_fare）呢種情況，$X 其實
      // 係兩程車費合計嘅總價（通常好細，例如 $8），若果將佢當「扣減金額」
      // 直接減落去，會變成扣得離晒譜、甚至令車費變負數。各 discount_type
      // 嘅正確處理方式：
      //   free          : discount_raw 係「免費」，第二程應該全免（要扣嘅
      //                   金額係第二程原價，而唔係原始資料入面嘅 0）
      //   discount/return: discount_raw 係「減 $X」/「回贈 $X」，$X 本身
      //                   就已經係應扣金額，可以直接使用
      //   combined_fare : discount_raw 係「兩程合共 $X」，要用「兩程車費
      //                   相加」減返 $X，先係應該扣減嘅金額
      //   fixed_fare    : discount_raw 係「付 $X」，即第二程固定收 $X，
      //                   要用「第二程原價」減返 $X，先係應該扣減嘅金額
      //   其餘／解析唔到嘅類型：寧願唔套用優惠，都好過亂計錯車費
      const rawVal = parseFloat(e.discount);
      let candidateDiscount = 0;
      switch (e.discount_type) {
        case "free":
          candidateDiscount = (typeof nextLeg.fare === "number") ? nextLeg.fare : 0;
          break;
        case "discount":
        case "return":
          if (Number.isFinite(rawVal)) candidateDiscount = rawVal;
          break;
        case "combined_fare":
          if (Number.isFinite(rawVal) && typeof prevLeg.fare === "number" && typeof nextLeg.fare === "number") {
            candidateDiscount = (prevLeg.fare + nextLeg.fare) - rawVal;
          }
          break;
        case "fixed_fare":
          if (Number.isFinite(rawVal) && typeof nextLeg.fare === "number") {
            candidateDiscount = nextLeg.fare - rawVal;
          }
          break;
        default:
          candidateDiscount = 0;
      }

      if (candidateDiscount > best) best = candidateDiscount;
    }
  }
  return Math.max(0, best);
}

/* ---------------- 城巴 concessionApi 即時轉乘優惠查詢 ----------------
 * value.ir 係一個陣列，每個元素代表一個「次程」選擇，包含：
 *   secondProvider / route（次程公司／路線編號）、direction（次程方向）、
 *   stopName（建議轉車站名）、discount（"FR"/"TF"/"L1"/"L2"）、
 *   discountAmount.adult（FR 用：減收金額）、totalFare.adult（TF 用：
 *   兩程合共車資）、timeLimit（轉乘時限，分鐘）、remark（附加條款）。
 */
function _ctbTrimUp(s) {
  return String(s || "").trim().toUpperCase();
}

/* ---------------- 城巴轉乘適用登車範圍解析與核對 ----------------
 * concessionApi 每條 ir 記錄嘅 remark 欄位，係用嚟講明「呢個轉乘優惠淨係
 * 適用於響邊個範圍登車嘅乘客」。同一組 routeA→routeB，官方時常會回傳幾條
 * bound/direction/secondDirection 都完全一樣，但 discount 類型（L1/L2/FR/
 * TF）同 remark 唔同嘅記錄——即係話，淨係靠原有嘅「方向比對」評分，呢幾
 * 條記錄分數會打平手，變成永遠揀到排得最前嗰一條，完全冇理會乘客實際上
 * 車站係咪真係落喺呢條記錄講明嘅範圍入面，容易「撞中」錯誤嘅折扣類型。
 * 例如（實測 608→22 嘅其中一組）：
 *   discount:"L1"（回贈首程車費）remark:「只適用於在東區海底隧道巴士轉乘
 *     站或之後沿途各站登上首程路線的乘客。」
 *   discount:"L2"（次程免費）    remark:「只適用於在香港島沿途各站登上首
 *     程路線的乘客。」
 * 呢兩條記錄先前完全冇被 remark 篩走任何一條，最終揀邊條淨係睇邊條排先，
 * 同乘客實際喺邊度上首程車完全冇關係，車費就有機會計錯。
 *
 * remark 常見句式（X 代表一個或多個站名／路名）：
 *   1. 只適用於在 X 或其後沿途各站登(上首程路線|上次程路線|車)的乘客。
 *   2. 只適用於在 X 或之後沿途各站登(上首程路線|上次程路線|車)的乘客。
 *   3. 只適用於在 X 或之前沿途各站登(上首程路線|上次程路線|車)的乘客。
 *   4. 只適用於在 X 沿途各站登(上首程路線|上次程路線|車)的乘客。（冇「或之
 *      前／之後」→ 唔限先後次序，淨係做名稱／地區比對）
 *   5. 只適用於首程在 X 站前各站登車的乘客。
 *   6. 只適用於首程在 X 站或之後各站登車的乘客。
 *   7. 只適用於首程在 X, Y 前各站登車的乘客。（X、Y 通常係同一個分界位置
 *      嘅唔同寫法，屬「或」關係）
 * 一個 remark 字串可能包含多句（用 \r\n 或句號分隔），每句都係獨立條件，
 * 全部都要成立先算呢條優惠適用（AND 關係）。
 *
 * leg 判斷：句子明講「首程」／「登上首程路線」→ 首程（prevLeg）；明講
 * 「次程」／「登上次程路線」→ 次程（nextLeg）；完全冇明講（淨係「登車」）
 * 時，根據觀察到嘅實際資料，呢類 remark 絕大多數都係用嚟界定「首程」上車
 * 範圍（決定用邊個轉乘優惠），所以預設當「首程」。
 */
function _ctbParseRemarkConstraints(remarkText) {
  const out = [];
  const raw = String(remarkText || "").trim();
  if (!raw) return out;

  // 用換行或句號分句，每句獨立解析成一個 constraint（AND 關係）。
  const sentences = raw.split(/[\r\n]+|(?<=。)/).map(s => s.trim()).filter(Boolean);

  for (const sentence of sentences) {
    const c = _ctbParseOneRemarkSentence(sentence);
    if (c) out.push(c);
    else console.debug(`[城巴轉乘] remark 句子未能識別格式，略過範圍檢查（唔會用嚟擋節省）：「${sentence}」`);
  }
  return out;
}

// 將 "X, Y" 咁樣逗號分隔嘅多個站名／地名拆開，並剝走尾隨嘅「站」字。
function _ctbSplitAnchors(text) {
  return String(text || "")
    .split(/[,，、及與]/)
    .map(s => s.replace(/站$/, "").trim())
    .filter(Boolean);
}

// remark 句式解析器
function _ctbParseOneRemarkSentence(sentence) {
  let m;

  // 句式 A：在 X 或其後／或之後沿途各站登(上首程路線|上次程路線|車)的乘客
  m = sentence.match(/在(.+?)或(?:其後|之後)沿途各站登(上首程路線|上次程路線|車)的乘客/);
  if (m) {
    return { leg: m[2] === "上次程路線" ? "second" : "first", type: "after", anchors: _ctbSplitAnchors(m[1]) };
  }

  // 句式 B：在 X 或之前沿途各站登(上首程路線|上次程路線|車)的乘客
  m = sentence.match(/在(.+?)或之前沿途各站登(上首程路線|上次程路線|車)的乘客/);
  if (m) {
    return { leg: m[2] === "上次程路線" ? "second" : "first", type: "before", anchors: _ctbSplitAnchors(m[1]) };
  }

  // 句式 C：在 X 沿途各站登(上首程路線|上次程路線|車)的乘客
  m = sentence.match(/在(.+?)沿途各站登(上首程路線|上次程路線|車)的乘客/);
  if (m) {
    return { leg: m[2] === "上次程路線" ? "second" : "first", type: "along", anchors: _ctbSplitAnchors(m[1]) };
  }

  // 句式 D ：首程/次程 在 X 及 Y 之間各站登車的乘客
  m = sentence.match(/(首程|次程)?在(.+?)及(.+?)之間各站登(?:上首程路線|上次程路線|車)的乘客/);
  if (m) {
    return {
      leg: m[1] === "次程" ? "second" : "first",
      type: "between",
      anchors: [..._ctbSplitAnchors(m[2]), ..._ctbSplitAnchors(m[3])]
    };
  }

  // 句式 E ：在 X 登車往 Y 之乘客
  m = sentence.match(/(?:首程|次程)?在(.+?)登車(?:往.+?)?之乘客/);
  if (m) {
    return { leg: "first", type: "along", anchors: _ctbSplitAnchors(m[1]) };
  }

  // 句式 F ：首程/次程 在 X (站)(或)(之)後各站登車的乘客（相容「站後」與「站或之後」）
  m = sentence.match(/(首程|次程)?在(.+?)(?:站)?(?:或)?(?:之後|後)各站登(?:上首程路線|上次程路線|車)的乘客/);
  if (m) {
    return { leg: m[1] === "次程" ? "second" : "first", type: "after", anchors: _ctbSplitAnchors(m[2]) };
  }

  // 句式 G ：首程/次程 在 X (站)前各站登車的乘客
  m = sentence.match(/(首程|次程)?在(.+?)(?:站)?(?:或)?前各站登(?:上首程路線|上次程路線|車)的乘客/);
  if (m) {
    return { leg: m[1] === "次程" ? "second" : "first", type: "before", anchors: _ctbSplitAnchors(m[2]) };
  }

  // 句式 H ：首程/次程 在 X (各站)登車的乘客（如：香園圍口岸、北區及大埔各站、大嶼山各站）
  m = sentence.match(/(首程|次程)?在(.+?)(?:各站)?登(?:上首程路線|上次程路線|車)的乘客/);
  if (m) {
    return { leg: m[1] === "次程" ? "second" : "first", type: "along", anchors: _ctbSplitAnchors(m[2]) };
  }

  return null;
}

// 去除空白同全／半形括號，方便兩個站名之間做子字串比對
// （例如完整站名「德輔道西 (林士街)」對 remark 講嘅「德輔道西」）。
function _ctbNormalizeStopName(s) {
  return String(s || "").replace(/[\s()（）]/g, "").trim();
}

// 攞返某一程車嘅上車站，喺佢自己路線嘅站序陣列入面嘅索引（用嚟同 remark
// 講嘅「或之前／或之後」比先後）。搵唔到就回傳 null（代表冇資料驗證）。
function _ctbLegBoardIdx(leg) {
  if (!leg || !leg.r || !leg.r.stops || !leg.boardStopId) return null;
  const co = leg.co || leg.primaryCo;
  const stops = leg.r.stops[co] || leg.r.stops[Object.keys(leg.r.stops)[0]];
  if (!stops) return null;
  const idx = stops.indexOf(leg.boardStopId);
  return idx === -1 ? null : idx;
}

// 喺某一程車嘅路線站序入面，用名稱子字串比對搵返 remark 提到嘅 anchor 站
// 排喺第幾個位（雙向 includes：完整站名包含 anchor，或者 anchor 包含完整
// 站名，都當撞中，應付「德輔道西」對「德輔道西 (林士街)」呢類簡寫）。
function _ctbFindAnchorIdx(leg, anchorNameRaw) {
  if (!leg || !leg.r || !leg.r.stops) return null;
  const anchorName = _ctbNormalizeStopName(anchorNameRaw);
  if (!anchorName) return null;
  const co = leg.co || leg.primaryCo;
  const stops = leg.r.stops[co] || leg.r.stops[Object.keys(leg.r.stops)[0]];
  if (!stops) return null;
  for (let i = 0; i < stops.length; i++) {
    const s = (typeof etaDb !== "undefined" && etaDb.stopList) ? etaDb.stopList[stops[i]] : null;
    if (!s) continue;
    const zh = _ctbNormalizeStopName(s.name?.zh || s.name || "");
    if (!zh) continue;
    if (zh.includes(anchorName) || anchorName.includes(zh)) return i;
  }
  return null;
}

// 少數 remark 用嘅係「香港島／九龍／新界」呢類大範圍地名（唔係具體站名），
// 冇辦法直接同單一站名做子字串比對。呢度借用現有嘅 HK_ISLAND_KEYWORDS／
// isHKIslandCoord（見上面 Trip detection 部分）做粗略嘅地區判斷，盡量補
// 返呢類 remark 嘅驗證能力；判斷唔到就當冇資料驗證。
const _CTB_KOWLOON_KEYWORDS = /尖沙咀|尖東|旺角|油麻地|佐敦|深水埗|長沙灣|荔枝角|美孚|九龍城|土瓜灣|紅磡|啟德|新蒲崗|黃大仙|鑽石山|慈雲山|牛池灣|九龍灣|牛頭角|觀塘|藍田|油塘|秀茂坪|順利|九龍塘|何文田|大角咀|石硤尾/;
function _ctbGuessHkRegion(name, lat, lng) {
  if ((typeof HK_ISLAND_KEYWORDS !== "undefined" && HK_ISLAND_KEYWORDS.test(name)) ||
      (typeof isHKIslandCoord === "function" && Number.isFinite(lat) && Number.isFinite(lng) && isHKIslandCoord(lat, lng))) {
    return "hkisland";
  }
  if (_CTB_KOWLOON_KEYWORDS.test(name) || (Number.isFinite(lat) && Number.isFinite(lng) && lat > 22.298 && lat <= 22.355 && lng >= 114.09 && lng <= 114.24)) {
    return "kowloon";
  }
  if (Number.isFinite(lat) && Number.isFinite(lng)) return "nt"; // 新界／離島等其餘地方
  return null;
}
// 地名／區域識別
function _ctbAnchorRegion(anchorName) {
  if (/香港島|港島/.test(anchorName)) return "hkisland";
  if (/九龍/.test(anchorName)) return "kowloon";
  if (/大嶼山/.test(anchorName)) return "lantau";
  if (/新界|北區|大埔|元朗|屯門|沙田|葵青|荃灣|西貢/.test(anchorName)) return "nt";
  return null;
}

// 核對單一個 constraint 係咪俾「乘客實際上車站」滿足。原則：只要冇足夠
// 資料去驗證（搵唔到 anchor 對應邊個站、攞唔到上車站索引等），就寧願放
// 過（回傳 true），好過因為解析／比對唔到就誤刪咗本身有效嘅優惠；但只
// 要搵到足夠資料證明唔滿足，就要老實咁擋走呢條記錄。
function _ctbConstraintSatisfied(constraint, prevLeg, nextLeg) {
  const leg = constraint.leg === "second" ? nextLeg : prevLeg;
  if (!leg) return true;

  // 處理站點區間範圍（between）
  if (constraint.type === "between") {
    const actualIdx = _ctbLegBoardIdx(leg);
    if (actualIdx === null) return true;
    if (constraint.anchors.length >= 2) {
      const idxA = _ctbFindAnchorIdx(leg, constraint.anchors[0]);
      const idxB = _ctbFindAnchorIdx(leg, constraint.anchors[1]);
      if (idxA !== null && idxB !== null) {
        const minIdx = Math.min(idxA, idxB);
        const maxIdx = Math.max(idxA, idxB);
        return actualIdx >= minIdx && actualIdx <= maxIdx;
      }
    }
    return true;
  }

  // 處理指定地點/區域登車（along）
  if (constraint.type === "along") {
    const board = (typeof etaDb !== "undefined" && etaDb.stopList) ? etaDb.stopList[leg.boardStopId] : null;
    const boardName = _ctbNormalizeStopName(board?.name?.zh || board?.name || "");
    if (boardName) {
      for (const anchorName of constraint.anchors) {
        const a = _ctbNormalizeStopName(anchorName);
        if (a && (boardName.includes(a) || a.includes(boardName))) return true;
      }
    }
    const boardLoc = board?.location;
    const boardRegion = boardLoc ? _ctbGuessHkRegion(boardName, boardLoc.lat, boardLoc.lng) : null;
    let anyRegionAnchor = false;
    if (boardRegion) {
      for (const anchorName of constraint.anchors) {
        const region = _ctbAnchorRegion(anchorName);
        if (region) {
          anyRegionAnchor = true;
          if (region === boardRegion) return true;
        }
      }
      if (anyRegionAnchor) return false;
    }
    return true;
  }

  // 處理「之後 (after)」與「之前 (before)」
  const actualIdx = _ctbLegBoardIdx(leg);
  if (actualIdx === null) return true;

  let anyAnchorResolvable = false;
  for (const anchorName of constraint.anchors) {
    const anchorIdx = _ctbFindAnchorIdx(leg, anchorName);
    if (anchorIdx === null) continue;
    anyAnchorResolvable = true;
    if (constraint.type === "after" && actualIdx >= anchorIdx) return true;
    if (constraint.type === "before" && actualIdx <= anchorIdx) return true;
  }
  return !anyAnchorResolvable;
}

// 一條候選記錄嘅所有 remarkConstraints 要全部滿足（AND），先算呢條候選對
// 「乘客實際嘅首／次程上車站」嚟講係適用嘅。
function _ctbAllConstraintsSatisfied(remarkConstraints, prevLeg, nextLeg) {
  if (!Array.isArray(remarkConstraints) || !remarkConstraints.length) return true;
  return remarkConstraints.every(c => _ctbConstraintSatisfied(c, prevLeg, nextLeg));
}

// 將 concessionApi 回應（見上面註解嘅格式）整理做扁平陣列，方便逐條篩選比對。
function parseCtbLiveInterchangeResponse(json, routeA, routeB) {
  const out = [];
  if (!json || typeof json !== "object") return out;
  for (const key of Object.keys(json)) {
    const entry = json[key];
    if (!entry || _ctbTrimUp(entry.route) !== routeA) continue;
    const irList = Array.isArray(entry.ir) ? entry.ir : [];
    for (const ir of irList) {
      if (!ir || _ctbTrimUp(ir.route) !== routeB) continue;
      out.push({
        bound: entry.bound || "",
        direction: entry.direction || "",
        secondProvider: (ir.secondProvider || "").trim(),
        secondDirection: ir.direction || "",
        stopName: ir.stopName || "",
        discount: (ir.discount || "").trim().toUpperCase(),
        discountAmount: ir.discountAmount || null,
        totalFare: ir.totalFare || null,
        timeLimit: Number.isFinite(parseFloat(ir.timeLimit)) ? parseFloat(ir.timeLimit) : null,
        remark: (ir.remark || "").trim(),
        // 解析 remark 入面「只適用於響邊個範圍登車」嘅條件，等揀最夾候選
        // 記錄嘅時候，可以連同乘客實際嘅上車站一齊核對（見下面
        // _ctbParseRemarkConstraints／_ctbConstraintSatisfied）。同一條
        // routeA→routeB，官方好多時會回傳幾條 bound/direction 都一樣、但
        // discount 類型／remark 唔同嘅記錄（例如一條話「東區海底隧道轉乘
        // 站或之後上車先啱」，另一條話「香港島沿途各站上車先啱」），單靠
        // 方向比對揀唔返「乘客實際上車站啱唔啱嗰一條」，一定要睇埋 remark。
        remarkConstraints: _ctbParseRemarkConstraints((ir.remark || "").trim())
      });
    }
  }
  return out;
}

// 城巴 concessionApi 唔似 rt.data.gov.hk／raw.githubusercontent.com 咁本身開放
// 俾第三方網站直接 fetch，好大機會冇設 Access-Control-Allow-Origin，令瀏覽器
// 直接擋咗個回應（fetch() 會拋 TypeError: Failed to fetch）。試過「直接 fetch
// → 失敗再經 CORS proxy 攞 JSON」呢個做法之後，發現連經 proxy 都攞唔到（proxy
// 本身都被擋／逾時），所以而家改法：唔再嘗試攞返 JSON 格式嘅回應，改為直接經
// r.jina.ai 將個 API 網址轉做 markdown 文字載入（呢個係 r.jina.ai 嘅本業，
// 對 API 網址一樣有效，冇 CORS 問題），再由攞返嘅 markdown 文字裏面摘出
// 原本嗰段 JSON 出嚟自己 parse。
async function _fetchCtbViaJinaMarkdown(targetUrl) {
  try {
    const proxyUrl = `https://r.jina.ai/${targetUrl}`;
    const r = await fetch(proxyUrl);
    if (!r.ok) {
      console.warn(`[城巴轉乘] 經 r.jina.ai 載入 markdown 回應非 2xx (status ${r.status})：${targetUrl}`);
      return null;
    }
    const text = await r.text();
    const json = _extractJsonFromJinaMarkdown(text);
    if (!json) {
      console.warn(`[城巴轉乘] 由 r.jina.ai markdown 內容摘唔到 JSON：${targetUrl}`);
    }
    return json;
  } catch (err) {
    console.error(`[城巴轉乘] 經 r.jina.ai 載入 markdown 失敗，放棄呢次查詢：${targetUrl}`, err);
    return null;
  }
}

function _extractJsonFromJinaMarkdown(text) {
  if (!text) return null;

  // 情況一：整個回應本身已經係原始 JSON（冇 markdown 包裝）
  try {
    return JSON.parse(text.trim());
  } catch (_) { /* 唔係就試下面嘅 markdown 摘取方式 */ }

  let body = text;
  const markerIdx = body.indexOf("Markdown Content:");
  if (markerIdx !== -1) {
    body = body.slice(markerIdx + "Markdown Content:".length);
  }
  body = body.trim();

  // 剝走可能存在嘅 ```json ... ``` 或 ``` ... ``` code fence
  const fenceMatch = body.match(/```(?:json)?\s*([\s\S]*?)\s*```/i);
  if (fenceMatch) body = fenceMatch[1].trim();

  try {
    return JSON.parse(body);
  } catch (err) {
    // 保險：如果前後仲有雜訊文字，摘返最外層 {...} 再試一次
    const first = body.indexOf("{");
    const last = body.lastIndexOf("}");
    if (first !== -1 && last !== -1 && last > first) {
      try {
        return JSON.parse(body.slice(first, last + 1));
      } catch (err2) {
        console.warn("[城巴轉乘] 摘取最外層 {...} 後仍 parse 唔到 JSON:", err2, body.slice(0, 200));
        return null;
      }
    }
    console.warn("[城巴轉乘] 由 Jina markdown 內容 parse JSON 失敗:", err, body.slice(0, 200));
    return null;
  }
}

// 帶快取（以 Promise 儲存，避免短時間內重覆 fetch 同一組合）嘅即時查詢。
// routeA = 首程路線編號，routeB = 次程路線編號（皆已經過 _routeKeyForBbi 處理）。
// 回傳 parseCtbLiveInterchangeResponse() 嘅輸出陣列；查詢失敗回傳 []。
function fetchCtbLiveInterchange(routeA, routeB) {
  const cacheKey = `${routeA}|${routeB}`;
  if (ctbLiveInterchangeCache.has(cacheKey)) return ctbLiveInterchangeCache.get(cacheKey);

  const targetUrl = `https://www.citybus.com.hk/concessionApi/public/bbi/api/v1/route/tc/${encodeURIComponent(routeA.toLowerCase())}/${encodeURIComponent(routeB.toLowerCase())}`;
  const promise = _fetchCtbViaJinaMarkdown(targetUrl)
    .then(json => {
      const parsed = parseCtbLiveInterchangeResponse(json, routeA, routeB);
      console.debug(`[城巴轉乘] ${routeA} → ${routeB}：撞中 ${parsed.length} 條記錄`, parsed);
      return parsed;
    })
    .catch(err => {
      console.error(`城巴轉乘優惠即時查詢失敗 (${routeA} → ${routeB}):`, err);
      return [];
    });

  ctbLiveInterchangeCache.set(cacheKey, promise);
  return promise;
}

// 按實際落車/上車方向嘅目的地文字，喺多個候選記錄入面揀返最夾嘅一條
// （例如 S52 兩個方向都可能同時查到 ir 記錄，要揀返同呢程實際方向相符嗰條）。
function _pickBestCtbLiveMatch(candidates, prevLeg, nextLeg, gap) {
  const prevDestZh = (prevLeg.r && prevLeg.r.dest && prevLeg.r.dest.zh) || "";
  const nextDestZh = (nextLeg.r && nextLeg.r.dest && nextLeg.r.dest.zh) || "";

  let best = null;
  let bestScore = -1;
  for (const c of candidates) {
    if (c.timeLimit !== null && gap > c.timeLimit) continue; // 超過轉乘時限，唔適用
    // 同一組 bound/direction/secondDirection 有時會撞出幾條 discount 類型
    // 唔同嘅記錄（例如 L1 vs L2），單靠下面嘅方向評分分唔出邊條先啱，一
    // 定要用 remark 講明嘅上車範圍，同乘客實際嘅首／次程上車站對比先
    // 揀得準；唔符合範圍嘅記錄喺呢度直接擋走，唔會入到落面評分。
    if (!_ctbAllConstraintsSatisfied(c.remarkConstraints, prevLeg, nextLeg)) continue;
    let score = 0;
    if (prevDestZh && c.direction && (c.direction === prevDestZh || prevDestZh.includes(c.direction) || c.direction.includes(prevDestZh))) score += 2;
    if (nextDestZh && c.secondDirection && (c.secondDirection === nextDestZh || nextDestZh.includes(c.secondDirection) || c.secondDirection.includes(nextDestZh))) score += 1;
    if (score > bestScore) { bestScore = score; best = c; }
  }
  return best;
}

// 即時計算城巴（含跨公司）轉乘優惠。回傳：
//   discount          : FR 類「減收」金額（要喺次程車費度直接扣）
//   totalFareOverride : TF 類「兩程合共車資」（要用「兩程合計 - 呢個數」嚟計扣減）
//   rebateFirstLeg     : L1 類「回贈首程車費」金額（要喺首程車費度扣）
//   secondLegFree      : L2 類「次程免費」金額（要喺次程車費度扣）
async function _ctbLiveDiscountFor(prevLeg, nextLeg) {
  const none = { discount: 0, totalFareOverride: null, rebateFirstLeg: 0, secondLegFree: 0 };
  // concessionApi 係城巴自己嘅轉乘優惠資料，只要首程或次程其中一程係城巴
  // 就有機會撞中（可以係城巴轉城巴，亦可以係城巴轉/接其他公司，例如龍運）。
  if (prevLeg.co !== "ctb" && nextLeg.co !== "ctb") return none;
  const gap = _transferGapMinutes(prevLeg, nextLeg);
  if (gap === null) return none;

  const routeA = _routeKeyForBbi(prevLeg.routeNo);
  const routeB = _routeKeyForBbi(nextLeg.routeNo);
  if (!routeA || !routeB) return none;

  const candidates = await fetchCtbLiveInterchange(routeA, routeB);
  if (!candidates.length) return none;

  const best = _pickBestCtbLiveMatch(candidates, prevLeg, nextLeg, gap);
  if (!best) return none;

  const result = { discount: 0, totalFareOverride: null, rebateFirstLeg: 0, secondLegFree: 0 };
  switch (best.discount) {
    case "FR": {
      // 減收 discountAmount
      const amt = parseFloat(best.discountAmount && best.discountAmount.adult);
      if (Number.isFinite(amt)) result.discount = amt;
      break;
    }
    case "TF": {
      // 兩程優惠車資合共 totalFare
      const tf = parseFloat(best.totalFare && best.totalFare.adult);
      if (Number.isFinite(tf)) result.totalFareOverride = tf;
      break;
    }
    case "L1":
      // 回贈首程車費
      result.rebateFirstLeg = typeof prevLeg.fare === "number" ? prevLeg.fare : 0;
      break;
    case "L2":
      // 次程免費
      result.secondLegFree = typeof nextLeg.fare === "number" ? nextLeg.fare : 0;
      break;
    default:
      break;
  }
  return result;
}

// 計算整個行程嘅車費：由各程車費相加做基礎，再扣減沿途所有符合資格嘅轉乘優惠。
// 回傳 { totalFare, discount } ；如果冇齊車費資料就回傳 { totalFare: null, discount: 0 }。
async function computeTripFare(rideLegs) {
  const hasFullFareInfo = rideLegs.length > 0 && rideLegs.every(leg => typeof leg.fare === "number");
  if (!hasFullFareInfo) return { totalFare: null, discount: 0 };

  // 備份並還原原始車費，避免多次計算或排序時折扣重複遞減
  for (const leg of rideLegs) {
    if (leg.originalFare === undefined) {
      leg.originalFare = leg.fare;
    } else {
      leg.fare = leg.originalFare;
    }
    leg.hasUnquantifiedCtbDiscount = false;
  }

  // 記錄每一程應扣減的折扣金額。注意：呢個陣列可以喺同一次遍歷入面被
  // 「前一程」（例如城巴 L1「回贈首程車費」）同「下一程」（例如 FR/L2/
  // 九巴 BBI）兩邊都寫入，所以要用 Math.max 疊加，唔可以直接覆寫，
  // 避免蓋走另一個轉乘對已經計落嘅折扣。
  const discounts = new Array(rideLegs.length).fill(0);

  let kmbTransferCount = 0; // 追蹤九巴連續轉車次數
  for (let i = 1; i < rideLegs.length; i++) {
    const prevLeg = rideLegs[i - 1];
    const nextLeg = rideLegs[i];

    let kmbDiscount = 0;
    if (prevLeg.co === "kmb" && nextLeg.co === "kmb") {
      kmbTransferCount++;
      kmbDiscount = _kmbBbiDiscountFor(prevLeg, nextLeg, kmbTransferCount);
    } else {
      kmbTransferCount = 0; // 如果中途轉乘了其他公司，重置計數
    }

    if (kmbDiscount > 0) {
      discounts[i] = Math.max(discounts[i], kmbDiscount);
      continue;
    }

    if (prevLeg.co !== "ctb" && nextLeg.co !== "ctb") continue;

    const ctb = await _ctbLiveDiscountFor(prevLeg, nextLeg);
    if (ctb.totalFareOverride !== null) {
      // TF：呢兩程合計直接用返官方公佈嘅套餐總價
      const twoLegSum = prevLeg.originalFare + nextLeg.originalFare;
      const diff = twoLegSum - ctb.totalFareOverride;
      if (diff > 0) discounts[i] = Math.max(discounts[i], diff);
    } else if (ctb.rebateFirstLeg > 0) {
      // L1：回贈首程車費 —— 扣減記落上一程（i-1），唔係呢一程
      discounts[i - 1] = Math.max(discounts[i - 1], ctb.rebateFirstLeg);
    } else if (ctb.secondLegFree > 0) {
      // L2：次程免費 —— 扣減記落呢一程（i）
      discounts[i] = Math.max(discounts[i], ctb.secondLegFree);
    } else if (ctb.discount > 0) {
      // FR：減收指定金額 —— 扣減記落呢一程（i）
      discounts[i] = Math.max(discounts[i], ctb.discount);
    }
  }

  // 將計算得到的轉乘優惠直接套用到各程的 fare 上，供畫面渲染正確的折後價錢
  let totalDiscount = 0;
  for (let i = 0; i < rideLegs.length; i++) {
    if (discounts[i] > 0) {
      const capped = Math.min(discounts[i], rideLegs[i].originalFare);
      rideLegs[i].fare = Math.max(0, Math.round((rideLegs[i].originalFare - capped) * 10) / 10);
      totalDiscount += capped;
    }
  }

  const sum = rideLegs.reduce((s, leg) => s + leg.originalFare, 0);
  const totalFare = Math.round((sum - totalDiscount) * 10) / 10;
  return { totalFare: Math.max(0, totalFare), discount: Math.round(totalDiscount * 10) / 10 };
}

// 背景載入體積較大嘅 bbi_f1 / bbi_b1（九巴 BBI 轉乘優惠明細），唔阻住主要搜尋功能。
async function loadBbiHeavyData() {
  try {
    const [f1, b1] = await Promise.all([
      fetch("https://raw.githubusercontent.com/LOOHP/HK-KMB-Calculator/data/data/bbi_f1.json").then(r => r.ok ? r.json() : null),
      fetch("https://raw.githubusercontent.com/LOOHP/HK-KMB-Calculator/data/data/bbi_b1.json").then(r => r.ok ? r.json() : null)
    ]);
    bbiF1Db = f1;
    bbiB1Db = b1;
  } catch (err) {
    console.error("背景載入九巴 BBI 轉乘優惠資料失敗:", err);
  } finally {
    bbiHeavyLoaded = true; // 就算失敗都要標記完成，避免一直嘗試阻住計算
  }
}

// 載入其餘車費 JSON（體積細，隨主要資料一齊載入）
async function loadBbiLightData() {
  try {
    // 注意：城巴轉乘優惠已經改用 fetchCtbLiveInterchange() 即時查詢城巴官方
    // concessionApi，唔再靠呢度批量預載嘅靜態 ctb_bbi_data.json（該檔案已停用）。
    const [stopIds, regionalFare, ctbRouteIds, mtrBusRoutes] = await Promise.all([
      fetch("https://raw.githubusercontent.com/LOOHP/HK-KMB-Calculator/data/data/kmb_bbi_stop_id.json").then(r => r.ok ? r.json() : null),
      fetch("https://raw.githubusercontent.com/LOOHP/HK-KMB-Calculator/data/data/regional_two_way_section_fare.json").then(r => r.ok ? r.json() : null),
      fetch("https://raw.githubusercontent.com/LOOHP/HK-KMB-Calculator/data/data/ctb_route_ids.json").then(r => r.ok ? r.json() : null),
      fetch("https://raw.githubusercontent.com/LOOHP/HK-KMB-Calculator/data/data/mtr_bus_routes.json").then(r => r.ok ? r.json() : null)
    ]);
    kmbBbiStopDb = stopIds;
    buildKmbBbiInterchangeNames(kmbBbiStopDb);
    regionalTwoWayFareDb = regionalFare;
    ctbRouteIdsDb = ctbRouteIds;
    buildCtbLiveBoundsIndex(ctbRouteIdsDb);
    mtrBusRouteFareDb = buildMtrBusFareIndex(mtrBusRoutes);
  } catch (err) {
    console.error("載入轉乘車費輔助資料失敗:", err);
  } finally {
    bbiLightLoaded = true;
  }
}

// 背景載入九巴官方路線列表 API，快速建立「路線 + service_type」現正有效嘅組合索引。
// 呢個 API 淨係列出九巴現正公佈緊嘅路線／方向／班次變體（唔含實際班次時間），
// 但已經夠用嚟做「呢個 service_type 而家仲存唔存在」嘅快速核實，取代部分本來
// 要等 GTFS（routes/trips/calendar 等多個大檔）先做到嘅存在性判斷，
// 減少因為資料庫入面殘留咗已停辦嘅特別班次變體（例如特別繁忙時間班次）
// 而誤判「有服務」嘅情況。
async function loadKmbRouteVariantIndex() {
  try {
    const res = await fetch("https://data.etabus.gov.hk/v1/transport/kmb/route/");
    const json = res.ok ? await res.json() : null;
    const list = json && Array.isArray(json.data) ? json.data : [];
    const map = new Map();
    for (const rec of list) {
      const routeNo = String(rec.route || "").toUpperCase().trim();
      const svcType = String(rec.service_type || "").trim();
      if (!routeNo) continue;
      if (!map.has(routeNo)) map.set(routeNo, new Set());
      if (svcType) map.get(routeNo).add(svcType);
    }
    kmbLiveServiceTypesByRoute = map;
  } catch (err) {
    console.error("背景載入九巴官方路線列表失敗:", err);
    kmbLiveServiceTypesByRoute = null;
  } finally {
    kmbRouteIndexLoaded = true;
  }
}

// 利用 ctb_route_ids.json（已喺 loadBbiLightData 載入做 ctbRouteIdsDb）建立
// 「路線 + 方向」現正存在嘅組合索引，用嚟輔助核實城巴路線方向係咪確實存在。
function buildCtbLiveBoundsIndex(ctbRouteIdsDb) {
  const map = new Map();
  if (!ctbRouteIdsDb) { ctbLiveBoundsByRoute = map; return; }
  for (const [routeNo, boundsObj] of Object.entries(ctbRouteIdsDb)) {
    const key = String(routeNo || "").toUpperCase().trim();
    if (!key || !boundsObj) continue;
    if (!map.has(key)) map.set(key, new Set());
    for (const bound of Object.keys(boundsObj)) {
      map.get(key).add(String(bound).toUpperCase());
    }
  }
  ctbLiveBoundsByRoute = map;
}

// 快速核實某條九巴路線嘅 service_type 現時是否仍然喺官方路線列表入面存在。
// 回傳 true／false／null（null = 資料未載入或路線唔屬於九巴，交返上層用原有
// 邏輯，唔可以當「唔存在」處理，避免誤刪未及載入資料時嘅正常路線）。
function isKmbServiceTypeLive(routeNo, serviceType) {
  if (!kmbRouteIndexLoaded || !kmbLiveServiceTypesByRoute) return null;
  const key = String(routeNo || "").toUpperCase().trim();
  const types = kmbLiveServiceTypesByRoute.get(key);
  if (!types) return null; // 呢條路線完全搵唔到，可能係命名/資料源差異，交返上層處理
  if (!serviceType) return true; // 冇特別註明 service_type 就唔額外收緊
  return types.has(String(serviceType).trim());
}

/* ---------------- 港鐵巴士靜態路線／站點資料 ---------------- */
const MTR_BUS_STOPS_CSV_URL = "https://seep.eu.org/https://opendata.mtr.com.hk/data/mtr_bus_stops.csv";

async function loadMtrBusStaticData() {
  try {
    const res = await fetch(MTR_BUS_STOPS_CSV_URL);
    if (!res.ok) return { stops: {}, routes: {} };
    const text = await res.text();
    const rows = parseHeadwayCsv(text); // 重用現有支援引號嘅CSV parser

    const newStops = {};
    const grouped = new Map(); // "ROUTE_ID|DIRECTION" -> [{seq, stopId}]

    for (const row of rows) {
      const routeId = row.ROUTE_ID, dir = row.DIRECTION, stationId = row.STATION_ID;
      const lat = parseFloat(row.STATION_LATITUDE), lng = parseFloat(row.STATION_LONGITUDE);
      if (!routeId || !stationId || !Number.isFinite(lat) || !Number.isFinite(lng)) continue;

      const internalStopId = "MTRB_" + stationId;
      if (!newStops[internalStopId]) {
        newStops[internalStopId] = {
          name: { zh: row.STATION_NAME_CHI || row.STATION_NAME_ENG || stationId, en: row.STATION_NAME_ENG || row.STATION_NAME_CHI || stationId },
          location: { lat, lng },
          mtrBusStationId: stationId // 用嚟同 rt.data.gov.hk 即時 API 返回嘅 busStopId 直接比對
        };
      }

      const key = routeId + "|" + dir;
      if (!grouped.has(key)) grouped.set(key, []);
      grouped.get(key).push({ seq: parseInt(row.STATION_SEQNO, 10) || 0, stopId: internalStopId });
    }

    const newRoutes = {};
    for (const [key, list] of grouped.entries()) {
      const [routeId, dir] = key.split("|");
      list.sort((a, b) => a.seq - b.seq);
      const stopIds = list.map(x => x.stopId);
      if (stopIds.length < 2) continue;
      const origStop = newStops[stopIds[0]];
      const destStop = newStops[stopIds[stopIds.length - 1]];
      const routeKey = `MTRB+${routeId}+${dir}`;
      newRoutes[routeKey] = {
        route: routeId,
        co: ["mtrb"],
        bound: { mtrb: dir },
        orig: { zh: origStop.name.zh, en: origStop.name.en },
        dest: { zh: destStop.name.zh, en: destStop.name.en },
        stops: { mtrb: stopIds },
        fares: null,
        faresHoliday: null
      };
    }
    return { stops: newStops, routes: newRoutes };
  } catch (err) {
    console.error("載入港鐵巴士資料失敗", err);
    return { stops: {}, routes: {} };
  }
}

async function loadRouteFareData() {
  const fareBtn = document.querySelector('.crit-btn[data-crit="fare"]');
  try {
    const fareData = await fetch("https://seep.eu.org/https://hkbus.github.io/hk-bus-crawling/routeFareList.min.json").then(r => r.ok ? r.json() : {});
    routeFareDb = fareData;

    if (routeFareDb && typeof routeFareDb === 'object' && etaDb) {
      const FARE_FIELDS_ONLY = ["fares", "faresHoliday", "serviceType", "jt", "freq"];
      for (const [routeId, routeData] of Object.entries(routeFareDb)) {
        if (!etaDb.routeList[routeId]) {
          // 如果原有 etaDb 沒有這條路線（例如部分港鐵巴士），則整個補充進去
          etaDb.routeList[routeId] = routeData;
        } else {
          // 如果已有該路線，只補充車費／班次相關欄位，保留 etaDb 本身權威嘅
          // stops／bound／orig／dest，避免覆蓋出唔一致嘅站序
          const existing = etaDb.routeList[routeId];
          for (const field of FARE_FIELDS_ONLY) {
            if (routeData[field] !== undefined && routeData[field] !== null) {
              existing[field] = routeData[field];
            }
          }
        }
      }
    }
  } catch (err) {
    console.error("背景載入車費資料失敗:", err);
  } finally {
    if (fareBtn) {
      fareBtn.disabled = false;
      fareBtn.title = "";
      fareBtn.textContent = "車費";
    }
  }
}

function getCompanies(r) {
  const companies = [];
  if (!r || !r.co) return companies;
  for (const c of COMPANY_PRIORITY) {
    if (r.co.includes(c) && r.stops && r.stops[c] && r.stops[c].length) {
      companies.push(c);
    }
  }
  return companies;
}

function buildIndices(){
  stopRouteIndex = new Map();
  for (const [routeId, r] of Object.entries(etaDb.routeList)){
    const companies = getCompanies(r);
    if (!companies.length) continue;
    
    const primaryCo = companies[0];
    const stops = r.stops[primaryCo];
    stops.forEach((stopId, idx) => {
      if (!stopId) return;
      if (!stopRouteIndex.has(stopId)) stopRouteIndex.set(stopId, []);
      stopRouteIndex.get(stopId).push({routeId, idx, companies, primaryCo});
    });
  }
  buildGridIndex(etaDb.stopList);
}
