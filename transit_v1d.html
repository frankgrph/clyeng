    const curALoc = etaDb.stopList[legA.alightStopId]?.location;
    const curBLoc = etaDb.stopList[legB.boardStopId]?.location;
    const currentDist = (curALoc && curBLoc) ? distM(curALoc, curBLoc) : Infinity;

    let bestAIdx = legA.alightIdx;
    let bestBIdx = legB.boardIdx;
    let bestDist = currentDist;

    for (let ai = aLoLimit; ai <= aHiLimit; ai++) {
      const aStopId = stopsA[ai];
      const aLoc = etaDb.stopList[aStopId]?.location;
      if (!aLoc) continue;
      for (let bi = bLoLimit; bi <= bHiLimit; bi++) {
        const bStopId = stopsB[bi];
        const bLoc = etaDb.stopList[bStopId]?.location;
        if (!bLoc) continue;
        const d = distM(aLoc, bLoc);
        if (d < bestDist) {
          bestDist = d;
          bestAIdx = ai;
          bestBIdx = bi;
        }
      }
    }

    if (bestDist < currentDist - TRANSFER_REOPT_MIN_IMPROVEMENT_M) {
      const newAlightStopId = stopsA[bestAIdx];
      const newBoardStopId = stopsB[bestBIdx];

      legA.alightIdx = bestAIdx;
      legA.alightStopId = newAlightStopId;
      legB.boardIdx = bestBIdx;
      legB.boardStopId = newBoardStopId;

      if (bestDist <= TRANSFER_REOPT_SAME_STOP_M) {
        // 新組合已經係同一個站／同一個站群，唔再需要轉車步行段
        if (walkIdx >= 0) segs.splice(walkIdx, 1);
      } else {
        const mins = Math.max(1, Math.ceil(bestDist / WALK_SPEED_MPS / 60));
        const newWalkSeg = {
          type: "walk",
          fromStopId: newAlightStopId,
          toStopId: newBoardStopId,
          fromName: stopName(newAlightStopId),
          toName: stopName(newBoardStopId),
          distM: Math.round(bestDist),
          minutes: mins
        };
        if (walkIdx >= 0) {
          segs[walkIdx] = newWalkSeg;
        } else {
          segs.splice(i + 1, 0, newWalkSeg);
        }
      }
    }
  }

  return segs;
}

/* ---------------- 實時路徑及時間評估主引擎 ----------------
 * opts.treatSecondaryLegsRelaxed：自選行程模式專用。第一程之後（rideCount > 0）
 * 嘅車程，若無實時 ETA，唔應該再受制於「headwayResult===false 就即刻判死」嘅
 * 嚴格檢查（呢個檢查原意係為咗喺 beam search 大量候選之中減少假班次，但自選
 * 行程係用戶親自揀嘅路線＋站，唔應該因為呢個嚴格檢查而完全計唔到），改為
 * 寬鬆模式：仍然會用 isServiceActiveForRouteOnDate 呢個 GTFS calendar 檢查
 * 把關（明確確認「今日冇服務」先至唔畀 fallback），但唔再要求一定要有「鄰近
 * 班次」先可以嘗試估算。 */
async function evaluateCandidate(cand, now, relaxed = false, opts = {}) {
  const { treatSecondaryLegsRelaxed = false } = opts;
  const segs = _optimizeTransferPoints(cand.segs);

  const isLantauTrip = computeIsLantauTrip(origin || {name:"", lat:0, lng:0}, destination || {name:"", lat:0, lng:0});

  let estimatedCandidateTotalMin = 0;
  for (const seg of segs){
    if (seg.type === "walk"){
      estimatedCandidateTotalMin += Math.max(1, Math.ceil(seg.distM / WALK_SPEED_MPS / 60));
    } else if (seg.type === "ride"){
      estimatedCandidateTotalMin += await estimateSegmentDuration(seg.r, seg.primaryCo, seg.boardIdx, seg.alightIdx);
    }
  }
  const isCandidateLongHaul = estimatedCandidateTotalMin > LONG_TRIP_TOTAL_MIN_THRESHOLD;

  // 【精簡】總行程時間上限唔再跟起點終點直線距離分長途／極長途分級
  // （以往嘅 isLongTrip／isVeryLongTrip／LONG_TRIP_THRESHOLD_M／
  // VERY_LONG_TRIP_THRESHOLD_M 已經刪除），統一用返一個固定、足夠寬鬆
  // 嘅上限（300 分鐘），避免大澳／飛機維修區呢類遠離市區嘅長途組合被
  // 一刀切淘汰，同時唔會畀搜尋因為上限太寬鬆而顯示明顯唔合理嘅超長候選。
  const MAX_TOTAL_TRIP_MINUTES = 300;

  async function dfs(segIdx, currentTime, pathLegs, rideCount) {
    if (segIdx >= segs.length) {
      if (rideCount === 0) return null;
      const totalMinutes = Math.round((currentTime.getTime() - now.getTime()) / 60000);
      if (totalMinutes > MAX_TOTAL_TRIP_MINUTES) return null;
      
      let hasMisusedAirportRoute = false;
            for (const leg of pathLegs) {
               if (leg.type === "ride" && /^[AE]/i.test(leg.routeNo) && !isLantauTrip) {
                   // 市區內來往，且該 A/E 線市區方向，不視為濫用/誤搭
                   const isCitybound = leg.r && !LANTAU_KEYWORDS.test(leg.r.dest?.zh || "");
                   if (!isCitybound) {
                       hasMisusedAirportRoute = true;
                   }
               }
            }
      const isSpeculative = pathLegs.some(leg => leg.type === "ride" && leg.isSpeculative);
      const rideLegsForFare = pathLegs.filter(leg => leg.type === "ride");
      const fareResult = await computeTripFare(rideLegsForFare);
      return {
        legs: pathLegs,
        transfers: rideCount - 1,
        totalMinutes,
        arriveTime: currentTime,
        hasMisusedAirportRoute,
        hasImplausibleWait: false,
        isCircuitous: cand.isCircuitous,
        hasRedundantHop: cand.hasRedundantHop,
        isSpeculative,
        totalFare: fareResult.totalFare,
        fareDiscount: fareResult.discount
      };
    }

    const seg = segs[segIdx];

    // 自選行程模式：第一程之後（rideCount > 0）嘅車程一律當寬鬆模式處理，
    // 冇實時 ETA 時改為靠 GTFS 估算是否有服務，唔會因為冇「鄰近實時班次」
    // 佐證就直接判呢程車冇得計。
    const segRelaxed = relaxed || (treatSecondaryLegsRelaxed && rideCount > 0);

    if (seg.type === "walk") {
      let mins = Math.max(1, Math.ceil(seg.distM / WALK_SPEED_MPS / 60));
      let actualDistM = seg.distM;

      if (seg.distM > 100) {
        let fromLoc = null;
        let toLoc = null;
        let cacheKey = null;

        if (seg.fromStopId && seg.toStopId) {
          fromLoc = etaDb.stopList[seg.fromStopId]?.location;
          toLoc = etaDb.stopList[seg.toStopId]?.location;
          cacheKey = `${seg.fromStopId}_${seg.toStopId}`;
        } else if (seg.fromStopId) {
          fromLoc = etaDb.stopList[seg.fromStopId]?.location;
          toLoc = { lat: seg.toLat, lng: seg.toLng };
          cacheKey = `${seg.fromStopId}_${seg.toLat.toFixed(5)},${seg.toLng.toFixed(5)}`;
        } else if (seg.toStopId) {
          fromLoc = { lat: seg.fromLat, lng: seg.fromLng };
          toLoc = etaDb.stopList[seg.toStopId]?.location;
          cacheKey = `${seg.fromLat.toFixed(5)},${seg.fromLng.toFixed(5)}_${seg.toStopId}`;
        }

        if (fromLoc && toLoc && cacheKey) {
          const realWalk = await getRealWalkingDataCached(cacheKey, fromLoc, toLoc);
          if (realWalk.success) {
            if ((realWalk.distM / seg.distM) > 3.0) {
              return null; 
            }
            actualDistM = realWalk.distM;
            // 【修正】唔再直接採用 OSRM 自己嘅 durationS：OSRM foot profile 預設步速
            // 假設較快（約 5km/h），同全站統一用嘅 WALK_SPEED_MPS（4.3km/h，貼近本地
            // 連過馬路／等燈嘅實際步速）唔一致，令「剛好接到」嘅轉車喺現實會搭唔到。
            // OSRM 只用嚟提供貼近路網嘅真實步行距離，時間一律用同一套速率換算，
            // 確保全app（包括 ≤100米冇call OSRM 嘅短程步行）嘅步速計算機制一致。
            mins = Math.max(1, Math.ceil(actualDistM / WALK_SPEED_MPS / 60));
          }
        }
      }

      const fromName = seg.fromStopId ? stopName(seg.fromStopId) : (seg.fromName || origin?.name || "起點");
      const toName = seg.toStopId ? stopName(seg.toStopId) : (seg.toName || destination?.name || "終點");
      
      let nextLegs = pathLegs.slice();
      const lastLeg = nextLegs.length > 0 ? nextLegs[nextLegs.length - 1] : null;
      let arrTime;
      
      if (lastLeg && lastLeg.type === "walk") {
        const updatedWalk = { ...lastLeg };
        updatedWalk.distM += Math.round(actualDistM);
        updatedWalk.minutes += mins;
        updatedWalk.toName = toName;
        updatedWalk.toStopId = seg.toStopId || null; 
        updatedWalk.arriveTime = new Date(updatedWalk.arriveTime.getTime() + mins * 60000);
        nextLegs[nextLegs.length - 1] = updatedWalk;
        arrTime = updatedWalk.arriveTime;
      } else {
        arrTime = new Date(currentTime.getTime() + mins * 60000);
        nextLegs.push({
          type: "walk", 
          fromStopId: seg.fromStopId || null, 
          toStopId: seg.toStopId || null,     
          fromName, toName, distM: Math.round(actualDistM),
          minutes: mins, departTime: new Date(currentTime), arriveTime: arrTime
        });
      }
      return await dfs(segIdx + 1, arrTime, nextLegs, rideCount);
    }

    const r = seg.r;

    // 補回落車所需緩衝時間，唔應該假設可以無縫接續下一班車
    const prevLegForSameStop = pathLegs.length > 0 ? pathLegs[pathLegs.length - 1] : null;
    if (prevLegForSameStop && prevLegForSameStop.type === "ride" && prevLegForSameStop.alightStopId === seg.boardStopId) {
      currentTime = new Date(currentTime.getTime() + SAME_STOP_ALIGHT_BUFFER_MIN * 60000);
    }

    // 【港鐵（自選行程專用）】港鐵嘅班次／車程／收費機制同巴士完全唔同
    // （冇 r.freq 時刻表、冇 GTFS stop_times、收費係站對站矩陣唔係逐站
    // 陣列），套用返上面一大段巴士專用嘅 freq／calibration／GTFS 邏輯冇
    // 意義，所以獨立處理，唔會行到落面嗰段巴士邏輯。
    if (seg.primaryCo === "mtr") {
      const stationCodes = r.mtrStationCodes || [];
      const boardCode = stationCodes[seg.boardIdx];
      const alightCode = stationCodes[seg.alightIdx];

      let boardEtas = [];
      try { boardEtas = await getEtasCached(seg.routeId, r, "mtr", seg.boardIdx); } catch (e) { boardEtas = []; }
      boardEtas = (boardEtas || []).filter(e => e.etaDate >= currentTime);

      let depEta;
      if (boardEtas.length) {
        depEta = boardEtas[0];
      } else {
        // 冇實時班次資料（例如指定咗未來時間，或者官方 API 一時攞唔到），
        // 港鐵日間班次密（大部分綫繁忙時間 2-4 分鐘、非繁忙 5-10 分鐘一班），
        // 用一個粗略嘅班距估算頂住，唔會令自選行程完全計唔到。
        const hour = currentTime.getHours();
        const isOffPeak = hour < 6 || hour >= 23;
        const roughHeadway = isOffPeak ? 8 : 4;
        depEta = { etaDate: new Date(currentTime.getTime() + roughHeadway * 60000), rmk: "推算班次", isFallback: true };
      }

      let durationMins = null;
      if (stationCodes.length) {
        try { durationMins = await getMtrSegmentMinutes(stationCodes, seg.boardIdx, seg.alightIdx, depEta.etaDate); }
        catch (e) { durationMins = null; }
      }
      if (durationMins === null) {
        // hketa 逐站數據唔完整時嘅啟發式：港鐵站與站之間（連埋停站時間）
        // 一般 2-3 分鐘，用站數粗略估算。
        durationMins = Math.max(1.5, (seg.alightIdx - seg.boardIdx) * 2.3);
      }

      const alightTime = new Date(depEta.etaDate.getTime() + durationMins * 60000);
      let fare = null;
      try { fare = getMtrFare(boardCode, alightCode); } catch (e) { fare = null; }

      const newLegs = pathLegs.slice();
      newLegs.push({
        type: "ride",
        routeId: seg.routeId,
        routeNo: r.route,
        co: "mtr",
        r,
        boardStopId: seg.boardStopId,
        alightStopId: seg.alightStopId,
        departTime: depEta.etaDate,
        arriveTime: alightTime,
        rmk: depEta.rmk || "",
        isSpeculative: !!depEta.isFallback,
        fare
      });

      return await dfs(segIdx + 1, alightTime, newLegs, rideCount + 1);
    }

    // 【輕鐵（自選行程專用）】輕鐧嘅班次／車程／收費機制都同巴士完全唔
    // 同,做法同上面港鐧 branch 一致,獨立處理,唔會行到落面巴士專用邏輯。
    if (seg.primaryCo === "lightrail") {
      const stationCodes = r.lrStationCodes || [];
      const boardCode = stationCodes[seg.boardIdx];
      const alightCode = stationCodes[seg.alightIdx];

      let boardEtas = [];
      try { boardEtas = await getEtasCached(seg.routeId, r, "lightrail", seg.boardIdx); } catch (e) { boardEtas = []; }
      boardEtas = (boardEtas || []).filter(e => e.etaDate >= currentTime);

      let depEta;
      if (boardEtas.length) {
        depEta = boardEtas[0];
      } else {
        // 冇實時班次資料（例如指定咗未來時間,或者官方 API 一時攞唔到），
        // 輕鐧班次一般 4-8 分鐧一班（非繁忙時間可以疏到 10 分鐧一班），
        // 用一個粗略班距估算頂住,唔會令自選行程完全計唔到。
        const hour = currentTime.getHours();
        const isOffPeak = hour < 6 || hour >= 23;
        const roughHeadway = isOffPeak ? 10 : 6;
        depEta = { etaDate: new Date(currentTime.getTime() + roughHeadway * 60000), rmk: "推算班次", isFallback: true };
      }

      let durationMins = null;
      if (stationCodes.length) {
        try { durationMins = await getLightRailSegmentMinutes(stationCodes, seg.boardIdx, seg.alightIdx, depEta.etaDate); }
        catch (e) { durationMins = null; }
      }
      if (durationMins === null) {
        // hketa 逐站數據唔完整時嘅啟發式：輕鐧站與站之間比重鐧密好多,
        // 一般 1-2 分鐧,用站數粗略估算。
        durationMins = Math.max(1, (seg.alightIdx - seg.boardIdx) * 1.6);
      }

      const alightTime = new Date(depEta.etaDate.getTime() + durationMins * 60000);
      let fare = null;
      try { fare = getLightRailFare(boardCode, alightCode); } catch (e) { fare = null; }

      const newLegs = pathLegs.slice();
      newLegs.push({
        type: "ride",
        routeId: seg.routeId,
        routeNo: r.route,
        co: "lightrail",
        r,
        boardStopId: seg.boardStopId,
        alightStopId: seg.alightStopId,
        departTime: depEta.etaDate,
        arriveTime: alightTime,
        rmk: depEta.rmk || "",
        isSpeculative: !!depEta.isFallback,
        fare
      });

      return await dfs(segIdx + 1, alightTime, newLegs, rideCount + 1);
    }

    // 【轉車站群感知】以往呢度淨係查 seg.boardStopId 呢一個站牌喺路線入面
    // 嘅站序（boardIdx），但好多官方轉車站（例如觀塘轉車站）入面唔同月台
    // 各有獨立 stopId，一條路線可能淨係經其中一個。搜尋淨係查結構性搜尋
    // 揀落嘅嗰一個站牌，就會漏咗「其實喺轉車站群入面另一個站牌都搭到
    // 呢條路線、而且班次快好多」呢種情況（例如落車站牌係 KT347，但落車
    // 之後行埋去幾米外嘅 KT346 先搭到嗰條路線，兩個站牌其實同一個地點）。
    // 而家用 _groupBoardIndices() 搵齊晒同 seg.boardStopId 屬於同一個
    // 轉車站群嘅所有站序，每一個都查一次 ETA，並喺結果度記低實際用緊
    // 邊個站序／站牌（_groupIdx／_groupStopId），等落尾計行車時間／
    // 車費／顯示上車站嗰陣用返正確嘅站牌。
    let etasBoard = [];
    const fetchPromises = [];
    for (const co of seg.companies) {
      const groupIdxs = _groupBoardIndices(r, co, seg.boardStopId);
      let idxsToQuery = groupIdxs;
      if (!idxsToQuery.length) {
        // 呢個公司嘅站序入面搵唔到同一轉車站群嘅站牌（例如根本冇
        // isSameTransferPoint 資料），退返舊有做法：淨係查
        // findEquivalentStopIdx() 解到嘅單一站序。
        let coIdx = seg.boardIdx;
        if (co !== seg.primaryCo) {
          const equivIdx = findEquivalentStopIdx(r, co, seg.boardStopId);
          if (equivIdx >= 0) coIdx = equivIdx;
        }
        idxsToQuery = [{ idx: coIdx, stopId: seg.boardStopId }];
      }
      for (const { idx, stopId } of idxsToQuery) {
        fetchPromises.push(
          getEtasCached(seg.routeId, r, co, idx)
            .then(list => (list || []).map(e => ({ ...e, _resolvedCo: co, _groupIdx: idx, _groupStopId: stopId })))
        );
      }
    }
    const results = await Promise.all(fetchPromises);
    results.forEach(list => { list.forEach(e => { etasBoard.push(e); }); });
    etasBoard.sort((a,b) => a.etaDate - b.etaDate);

    // === 分站上車時間邏輯 ===
    // 【修正】上一版曾經加入「攞總站現時 ETA 清單同上車站 ETA 交叉比對」嘅
    // 機制，原意係想確認班次是否真正已經開出，但實際上呢個做法係反嘅：
    // 巴士/小巴一旦真正離開總站，總站嗰邊嘅「即將到站」清單就唔會再列出
    // 佢（呢啲 API 淨係顯示「未來將到」，唔會保留「啱啱開出」嘅歷史記錄），
    // 所以呢個檢查對於「真正已經開出」嘅班次幾乎必然搵唔到脗合，反而會將
    // 大量正常、已經開出嘅班次誤判做「未經總站確認」而降級，帶嚟反效果。
    // 而家改返用上游 ETA API（hk-bus-eta）本身喺 rmk 入面標示嘅「預定/原定/
    // scheduled」字眼嚟判斷呢個班次係咪淨係按時刻表推算、未必已經真正開出，
    // 呢個先係現有 API 提供、真正可靠嘅信號。
    for (let e of etasBoard) {
      const isScheduled = e.isFallback || 
        String(e.rmk || "").toLowerCase().includes("預定") || 
        String(e.rmk || "").toLowerCase().includes("原定") || 
        String(e.rmk || "").toLowerCase().includes("scheduled");
      
      // 用返呢個班次實際查詢緊嘅站序（_groupIdx，可能嚟自轉車站群入面
      // 另一個站牌），唔再淨係死咬住 seg.boardIdx。
      const boardCoIdx = (typeof e._groupIdx === "number") ? e._groupIdx : seg.boardIdx;

      if (isScheduled && boardCoIdx > 0) {
        const stops = r.stops[e._resolvedCo] || r.stops[r.primaryCo];
        let mins = await getBaselineSegmentMinutes(e._resolvedCo, r.route, stops, 0, boardCoIdx, e.etaDate);
        if (mins === null) {
          mins = await estimateSegmentDuration(r, e._resolvedCo, 0, boardCoIdx, e.etaDate);
        }
        e.etaDate = new Date(e.etaDate.getTime() + Math.round(mins) * 60000);
        e.isTerminusAdjusted = true;
      }
    }
    etasBoard.sort((a,b) => a.etaDate - b.etaDate);

    let etasAlight = [];
    const alightPromises = seg.companies.map(co => {
      let alightCoIdx = seg.alightIdx;
      if (co !== seg.primaryCo) {
        const equivIdx = findEquivalentStopIdx(r, co, seg.alightStopId);
        if (equivIdx >= 0) alightCoIdx = equivIdx;
      }
      return getEtasCached(seg.routeId, r, co, alightCoIdx);
    });
    const alightResults = await Promise.all(alightPromises);
    alightResults.forEach((list, index) => {
      const co = seg.companies[index];
      list.forEach(e => { etasAlight.push({...e, _resolvedCo: co}); });
    });
    etasAlight.sort((a,b) => a.etaDate - b.etaDate);

    // === 下車站點預定時間 ===
    for (let e of etasAlight) {
      const isScheduled = e.isFallback || 
        String(e.rmk || "").toLowerCase().includes("預定") || 
        String(e.rmk || "").toLowerCase().includes("原定") || 
        String(e.rmk || "").toLowerCase().includes("scheduled");
      
      let alightCoIdx = seg.alightIdx;
      if (e._resolvedCo !== seg.primaryCo) {
        const equivIdx = findEquivalentStopIdx(r, e._resolvedCo, seg.alightStopId);
        if (equivIdx >= 0) alightCoIdx = equivIdx;
      }

      if (isScheduled && alightCoIdx > 0) {
        const stops = r.stops[e._resolvedCo] || r.stops[r.primaryCo];
        let mins = await getBaselineSegmentMinutes(e._resolvedCo, r.route, stops, 0, alightCoIdx, e.etaDate);
        if (mins === null) {
          mins = await estimateSegmentDuration(r, e._resolvedCo, 0, alightCoIdx, e.etaDate);
        }
        e.etaDate = new Date(e.etaDate.getTime() + Math.round(mins) * 60000);
        e.isTerminusAdjusted = true;
      }
    }
    etasAlight.sort((a,b) => a.etaDate - b.etaDate);

    let validDepEtas = etasBoard.filter(e => e.etaDate >= new Date(currentTime.getTime() - 60000)).slice(0, 5);

    if (validDepEtas.length === 0) {
      // 明確用「鄰近兩小時」窗口（前後對稱）交叉比對 GTFS stop_times/frequencies/calendar，
      // 咁樣搵到嘅唔止未來班次，仲有過去兩小時內嘅班次，用嚟輔助判斷條路線今日係咪其實
      // 仲有服務（只係暫時喺兩班車之間嘅空檔），減少誤判「尾班車已經開出」。
      const NEARBY_WINDOW_MIN = 260;
      const staticSchedule = await getStopArrivalScheduleList(seg.primaryCo, r.route, seg.boardStopId, currentTime, NEARBY_WINDOW_MIN);
      const futureTrips = staticSchedule.found
        ? staticSchedule.all
            .filter(t => t.etaDate >= new Date(currentTime.getTime() - 30000))
        : [];
      const recentPastTrips = staticSchedule.found
        ? staticSchedule.all.filter(t => t.etaDate < new Date(currentTime.getTime() - 30000))
        : [];

      if (staticSchedule.found && futureTrips.length > 0) {
        for (const t of futureTrips.slice(0, 5)) {
          validDepEtas.push({
            etaDate: t.etaDate,
            _resolvedCo: seg.primaryCo,
            isFallback: true,
            isGeneric: false,
            rmk: "預定",
            _tripId: t.tripId
          });
        }
      } else {
        const headwayResult = await isRouteCurrentlyInService(seg.primaryCo, seg.r.route, currentTime);
        const isFirstRide = (rideCount === 0);

        let activeFromEarlierStops = false;
        if (seg.boardIdx > 0) {
           try {
               const originEtas = await getEtasCached(seg.routeId, r, seg.primaryCo, 0);
               // 【修正時光倒流】必須用 currentTime（呢一程實際上車嗰一刻，已計及
               // 之前所有程數嘅到達時間）嚟篩總站班次，唔可以用 now（成個搜尋開始
               // 時嘅原始時間）。用 now 會漏咗啲相對 now 嚟講「未來」但相對
               // currentTime（上一程實際到達之後）嚟講其實已經開走嘅班次，推算出
               // 嘅上車時間就會早過上一程到達時間，變成「未到就已經上到車」。
               const futureOriginEtas = (originEtas || [])
                 .filter(e => e.etaDate >= new Date(currentTime.getTime() - 30000));
               if (futureOriginEtas.length > 0) {
                   activeFromEarlierStops = true;

                   // 【新增：分站無自己 ETA 時，用總站實時時間推算，唔淨係做布林旗標】
                   // 以往呢度搵到「總站有實時 ETA」就淨係set一個 activeFromEarlierStops=true
                   // 嘅布林值，用嚟豁免下面 headwayResult===false 嘅嚴格判斷，但完全冇
                   // 攞總站嗰個實際開出時間去用——結果呢一程仍然要跌落去用粗略嘅
                   // scheduleFallback／r.freq 班距估算，甚至因為冇 GTFS 靜態資料而
                   // 直接 return null。呢正正就係「A28 呢類分站冇獨立 ETA 上報嘅路線，
                   // 搜尋明明搵到 402 米嘅上車站候選，最終卻只有行去總站嗰個版本先
                   // 計得出結果」嘅根本原因：唔係搵唔到候選站，而係候選站計唔到有效
                   // 到站時間，喺 evaluateCandidate() 呢一步就靜靜雞被淘汰。
                   // 而家改為直接用返總站嘅真實開出時間，加返總站到呢個分站嘅
                   // 估算車程（同 4007-4028 行「isScheduled」分站時間校正用嘅
                   // 一套機制），推算一個貼近事實嘅到站時間，等呢個分站候選有
                   // 機會同總站候選公平competing，而唔係一開始就冇資格入圍。
                   const stops0 = r.stops[seg.primaryCo] || r.stops[r.primaryCo];
                   for (const oe of futureOriginEtas.slice(0, 5)) {
                       let segMins = await getBaselineSegmentMinutes(seg.primaryCo, r.route, stops0, 0, seg.boardIdx, oe.etaDate);
                       if (segMins === null) {
                           segMins = await estimateSegmentDuration(r, seg.primaryCo, 0, seg.boardIdx, oe.etaDate);
                       }
                       if (Number.isFinite(segMins)) {
                           validDepEtas.push({
                               etaDate: new Date(oe.etaDate.getTime() + Math.round(segMins) * 60000),
                               _resolvedCo: seg.primaryCo,
                               isFallback: true,
                               isTerminusAdjusted: true,
                               isGeneric: false,
                               rmk: "預定"
                           });
                       }
                   }
                   if (validDepEtas.length > 0) {
                       validDepEtas.sort((a,b) => a.etaDate - b.etaDate);
                   }
               }
           } catch (err) {}
        }

        // GTFS 鄰近兩小時窗口內若曾經有班次（哪怕已經係過去），代表條路線今日確實仲有服務，
        // 只係啱啱好搭唔到跟腳嗰班，唔應該即刻當「完全冇服務」咁武斷咁判失敗。
        const hasNearbyGtfsEvidence = recentPastTrips.length > 0;

        // 【新增】如果上面已經靠總站實時 ETA＋分站車程估算，成功推算出
        // validDepEtas，就冇必要再落去用更粗略嘅 headwayResult／scheduleFallback／
        // r.freq 兜底估算——嗰套機制本身係為咗「完全冇任何實時線索」嘅情況先
        // 設計，總站實時時間推算出嚟嘅結果遠比佢哋準確，亦唔應該被下面任何
        // return null 判走。
        if (validDepEtas.length === 0) {

        // 上一版曾經改成 relaxed 模式先兜底估算，但呢個做法會喺 GTFS
        // 明確話「今日冇服務」嘅路線度都砌一個「預計」班次出嚟，令搜尋結果出現
        // 大量唔存在嘅假班次（用戶反映嘅 4 轉車、成程都係「預計班次(預計)」嘅組合）。
        // 呢個係關乎「準確性」嘅底線，寧願搵少啲結果都唔應該報大話班次，所以
        // 一般搜尋（beam search）呢度預設做無條件 return null：搵唔到組合嘅問題
        // 應該喺 runBeamSearch 果邊，透過放寬直線距離／繞路容忍度，等佢有機會
        // 搵到市區／轉車站等其他真正有服務嘅轉乘路徑，而唔係靠呢度作大話。
        // 【修正】headwayResult===false 係 GTFS frequencies/stop_times 對「呢一個
        // 確實時刻」嘅判斷，可信，但唔等於「今日完全冇服務」——佢淨係話「GTFS
        // 時刻表冚唔到呢一刻」，好多時候只係時刻表資料本身有缺口／粒度唔夠細
        // （尤其係小巴路線，例如 107P 呢類），而唔係嗰程車真係唔存在。喺一般
        // 搜尋（beam search）入面，因為仲有大把其他候選路線／轉車點可以頂替，
        // 直接摒棄呢個組合冇問題；但自選行程係用戶自己揀好晒每一程嘅路線同
        // 上落車站，一旦第一程之後（rideCount > 0，即次程）嘅某一程行到呢度就
        // return null，成個組合就即刻報「無法計算」，完全冇第二個候選可以
        // 頂替——呢個正正係用戶反映「次程未有完全嘅落車 ETA，成個組合就計唔到」
        // 嘅根本原因。
        // 所以：自選行程嘅次程（treatSecondaryLegsRelaxed && rideCount > 0），
        // 唔再淨係因為 headwayResult===false 呢一個較弱信號就一刀切令成程
        // 失敗，而係跟返「搜尋模式」原本已有嘅做法——落去用 timeIntervalDb／
        // scheduleFallback 等同一套嘅估算機制（見下面 estimateSegmentDuration／
        // sumTimeIntervalSeconds）推算返合理嘅車程，避免顯示「無法計算」。
        // 但更強、更確切嘅信號依然要尊重、唔會被呢個放寬影響：
        //   - svcActiveToday === false（GTFS calendar 明確話今日完全冇服務）
        //   - pastLastKnownTrip（靜態排班表證明咗尾班車確實已經開出）
        // 呢兩個信號喺落面仍然會照舊令組合失敗，唔會因為係自選行程次程就
        // 假扮有車。
        const isCustomSecondaryLeg = treatSecondaryLegsRelaxed && rideCount > 0;

        // 【一般搜尋模式全程 freq 核實寬鬆】用戶反映：明明有直達車（例如
        // 6C／102 美孚 直達 衛理道），但因為第一程（rideCount === 0）冇
        // 即時 ETA 就被上面 headwayResult===false 嘅嚴格檢查直接判死，
        // 令成個直達方案完全消失，搜尋結果反而剩低一啲要轉車嘅方案。
        // 呢個問題原本只喺次程（rideCount > 0）先有寬鬆處理，而家擴展到
        // 第一程都可以用同一套核實機制：用 isRouteActiveAroundTime()
        // 核實返 r.freq 官方班次表本身係否認為呢個上車站、呢一刻（未來
        // 一小時窗口內）應該有服務——
        //   - 核實到「有」→ 當呢程寬鬆處理，落去用 scheduleFallback／
        //     estimateSegmentDuration 推算合理車程，唔會因為單一嘅實時
        //     ETA 缺口就令一條確實存在嘅直達路線完全消失。
        //   - 核實到「冇」→ 維持原有嚴格檢查，唔會靠估估一程根本唔存在
        //     嘅車。
        const freqVerifiedThisLeg = !isCustomSecondaryLeg &&
          isRouteActiveAroundTime(r, currentTime, seg.boardStopId, 60);
        const isRelaxableSecondaryLeg = isCustomSecondaryLeg || freqVerifiedThisLeg;

        if (headwayResult === false && !activeFromEarlierStops && !hasNearbyGtfsEvidence && !isRelaxableSecondaryLeg) {
          if (DEBUG_MODE) console.log(`[候選被淘汰] 路線=${r.route} co=${seg.primaryCo} 上車站=${stopName(seg.boardStopId)} 原因=headwayResult false 且冇 activeFromEarlierStops/hasNearbyGtfsEvidence/isRelaxableSecondaryLeg`);
          return null;
        }

        // 【修正幽靈班次】GTFS 靜態排班表（stop_times.txt／frequencies.txt）
        // 如果對呢條路線係「有實際記錄」（staticSchedule.found），但喺鄰近
        // 窗口入面已經搵唔到任何未來班次（futureTrips 得返 0 個），而過去
        // 窗口入面確實搵到過班次（recentPastTrips > 0）——即係話呢個唔係
        // 「冇資料判斷唔到」，而係「有實際排班表證明尾班車已經過咗」，
        // 例如通宵線去到清晨、尾班車已經開出。呢個係最直接可信嘅信號，
        // scheduleFallback() 淨係靠 r.freq 粗略班距表估算（好多通宵線根本
        // 冇 freq 資料，就會不分青紅皂白噏「+35分鐘」呢個保底估算），
        // 唔應該喺已經有實際證據話「冇下一班」嘅情況下，仲砌多個假嘅
        // 「推算」班次出嚟。
        const pastLastKnownTripNarrowWindow = staticSchedule.found && futureTrips.length === 0 && recentPastTrips.length > 0;

        // 【修正稀疏班次（例如全日得一班）嘅尾班車誤判】上面嘅
        // pastLastKnownTripNarrowWindow 淨係睇 getStopArrivalScheduleList()
        // 嗰個 ±windowMinutes（通常 ±130 分鐘左右）窗口入面嘅紀錄。如果
        // 條路線好似 798P 咁全日淨係朝早一班，而家已經係下晝，該班次
        // 早已跌出窗口範圍之外，窗口入面就乜都搵唔到（futureTrips 同
        // recentPastTrips 都係空），令 pastLastKnownTripNarrowWindow
        // 錯誤咁維持 false，跌落去俾 scheduleFallback 用粗略 freq 估算
        // 砌一個唔存在嘅「推算班次」出嚟。呢度加多一重唔受窗口限制、
        // 掃描「今日成日」嘅檢查（見 hasAnyRemainingTripToday()），只要
        // 佢明確答到「今日搵到過班次紀錄，但全部都已經開出」，就當尾班車
        // 已開，唔理會窄窗口嗰邊嘅結果。
        let pastLastKnownTrip = pastLastKnownTripNarrowWindow;
        if (!pastLastKnownTrip) {
          const wholeDayStatus = await hasAnyRemainingTripToday(seg.primaryCo, r.route, seg.boardStopId, currentTime);
          if (wholeDayStatus === false) {
            pastLastKnownTrip = true;
            if (DEBUG_MODE) console.log(`[尾班車判定] 路線=${r.route} co=${seg.primaryCo} 上車站=${stopName(seg.boardStopId)}：窄窗口搵唔到紀錄，但全日掃描證實尾班車已開出`);
          }
        }

        // 無論係咪 segRelaxed，用嚟兜底嘅「預計」班次都必須先經 GTFS calendar
        // (calendar.txt / calendar_dates.txt) 確認條路線今日真係有服務，先至
        // 畀 scheduleFallback／落面嘅粗略估算生效，避免喺「今日完全冇服務」
        // 嘅路線度都推算一個唔存在嘅班次出嚟。
        const svcActiveToday = await isServiceActiveForRouteOnDate(seg.primaryCo, r.route, currentTime);

        // 【修正「特別路線」幽靈班次】九巴部分路線會有多個 service_type 變體
        // （例如 61P 呢類特別班次／繞經版本），資料庫入面可能仍然殘留住
        // 一個官方已經停辦嘅變體。isKmbServiceTypeLive() 呢個核實機制本身
        // 一早已經存在（見上面 isRouteActiveAroundTime()），但以往淨係用嚟
        // 判斷「呢程係否夠格用寬鬆模式」（isRelaxableSecondaryLeg 嗰個
        // 正面訊號），從來冇用嚟主動擋走已停辦變體嘅推算班次——結果一旦
        // 呢一程行到落面嘅 scheduleFallback／粗略 headway 估算，就算官方
        // 路線列表已經明確話呢個 service_type 唔存在，都照樣砌一個「預計」
        // 班次出嚟。呢個信號同 svcActiveToday===false 一樣屬於「明確證據」，
        // 唔應該被 isRelaxableSecondaryLeg 呢類寬鬆例外覆蓋。
        let kmbServiceTypeDiscontinued = false;
        if (seg.primaryCo === "kmb" && r.service_type) {
          const liveCheck = isKmbServiceTypeLive(r.route, r.service_type);
          if (liveCheck === false) kmbServiceTypeDiscontinued = true;
        }

        // 【修正「等車時間畀 terminus 車程 double count」bug】以往呢度直接
        // 用 scheduleFallback(r, currentTime, ...) 揾「總站喺 currentTime
        // 呢一刻或之後嘅下一班開出時間」，然後先落面先加返總站到呢個分站
        // 嘅車程（segMinsAdj）先變成「上車時間」。但呢樣做法等於要求「總站
        // 開車」都要喺 currentTime（即已經到達轉車站嗰一刻）之後先合格，
        // 於是最終算出嘅上車時間變成「currentTime + segMinsAdj」打底，白白
        // 多等咗一個 segMinsAdj（總站到呢個分站嘅車程）先至合理——用戶反映
        // 「明明有上一班車，卻無端端等成半個鐘」，正正就係因為呢個重複計
        // 咗一次車程嘅 bug：實際上只要總站班次喺（currentTime - segMinsAdj）
        // 或之後開出，到達呢個分站就已經夠及時，唔應該要求總站班次本身喺
        // currentTime 之後先開。而家改為先估算返呢個分站到總站嘅車程，將
        // 呢個車程由 currentTime 扣走先做搜尋基準時間，搵到嘅總站開出時間
        // 先加返呢個車程做返「上車時間」，先啱啱好符合「到呢個分站嗰一刻
        // 唔早過 currentTime」呢個真正要求。
        let segMinsForFallback = 0;
        if (seg.boardIdx > 0) {
          const stopsForAdj = r.stops[seg.primaryCo] || r.stops[r.primaryCo];
          let segMinsEstimate = await getBaselineSegmentMinutes(seg.primaryCo, r.route, stopsForAdj, 0, seg.boardIdx, currentTime);
          if (segMinsEstimate === null) {
            segMinsEstimate = await estimateSegmentDuration(r, seg.primaryCo, 0, seg.boardIdx, currentTime);
          }
          if (Number.isFinite(segMinsEstimate)) segMinsForFallback = segMinsEstimate;
        }
        const fallbackSearchTime = segMinsForFallback > 0
          ? new Date(currentTime.getTime() - Math.round(segMinsForFallback) * 60000)
          : currentTime;

        let fallbackTime = (pastLastKnownTrip && !isRelaxableSecondaryLeg) ? null : scheduleFallback(r, fallbackSearchTime, isCandidateLongHaul, seg.boardStopId);
        if (fallbackTime) {
          // 【改善 GTFS 服務檢查】scheduleFallback 淨係靠 r.freq 嗰個粗略嘅
          // 「平日/星期六/星期日」班距表推算，冇比對 calendar.txt /
          // calendar_dates.txt 嘅實際服務例外（例如當日路線暫停服務、
          // 公眾假期特別更改），有機會喺條路線今日根本冇服務嘅情況下，
          // 都砌一個「預計」班次出嚟。所以呢度先額外用返 calendar 資料
          // 做多一重確認，只有喺明確判定「今日冇服務」（=== false）先
          // 捨棄呢個推算班次；如果冇足夠資料判斷（null）就維持原有寬鬆
          // 處理，唔會過度剪走結果。
          // 【再修正】isRelaxableSecondaryLeg（自選行程嘅次程，或者一般
          // 搜尋入面經 freq 核實過現時日子類型＋時段確實有服務嘅次程）
          // 例外：都唔應該即刻令成個組合完全顯示唔到——寧願繼續用返
          // scheduleFallback 呢個 GTFS 班距推算出嚟嘅「預計」時間，都好過
          // 乜都冇。
          if (svcActiveToday === false && !isRelaxableSecondaryLeg) {
            fallbackTime = null;
          }
          // service_type 已經證實停辦，屬於比 svcActiveToday 更直接嘅證據
          // （官方路線列表 API 現正公佈緊嘅路線就係冇呢個變體），一律捨棄，
          // 唔受 isRelaxableSecondaryLeg 影響。
          if (kmbServiceTypeDiscontinued) {
            fallbackTime = null;
          }
        }
        if (fallbackTime) {
          // fallbackTime 本身已經係「總站開出，加返返分站車程後岩岩好到達
          // currentTime」嘅總站開出時間——加返 segMinsForFallback（同上面
          // 搜尋基準時間扣走嗰個一致，避免重複估算兩次唔同嘅車程數值）就
          // 係這個分站嘅實際上車時間。
          const boardTime = segMinsForFallback > 0
            ? new Date(fallbackTime.getTime() + Math.round(segMinsForFallback) * 60000)
            : fallbackTime;
          validDepEtas.push({
            etaDate: boardTime,
            _resolvedCo: seg.primaryCo,
            isFallback: true,
            isGeneric: true,
            isTerminusAdjusted: seg.boardIdx > 0,
            rmk: "預計"
          });
        } else {
          if (!segRelaxed && !isRelaxableSecondaryLeg) {
            if (DEBUG_MODE) console.log(`[候選被淘汰] 路線=${r.route} co=${seg.primaryCo} 上車站=${stopName(seg.boardStopId)} 原因=fallbackTime 為 null 且 !segRelaxed && !isRelaxableSecondaryLeg`);
            return null;
          }
          // 【指定時間出發／自選行程第一程之後嘅車程／一般搜尋經 freq 核實
          // 過寬鬆嘅次程，共用嘅最後一重兜底估算】呢度已經冇 scheduleFallback
          // 嘅具體班次時間，純粹靠粗略 headway 估算，所以更加要 respect GTFS
          // calendar 嘅「今日冇服務」判斷，否則喺明確冇服務嘅日子都會生成一個
          // 假嘅「預計」班次。
          // 【再修正】isRelaxableSecondaryLeg——自選行程嘅次程，或者一般搜尋

          // 入面經 isRouteActiveAroundTime() 核實過現時日子類型＋時段確實應該
          // 有服務嘅次程：即使連呢一重都冇具體證據（既冇 scheduleFallback 嘅
          // 班次時間，GTFS calendar 又話今日冇服務，或者排班表話尾班車已經
          // 開出），都唔再 return null 令成程完全計唔到，而係進入寬鬆模式，用
          // 貼近現時時段嘅 r.freq 班距估算一個「預計」開車時間頂住，車程時間
          // 就交返落面嘅 estimateSegmentDuration（連埋 timeIntervalDb 逐站
          // 觀測秒數）去估算，確保次程一定計得到，避免顯示「無法計算」。一般
          // 搜尋（beam search）同自選行程第一程唔受呢個放寬影響，依然照舊
          // 尊重呢兩個信號。
          if (!isRelaxableSecondaryLeg) {
            if (svcActiveToday === false) {
              if (DEBUG_MODE) console.log(`[候選被淘汰] 路線=${r.route} co=${seg.primaryCo} 上車站=${stopName(seg.boardStopId)} 原因=svcActiveToday===false（GTFS calendar 話今日冇服務）`);
              return null;
            }
            if (pastLastKnownTrip) {
              if (DEBUG_MODE) console.log(`[候選被淘汰] 路線=${r.route} co=${seg.primaryCo} 上車站=${stopName(seg.boardStopId)} 原因=pastLastKnownTrip（尾班車已開出）`);
              return null;
            }
          }

          // 【以 freq 估算等候時間】改用同 scheduleFallback 一致嘅共用邏輯
          // _computeFreqDeparture()——搵返「現時呢一刻」真正落喺邊一個 freq
          // 時段／單點，正確分辨「陣列時段」（用嗰個時段嘅班距估算）同
          // 「null 單點」（呢個 key 本身就已經係實際開車時刻，唔使再加
          // 任何班距）呢兩種完全唔同嘅語義。
          //
          // 【修正「五點後顯示不存在嘅班次」＋「分站時間亂晒」呢兩個根本
          // bug】舊寫法用 `matchedEntry = table[key]` 之後淨係靠
          // `matchedEntry == null` 判斷「有冇搵到啱嘅時段」——完全冇考慮
          // 到「搵到咗個 key、但佢個值本身合法咁就係 null（例如 N42 嘅
          // "0350": null／"0450": null，代表得返兩班獨立嘅具體開車時刻，
          // 唔存在班距呢回事）」同「乜嘢 key 都冇搵到」根本係兩回事——前者
          // 一律被誤判做後者，跌落去用完全唔啱嘅「今日最疏班距」瞎估，
          // 先至會出現尾班車開完之後都仲砌多班出嚟、或者分站時間同實際
          // 排班表完全對唔上呢啲徵狀。而家用 _computeFreqDeparture()
          // 統一處理，佢內部用明確嘅「揾到未揾到」控制流程（唔靠值嘅
          // truthy/falsy），今日確實冇更多已知班次就會傳返 null，令呢個
          // 候選喺呢度直接畀淘汰，唔會再顯示唔存在嘅班次。
          const lookaheadMin = isCandidateLongHaul ? 150 : 90;
          // 【同 scheduleFallback() 一致：合併全部兄弟變體揀最快一班,並修正
          // 「等車時間畀 terminus 車程 double count」bug】唔再淨係揾第一個
          // 「有資料」嘅表就用,而係攞齊 r 自己＋全部兄弟變體嘅 freq 表,逐個
          // 計出候車時間,揀返最快到嘅一班(見上面 _resolveAllEffectiveFreqTables／
          // _computeEarliestFreqDeparture 嘅註解)。同時同上面 fallbackTime
          // 分支一樣,搜尋總站開出時間嗰陣要用「currentTime 減去分站車程」
          // 做基準,先加返呢個車程做返分站上車時間——唔可以直接用 currentTime
          // 做基準先再加車程,否則會白白多等一個分站車程嘅時間。
          let segMinsForFreq = 0;
          if (seg.boardIdx > 0) {
            const stopsForFreqAdj = r.stops[seg.primaryCo] || r.stops[r.primaryCo];
            let segMinsFreqEstimate = await getBaselineSegmentMinutes(seg.primaryCo, r.route, stopsForFreqAdj, 0, seg.boardIdx, currentTime);
            if (segMinsFreqEstimate === null) {
              segMinsFreqEstimate = await estimateSegmentDuration(r, seg.primaryCo, 0, seg.boardIdx, currentTime);
            }
            if (Number.isFinite(segMinsFreqEstimate)) segMinsForFreq = segMinsFreqEstimate;
          }
          const freqSearchTime = segMinsForFreq > 0
            ? new Date(currentTime.getTime() - Math.round(segMinsForFreq) * 60000)
            : currentTime;

          let freqResult = null;
          const allTablesForCandidate = _resolveAllEffectiveFreqTables(r, freqSearchTime, seg.boardStopId, seg.primaryCo);
          if (allTablesForCandidate.length) {
            freqResult = _computeEarliestFreqDeparture(allTablesForCandidate, freqSearchTime, lookaheadMin);
          }
          if (!freqResult) {
            if (DEBUG_MODE) console.log(`[候選被淘汰] 路線=${r.route} co=${seg.primaryCo} 上車站=${stopName(seg.boardStopId)} 原因=_computeFreqDeparture 傳返 null（今日 freq 表冇更多已知班次，或者重未到頭班車嘅可預見範圍）`);
            return null;
          }
          const freqBoardTime = segMinsForFreq > 0
            ? new Date(freqResult.etaDate.getTime() + Math.round(segMinsForFreq) * 60000)
            : freqResult.etaDate;
          validDepEtas.push({
            etaDate: freqBoardTime,
            _resolvedCo: seg.primaryCo,
            isFallback: true,
            isGeneric: true,
            isTerminusAdjusted: seg.boardIdx > 0,
            rmk: "預計"
          });
        }
        } // 閂 if (validDepEtas.length === 0) —— 總站推算已成功就跳過呢一大段兜底
      }
    }

    const branches = [];
    for (const dep of validDepEtas) {
      // 【轉車站群：用返呢班車實際查詢緊嘅站牌】上面 etasBoard 搜尋已經
      // 擴展到成個轉車站群，dep._groupIdx／dep._groupStopId 記低咗呢班
      // 車實際係邊個站序／站牌查到（可能唔再係 seg.boardIdx／
      // seg.boardStopId，例如落車站牌係 KT347，但呢班車實際上要喺轉車
      // 站群入面嘅 KT346 先搭到）。落尾計行車時間／車費／顯示上車站，
      // 一律用返呢班車真正對應嘅站牌，先至準確。冇分組資訊（例如深層
      // GTFS fallback 產生嘅 dep）就維持用返原本嘅 seg.boardIdx／
      // seg.boardStopId，行為同以往一致。
      const boardIdxForDep = (typeof dep._groupIdx === "number") ? dep._groupIdx : seg.boardIdx;
      const boardStopIdForDep = dep._groupStopId || seg.boardStopId;
      const segForDep = (boardIdxForDep !== seg.boardIdx || boardStopIdForDep !== seg.boardStopId)
        ? { ...seg, boardIdx: boardIdxForDep, boardStopId: boardStopIdForDep }
        : seg;

      let durationMins = null;

      // 【純 GTFS 排班 fallback】完全冇實時 ETA，靠 GTFS 靜態 trip 直接讀站到站時間
      if (dep._tripId && !dep.isGeneric) {
        durationMins = await getTripStopDurationByTripId(dep._tripId, boardStopIdForDep, seg.alightStopId);
      }

      // 【第一優先／第二優先】起點有實時 ETA：優先嘗試完整起訖 ETA 直接相減（第一優先，
      // 且落車時間須喺查詢後一小時內），唔得先退返用 GTFS 校準比率估算（第二優先，
      // 並確認當日喺 calendar.txt 服務時間以內）。
      if (durationMins === null && !dep.isFallback) {
        durationMins = await calibrateDurationOneSidedGeneral(
          r, segForDep, dep._resolvedCo, dep, currentTime, etasAlight,
          async (from, to) => {
            const stops = r.stops[dep._resolvedCo] || r.stops[r.primaryCo];
            const baseline = await getBaselineSegmentMinutes(dep._resolvedCo, r.route, stops, from, to, dep.etaDate);
            if (baseline !== null) return baseline;
            return await estimateSegmentDuration(r, dep._resolvedCo, from, to, dep.etaDate);
          },
          now
        );
      }

      if (durationMins === null) {
        const stops = r.stops[dep._resolvedCo] || r.stops[r.primaryCo];
        durationMins = await getBaselineSegmentMinutes(dep._resolvedCo, r.route, stops, boardIdxForDep, seg.alightIdx, dep.etaDate);
        if (durationMins === null) {
          durationMins = await estimateSegmentDuration(r, dep._resolvedCo, boardIdxForDep, seg.alightIdx, dep.etaDate);
        }
      }
      // 無論以上邊個估算方式，若最終唔係有限數字（例如 NaN／Infinity），
      // 一律 fallback 用最基本嘅啟發式估算，確保一定計到到站時間，唔會令結果顯示 --:--
      if (!Number.isFinite(durationMins)) {
        durationMins = await estimateSegmentDuration(r, dep._resolvedCo, boardIdxForDep, seg.alightIdx, dep.etaDate);
      }

      // 【修正「有實時 ETA 都可以低估車程」】上面 calibrateDurationOneSidedGeneral／
      // GTFS trip-based 兩條路徑，都可能靠單一次（甚至部分鏈）嘅實時 ETA 相減
      // 嚟推車程，一旦誤配到上一班已經開出咗嘅車嘅 ETA（尤其係長途、多站、
      // 或者要穿隧道嘅路段，例如「40X 去到城門隧道轉車站只需 11 分鐘」呢類
      // 明顯偏快嘅結果），就會計出一個唔合理嘅短車程。timeIntervalDb（
      // loadTimeIntervalData() 攞返嚟嘅逐站觀測行車秒數）係大量歷史實時 ETA
      // 差值統計出嚟嘅結果，比單一次即時相減更可信。呢度無論之前用邊一種
      // 方式計出 durationMins，都額外逐站（sumTimeIntervalSeconds）攞返一個
      // 觀測總和做「下限」——只有喺 boardIdx 到 alightIdx 之間每一段都有完整
      // 觀測數據（傳返唔係 null）先會生效，避免用不完整數據去誤推高車程；
      // 如果實時 ETA 推算出嚟嘅結果明顯短過呢個逐站觀測下限，代表好可能誤配
      // 咗錯嘅班次，改用逐站觀測總和。
      const stopByStopStops = r.stops[dep._resolvedCo] || r.stops[r.primaryCo];
      const stopByStopSec = sumTimeIntervalSeconds(stopByStopStops, boardIdxForDep, seg.alightIdx);
      if (stopByStopSec !== null) {
        const stopByStopMin = stopByStopSec / 60;
        if (stopByStopMin > durationMins) {
          durationMins = stopByStopMin;
        }
      }

      const alightTime = new Date(dep.etaDate.getTime() + durationMins * 60000);
      const fare = getSegFare(r, dep._resolvedCo, boardIdxForDep, seg.alightIdx, dep.etaDate);
      
      const newLegs = pathLegs.slice();
      newLegs.push({
        type: "ride",
        routeId: seg.routeId,
        routeNo: r.route,
        co: dep._resolvedCo,
        r,
        boardStopId: boardStopIdForDep,
        alightStopId: seg.alightStopId,
        departTime: dep.etaDate,
        arriveTime: alightTime,
        rmk: dep.rmk,
        isSpeculative: dep.isFallback,
        fare
      });

      const res = await dfs(segIdx + 1, alightTime, newLegs, rideCount + 1);
      if (res) branches.push(res);
    }

    if (branches.length === 0) return null;
    branches.sort((a,b) => a.arriveTime - b.arriveTime);
    return branches[0];
  }

  const initialTime = now;
  let finalResult = await dfs(0, initialTime, [], 0);
  
  // 【修正】以往呢度重試時冇真正將 relaxed 開關切換做 true，dfs() 入面所有
  // `if (!relaxed) return null;` 判斷都仲然生效，令呢個「放寬重試」形同虛設 ——
  // 完全冇真實班次／GTFS 靜態班次資料嘅組合（例如自選行程入面用戶自己揀嘅路線＋站，
  // 淨係得呢一個候選組合，冇其他候選可以頂替）就會直接失敗，搜尋唔到結果。
  // 而家重新賦值 relaxed 呢個參數，令 dfs() 閉包入面嘅判斷確實生效，
  // 容許用「粗略估算班次時間」嚟兜底，令組合仍然計到結果。
  if (!finalResult && !relaxed) {
    relaxed = true;
    finalResult = await dfs(0, initialTime, [], 0);
  }
  return finalResult;
}
