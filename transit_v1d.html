function getCompanies(r) {
  const companies = [];
  if (!r || !r.co) return companies;
  const coList = Array.isArray(r.co) ? r.co : [r.co];
  for (const c of coList) {
    if (r.stops && r.stops[c] && r.stops[c].length) {
      companies.push(c);
    }
  }
  return companies;
}

function buildIndices(){
  stopRouteIndex = new Map();
  for (const [routeId, r] of Object.entries(etaDb.routeList)){
    const companies = getCompanies(r);
    if (!companies.length) continue;
    
    const primaryCo = companies[0];
    const stops = r.stops[primaryCo];
    stops.forEach((stopId, idx) => {
      if (!stopId) return;
      if (!stopRouteIndex.has(stopId)) stopRouteIndex.set(stopId, []);
      stopRouteIndex.get(stopId).push({routeId, idx, companies, primaryCo});
    });
  }
  buildGridIndex(etaDb.stopList);
  // 建立 serviceType 兄弟變體索引（見上面 routeSiblingIndex 頂部註解）。
  // loadRouteFareData() 有機會之後再補入額外路線（例如純粹存在於
  // routeFareList.min.json 但唔喺主 etaDb 入面嘅變體），所以嗰邊完成
  // 之後會再呼叫一次呢個 function 重建索引，確保新補入嘅路線都計得到。
  buildRouteSiblingIndex();
}

/* ---------------- stop search / autocomplete ---------------- */
function searchStops(query, limit=18){
  const q = query.trim();
  if (!q || !etaDb) return [];
  const qLower = q.toLowerCase();
  const out = [];
  for (const [stopId, s] of Object.entries(etaDb.stopList)){
    const entries = stopRouteIndex.get(stopId);
    if (!entries) continue;
    const zh = s.name.zh || "";
    const en = s.name.en || "";
    if (zh.includes(q) || en.toLowerCase().includes(qLower)){
      if (!s.location) continue; // 防禦：個別站（例如座標比對失敗嘅港鐵站）可能冇座標
      const isMtr = entries.some(e => Array.isArray(e.companies) && e.companies.includes("mtr"));
      // 【輕鐵站名標示 —— 見 loadLightRailData() 頂部註解】純粹撞名比對，
      // 唔代表呢個站牌本身係輕鐵站，只係話呢個地方都有輕鐵服務。
      // 【修正】西鐵綫（TML）有幾個站（屯門、兆康、天水圍、朗屏、元朗）
      // 本身就同輕鐵站撞名——如果冇下面呢個 !isMtr 條件，呢啲港鐧虛擬站
      // 就會「港鐧 logo」＋「輕鐧 logo」齊齊出現，令佢喺自動完成選單裏面
      // 睇落好似同另一個名字一樣、但淨係得輕鐧 logo 嘅原有巴士站「撞版
      // 重複」，分唔清邊個先係真正嘅港鐧站。而家淨係喺唔係港鐧站嘅站牌
      // （即係原有巴士/小巴站）先至加輕鐧 logo,兩者清楚分開。
      const isLightRail = !isMtr && !!(lightRailDb && lightRailDb.stopNameSet && lightRailDb.stopNameSet.has(_mtrNormalizeStationName(zh)));
      out.push({stopId, zh, en, lat:s.location.lat, lng:s.location.lng, isMtr, isLightRail});
      if (out.length >= 400) break;
    }
  }
  out.sort((a,b)=>{
    const aS = a.zh.startsWith(q) ? 0 : 1;
    const bS = b.zh.startsWith(q) ? 0 : 1;
    if (aS !== bS) return aS - bS;
    return a.zh.length - b.zh.length;
  });

  // 取消將名稱相同/相似＋位置相近的站牌合併做代表性選項：
  // 站牌合併會將實際位置不同（例如市中心上車點 vs 總站）嘅站隱藏埋，
  // 令用戶無法喺 autocomplete 揀返最啱嘅實際上車站（例如 E42 喺市中心
  // 已經可以上車，但合併後只剩總站選項，變相迫用戶步行去總站）。
  // 現直接列出所有比對到嘅站牌，唔再經 isSameTransferPoint() 合併；
  // 路線搜尋（runBeamSearch/nearbyStops）本身已經會涵蓋鄰近站牌的路線，
  // 呢度只需要如實反映實際存在嘅每一個站牌畀用戶自行揀選。
  return out.slice(0, limit);
}

function wireAutocomplete(input, suggestEl, onPick){
  let debounce;
  input.addEventListener("input", () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      const results = searchStops(input.value);
      renderSuggest(suggestEl, results, onPick);
    }, 120);
  });
  input.addEventListener("focus", () => {
    if (input.value.trim()) {
      renderSuggest(suggestEl, searchStops(input.value), onPick);
    }
  });
  document.addEventListener("click", (e) => {
    if (!suggestEl.contains(e.target) && e.target !== input) suggestEl.hidden = true;
  });
}
function renderSuggest(suggestEl, results, onPick){
  suggestEl.innerHTML = "";
  if (!results.length){
    suggestEl.innerHTML = `<div class="empty">搵唔到相符嘅站</div>`;
    suggestEl.hidden = false;
    return;
  }
  for (const r of results){
    const btn = document.createElement("button");
    btn.type = "button";
    // 港鐵 logo：呢個站牌本身有港鐵路線提供服務（見 searchStops() 嘅
    // isMtr）。輕鐵 logo：純粹站名撞中輕鐵站名 CSV（見 isLightRail，而家
    // 已經排除咗港鐧站本身,只淨返原有巴士/小巴站先會有呢個 logo），
    // 淨係做視覺提示，唔代表個站牌本身係輕鐵站。兩個 logo 依家擺喺中文
    // 站名右邊（而唔係前面），避免遮住站名開頭嗰個字。
    const mtrIconHtml = r.isMtr
      ? `<img class="station-mode-icon" src="https://upload.wikimedia.org/wikipedia/en/archive/b/b9/20210510163405%21HK_MTR_logo.svg" title="港鐵">`
      : "";
    const lrIconHtml = r.isLightRail
      ? `<img class="station-mode-icon" src="https://static.wikia.nocookie.net/hk-rail/images/1/1d/LR_old.svg/revision/latest/scale-to-width-down/250?cb=20090629110056&path-prefix=zh" alt="輕鐵" title="鄰近輕鐵站">`
      : "";
    btn.innerHTML = `${escapeHtml(r.zh||r.en)}${mtrIconHtml}${lrIconHtml}<small>${escapeHtml(r.en||"")}</small>`;
    btn.addEventListener("click", () => {
      onPick({stopId:r.stopId, name:r.zh||r.en, lat:r.lat, lng:r.lng});
      suggestEl.hidden = true;
    });
    suggestEl.appendChild(btn);
  }
  suggestEl.hidden = false;
}
function escapeHtml(s){
  return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

      loadLightRailFullData(); // 背景載入輕鐵資料
    } else {

      }
    }
  });
});

/* ---------------- Check Shape of Route ---------------- */
function analyzeCandidateShape(segs, straightLineTotalM){
  let accumulated = 0;
  const rideLegs = [];
  for (const s of segs){
    if (s.type === "ride"){
      const bLoc = etaDb.stopList[s.boardStopId];
      const aLoc = etaDb.stopList[s.alightStopId];
      if (bLoc && aLoc) accumulated += distM(bLoc.location, aLoc.location);
      rideLegs.push(s);
    } else if (s.type === "walk"){
      accumulated += s.distM || 0;
    }
  }

  let isCircuitous = false;
  if (straightLineTotalM > 300){
    const ratio = accumulated / straightLineTotalM;
    //放寬至 3.5 倍
    if (ratio > 3.5) isCircuitous = true;
  }

  let hasRedundantHop = false;

  for (let i = 0; i < rideLegs.length; i++) {
    const seg = rideLegs[i];
    const alightLoc = etaDb.stopList[seg.alightStopId]?.location;
    
    if (alightLoc) {
      const distToOrigin = distM(alightLoc, { lat: origin.lat, lng: origin.lng });
      if (distToOrigin <= 400) {
        hasRedundantHop = true;
        break;
      }
    }

    const nextSeg = segs[segs.indexOf(seg) + 1];
    if (nextSeg && nextSeg.type === "walk" && nextSeg.toStopId) {
      const walkToLoc = etaDb.stopList[nextSeg.toStopId]?.location;
      if (walkToLoc) {
        const distToOrigin = distM(walkToLoc, { lat: origin.lat, lng: origin.lng });
        if (distToOrigin <= 400) {
          hasRedundantHop = true;
          break;
        }
      }
    }
  }

  if (!hasRedundantHop) {
    for (let i = 0; i < rideLegs.length && !hasRedundantHop; i++){
      const prevSeg = rideLegs[i];
      const prevStops = prevSeg.r.stops[prevSeg.primaryCo];
      if (!prevStops) continue;
      const scanEnd = Math.min(prevStops.length - 1, prevSeg.boardIdx + LOOKAHEAD_STOPS);
      
      for (let j = i + 2; j < rideLegs.length && !hasRedundantHop; j++){
        const laterSeg = rideLegs[j];
        const targetLoc = etaDb.stopList[laterSeg.boardStopId];
        if (!targetLoc) continue;
        for (let k = prevSeg.boardIdx + 1; k <= scanEnd; k++){
          const cLoc = etaDb.stopList[prevStops[k]];
          if (!cLoc) continue;
          if (distM(cLoc.location, targetLoc.location) <= MAX_TRANSFER_WALK_M){ hasRedundantHop = true; break; }
        }
      }
      
      for (let j = i + 1; j < rideLegs.length && !hasRedundantHop; j++){
        const laterSeg = rideLegs[j];
        const targetLoc = etaDb.stopList[laterSeg.alightStopId];
        if (!targetLoc) continue;
        for (let k = prevSeg.boardIdx + 1; k <= scanEnd; k++){
          const cLoc = etaDb.stopList[prevStops[k]];
          if (!cLoc) continue;
          if (distM(cLoc.location, targetLoc.location) <= MAX_TRANSFER_WALK_M){ hasRedundantHop = true; break; }
        }
      }
    }
  }

  return {isCircuitous, hasRedundantHop};
}

/* ---------------- Route Graph Beam Search ---------------- */
// 【改善路線多樣性】以往每個 leg-count bucket 淨係揀返 heuristic（純粹
// 距離／detour／轉車懲罰嘅靜態分數，同真實班次疏密完全無關）排名最好嗰
// minQuotaPerBucket 個候選，好容易畀「heuristic 相近嘅同一條路線」霸咗
// 晒個 quota，令另一條實際班次密好多嘅路線連入去 evaluateCandidate()
// 用實時／推算班次重新評估嘅機會都冇，最終結果死咬住某一條路線，唔理
// 佢等車等成點。
//
// 【v2：擴展到次程】以往嘅多樣性判斷淨係睇「最後一程」嘅路線編號，會
// 漏咗一種常見情況：首程唔同、但次程（轉車之後嗰一程）全部撞埋用同
// 一條路線嘅候選，一樣可以毫無限制咁樣塞滿個 bucket——如果嗰條次程
// 路線 heuristic 稍為好少少，就會將所有用其他次程路線嘅候選擠出
// quota，落到 evaluateCandidate() 先發現呢條次程路線其實班次疏、落車
// 後要等成 20 分鐘先有下一班，但已經冇其他次程路線嘅候選入圍比較。
// 用戶反映嘅「次程等待太耐，應該考慮返其他路線」正正就係呢個根因。
//
// 而家攞成程（唔止最後一程）每一程用過嘅路線編號，逐一計入多樣性判斷：
// 只要候選入面任何一程嘅路線已經用滿 perRouteCap，就當呢個候選「唔夠
// 多樣化」，推遲去 deferred，優先畀真正用緊其他路線（包括其他次程路線）
// 嘅候選入選，等佢哋都有機會入到 evaluateCandidate() 用真實班次重新
// 評估、比較邊條路線落車後等車時間較短。如果因為呢個上限令 quota 未
// 揾夠數，就放寬上限、跟返 heuristic 順序補滿，確保唔會無故減少總候選
// 數量。
function _rideRouteIdsOf(cand){
  return cand.segs.filter(s => s.type === "ride").map(s => s.routeId);
}

function _pickDiverseFromBucket(bucket, quota, perRouteCap){
  const picked = [];
  const routeUseCount = new Map();
  const deferred = [];
  for (const c of bucket){
    if (picked.length >= quota) { deferred.push(c); continue; }
    const routeIds = _rideRouteIdsOf(c);
    const maxUsed = routeIds.length
      ? Math.max(...routeIds.map(id => routeUseCount.get(id) || 0))
      : 0;
    if (maxUsed < perRouteCap){
      picked.push(c);
      for (const id of routeIds) routeUseCount.set(id, (routeUseCount.get(id) || 0) + 1);
    } else {
      deferred.push(c);
    }
  }
  // 上限太嚴令 quota 未填滿：跟返原本 heuristic 順序（deferred 已保持
  // 順序）放寬補位，唔會因為多樣性檢查反而揀少咗候選。
  let idx = 0;
  while (picked.length < quota && idx < deferred.length){
    picked.push(deferred[idx]);
    idx++;
  }
  return { picked, leftover: deferred.slice(idx) };
}

function selectDiverseCandidates(candidates, limit){
  if (candidates.length <= limit) return candidates.slice();

  const byLegs = new Map();
  for (const c of candidates){
    if (!byLegs.has(c.legs)) byLegs.set(c.legs, []);
    byLegs.get(c.legs).push(c);
  }
  for (const arr of byLegs.values()) arr.sort((a,b) => a.heuristic - b.heuristic);

  const legCounts = [...byLegs.keys()].sort((a,b) => a - b);
  const minQuotaPerBucket = Math.max(4, Math.floor(limit / Math.max(1, legCounts.length)));
  const perRouteCap = Math.max(1, Math.ceil(minQuotaPerBucket / 3));

  const result = [];
  const leftoverByLegs = new Map();
  for (const lc of legCounts){
    const bucket = byLegs.get(lc);
    const { picked, leftover } = _pickDiverseFromBucket(bucket, minQuotaPerBucket, perRouteCap);
    result.push(...picked);
    leftoverByLegs.set(lc, leftover);
  }

  if (result.length < limit){
    const rest = [];
    for (const lc of legCounts) rest.push(...leftoverByLegs.get(lc));
    rest.sort((a,b) => a.legs - b.legs || a.heuristic - b.heuristic);
    result.push(...rest.slice(0, limit - result.length));
  }

  result.sort((a,b) => a.legs - b.legs || a.heuristic - b.heuristic);
  return result.slice(0, limit);
}

// 移除任何外部 OSRM 請求
async function runBeamSearch(origin, destination, blacklist = new Set(), atTime = new Date()) {
  const isLantauTrip = computeIsLantauTrip(origin, destination);
  const straightLineTotalM = distM({lat:origin.lat,lng:origin.lng},{lat:destination.lat,lng:destination.lng});
  // 【精簡】唔再按直線距離分長途／極長途，統一用固定嘅步行半徑
  // （ENDPOINT_WALK_RADIUS_M＝600米／MAX_TRANSFER_WALK_M）同懲罰係數。
  const adaptiveTransferWalkM = MAX_TRANSFER_WALK_M;
  const adaptiveEndpointWalkM = ENDPOINT_WALK_RADIUS_M;
  const detourScale = 0.6;
  const backtrackScale = 1.0;
  const transferScale = 1.0;

  const legsAllowed = MAX_LEGS;

  const directExists = hasDirectService(origin, destination, atTime);

  let originAlts = [];
  let origStopId = origin.stopId;

  if (!origStopId) {
    // 支援 GPS 起點：尋找 150 米內最接近的車站
    let closestId = null;
    let minD = Infinity;
    for (const [stopId, s] of Object.entries(etaDb.stopList)) {
      const d = distM({lat: origin.lat, lng: origin.lng}, s.location);
      if (d < minD) {
        minD = d;
        closestId = stopId;
      }
    }
    if (minD <= 150) {
      origStopId = closestId;
    }
  }

  // 同一站群嘅所有站牌 —— 步行距離視為 0
  const groupStopsMap = new Map();
  if (origStopId) {
    const originStop = etaDb.stopList[origStopId];
    if (originStop) {
      for (const [stopId, s] of Object.entries(etaDb.stopList)) {
        if (isSameTransferPoint(originStop, s)) {
          groupStopsMap.set(stopId, { stopId, dist: 0 });
        }
      }
    }
  }

  // 有冇搵到直達站，等步行轉乘方案都有平等機會入圍
  const nearbyAltsList = origin.stopId
    ? [{stopId: origin.stopId, dist: 0}].concat(nearbyStops(origin.lat, origin.lng, adaptiveEndpointWalkM).filter(s => s.stopId !== origin.stopId))
    : nearbyStops(origin.lat, origin.lng, adaptiveEndpointWalkM);

  // (1) 同 (2) 取聯集，同一個 stopId 出現喺兩邊就揀較細嘅步行距離
  const originAltsMap = new Map(groupStopsMap);
  for (const alt of nearbyAltsList) {
    const existing = originAltsMap.get(alt.stopId);
    if (!existing || alt.dist < existing.dist) originAltsMap.set(alt.stopId, alt);
  }
  originAlts = Array.from(originAltsMap.values());

  // 【改善上車站搜尋 - 全面版】舊做法有個「先有雞定先有蛋」嘅缺陷：要先
  // 靠 nearbyStops() 用直線半徑喺起點附近搵到某個候選站，先至會去睇嗰個
  // 站有咩路線經過，再喺嗰條路線嘅站序前後掃 LOOKAHEAD_STOPS 個站搵埋近
  // 少少嘅分站。但如果起點半徑（adaptiveEndpointWalkM）之內一個站都冇途經
  // 目標路線（例如 88X），就算嗰條路線其實喺半徑外邊少少已經有一個好近
  // 嘅站，都完全冇機會俾發現——因為根本冇一個「種子候選站」係行嗰條路線，
  // 於是被迫捨近取遠，行去好遠嗰個站先上到車（即用戶反映嘅「無謂步行」）。
  //
  // 落車站嗰邊冇呢個問題，係因為佢嘅出發點係「已經確定要搭嘅路線」，直接
  // 喺路線本身完整嘅站序度掃描邊個站最貼近終點，完全唔使靠半徑先「發現」
  // 路線。依家上車站都跟返呢個思路：
  //   1) 先用一個闊啲嘅「路線探索半徑」（放寬到 adaptiveEndpointWalkM 嘅
  //      2 倍，純粹用嚟發現附近有邊啲路線經過，唔係最終步行距離上限）；
  //   2) 對每一條噉樣搵到嘅路線，喺佢自己成條站序入面逐站計算與起點嘅
  //      真實距離，揀返「全程距離起點最近」嗰一個站，先至係嗰條路線真正
  //      最佳嘅上車站——而唔淨係限死喺個別候選站 index 前後 LOOKAHEAD_STOPS
  //      嘅範圍內搵；
  //   3) 最後先用 adaptiveEndpointWalkM 呢個實際可接受嘅步行距離去把關，
  //      揀出嚟嘅站行唔到咁遠就唔會攞嚟做候選。
  {
    const routeDiscoveryRadiusM = adaptiveEndpointWalkM * 2;
    const discoveryStops = nearbyStops(origin.lat, origin.lng, routeDiscoveryRadiusM);

    const candidateRouteKeys = new Set(); // "routeId"（唔再綁死單一 co）
    for (const ds of discoveryStops) {
      const routesHereForDiscovery = stopRouteIndex.get(ds.stopId) || [];
      for (const rt of routesHereForDiscovery) {
        candidateRouteKeys.add(rt.routeId);
      }
    }

    const bestPerOrigin = new Map(); // stopId -> {stopId, dist}
    for (const o of originAlts) {
      const existing = bestPerOrigin.get(o.stopId);
      if (!existing || o.dist < existing.dist) bestPerOrigin.set(o.stopId, o);
    }

    // 網址加 ?debug=1，可以喺 console 睇返實際發現咗邊啲路線。
    const debugRows = [];

    for (const routeId of candidateRouteKeys) {
      const rr = etaDb.routeList[routeId];
      if (!rr) continue;
      const routeCompanies = getCompanies(rr);
      if (!routeCompanies.length) continue;

      // 沿路線成條站序（而非只喺已知候選站附近）搵返實際離起點最近嗰個站
      //
      // 【修正：淨係揀 distM 最近嗰一個站，會永久甩漏真正行路最近嘅站】
      // distM() 本身只係直線 / 曼哈頓距離嘅粗略估算，喺邨內迂迴、要行斜路
      // 或者掉頭嘅路網（例如安達邨/寶達邨呢種多重迴旋斜路，睇地圖就知
      // 唔係直線可以估到），呢個估算隨時會估錯邊個站先係真正行路最近。
      // 下游 evaluateCandidate() 其實已經有針對 >100 米嘅步行段 call OSRM
      // 攞返真實路網步行距離嚟修正，但如果呢度淨係揀「distM 估計最近」
      // 嗰一個站，另一個實際上行路更近嘅站根本冇機會俾 OSRM 修正
      // 嘅機會就已經永久甩漏咗。而家改為保留 distM 最近嘅頭三個候選站
      // （唔止頭兩個；並且跨埋條路線所有公司變體一齊揀），等佢哋都有
      // 機會入到 beam search，落到 evaluateCandidate 嗰陣用真實 OSRM
      // 步行距離重新評估，令搜尋結果最終會用返實際到站時間嚟自然揀返
      // 真正較優嘅嗰個，而唔係喺呢一步就俾粗略估算一鎚定音。
      const topCandidates = []; // [{stopId, dist}]，由近到遠，最多 3 個
      const TOP_K = 3;
      for (const co of routeCompanies) {
        const stopsArrForRoute = rr.stops[co];
        if (!stopsArrForRoute) continue;
        for (const candId of stopsArrForRoute) {
          const cs = etaDb.stopList[candId];
          if (!cs || !cs.location) continue;
          const d = distM({lat: origin.lat, lng: origin.lng}, cs.location);
          if (topCandidates.length < TOP_K) {
            topCandidates.push({ stopId: candId, dist: d });
            topCandidates.sort((a, b) => a.dist - b.dist);
          } else if (d < topCandidates[TOP_K - 1].dist) {
            // 同一個 stopId（唔同公司變體撞到同一個實際站）唔重複佔位
            if (!topCandidates.some(c => c.stopId === candId)) {
              topCandidates[TOP_K - 1] = { stopId: candId, dist: d };
              topCandidates.sort((a, b) => a.dist - b.dist);
            }
          }
        }
      }
      const bestStopId = topCandidates[0]?.stopId || null;
      const bestDist = topCandidates[0]?.dist ?? Infinity;


      if (DEBUG_MODE) {
        const bestName = bestStopId ? (etaDb.stopList[bestStopId]?.name?.zh || etaDb.stopList[bestStopId]?.name?.en || bestStopId) : "(冇搵到有效站)";
        debugRows.push({
          route: rr.route || routeId,
          routeId,
          bestStopId, bestName,
          bestDistM: Math.round(bestDist)
        });
      }

      // 【接受半徑同「發現半徑」分開處理，避免大幅超出實際可接受步行距離】
      // 之前呢度試過用返 adaptiveEndpointWalkM（例如長途行程 750 米）把關，但
      // 上面已經用兩倍嘅 routeDiscoveryRadiusM 先去發現有邊啲路線經過。噉樣
      // 出現一個矛盾：一個站可以「啱啱好喺發現半徑之內搵到」（例如
      // 953 米，喺 1500 米嘅發現半徑之內），但因為 953 米超過收窄用嘅
      // 750 米門檻，結果又俾呢度即刻剔走，令個真正最近嘅上車站憑空消失。
      // 於是改為直接用返 routeDiscoveryRadiusM（即足足 2 倍 adaptiveEndpointWalkM）
      // 嚟把關——但呢個做法過咗火：極長途行程嘅 adaptiveEndpointWalkM 上限
      // 已經係 900 米，2 倍即係最多可以接受 1800 米（1.6-1.8 公里）嘅上車
      // 步行距離，變成用戶反映嘅「無謂步行」（行 1.6 公里先上到車）。
      // 而家改為發現用闊半徑（唔變，繼續搵晒附近有邊啲路線經過），但接受
      // 把關收窄做 adaptiveEndpointWalkM 嘅 1.3 倍——呢個倍數啱啱好夠涵蓋
      // 番上面提到 953÷750≈1.27 倍嗰個歷史 case，但唔會再放行成 1.8 倍
      // 咁誇張嘅步行距離。
      // 【再收窄】用戶反映長途線（例如 89D）仍然會被引導去行 1.5 公里先
      // 上到車，即使起點附近其實已經有更近嘅上車站。將倍數由 1.3 進一步
      // 收緊到 1.1，減少「為咗湊夠某條路線而捨近取遠」嘅情況；真正需要
      // 行遠少少先上到車嘅路線依然過到 1.1 倍呢關，但唔會再放行到 1.3 倍
      // 咁鬆。
      const ACCEPT_OVERAGE_MULTIPLIER = 1.1;
      const acceptRadiusM = Math.min(routeDiscoveryRadiusM, adaptiveEndpointWalkM * ACCEPT_OVERAGE_MULTIPLIER);
      // 頭三近嘅候選站（跨埋所有公司變體）逐個攞去把關，過到就放入
      // bestPerOrigin，等佢哋都有機會入到 beam search，落到
      // evaluateCandidate() 嗰陣用真實 OSRM 步行距離重新評估。
      for (const cand of topCandidates) {
        if (cand.dist > acceptRadiusM) continue;
        const existing = bestPerOrigin.get(cand.stopId);
        if (!existing || cand.dist < existing.dist) {
          bestPerOrigin.set(cand.stopId, { stopId: cand.stopId, dist: cand.dist });
        }
      }
    }

    if (DEBUG_MODE) {
      debugRows.sort((a,b) => a.bestDistM - b.bestDistM);
      console.log(
        `[上車站偵錯] 起點=${origin.name || ""}｜發現半徑=${Math.round(routeDiscoveryRadiusM)}米｜` +
        `喺附近搵到 ${discoveryStops.length} 個鄰近站，涉及 ${candidateRouteKeys.size} 條路線變體。` +
        `逐條路線嘅最近上車站（由近到遠）：`
      );
      console.table(debugRows);
    }

    originAlts = Array.from(bestPerOrigin.values());
  }

  let frontier = [];
  for (const oc of originAlts){
    if (!stopRouteIndex.has(oc.stopId)) continue;
    const segs = [];
    if (oc.dist > 0){
      segs.push({type:"walk", fromLat:origin.lat, fromLng:origin.lng, fromName:origin.name, toStopId:oc.stopId, distM:oc.dist});
    }

    // 出發點到上車點路程，計算真實物理距離，並補回步行分鐘
    // 避免同站群在 nearbyStops 歸 0 導致系統建議不切實際的步行往分站
    const ocLoc = etaDb.stopList[oc.stopId]?.location;
    const actualWalkDist = (origin.stopId && oc.stopId === origin.stopId) ? 0 : (ocLoc ? distM({lat:origin.lat, lng:origin.lng}, ocLoc) : oc.dist);

    if (actualWalkDist > 0){
      const walkMinutes = Math.max(1, Math.ceil(actualWalkDist / WALK_SPEED_MPS / 60));
      segs.push({type:"walk", fromLat:origin.lat, fromLng:origin.lng, fromName:origin.name, toStopId:oc.stopId, distM:actualWalkDist, minutes:walkMinutes});
    }

    // 計算替代車站到終點的實際距離
    const dGoal = ocLoc ? distM(ocLoc, {lat:destination.lat, lng:destination.lng}) : distM({lat:origin.lat,lng:origin.lng},{lat:destination.lat,lng:destination.lng});

    // 無謂步行的成本
    const walkPenaltyMultiplier = 1.8;

     frontier.push({
  stopId: oc.stopId, 
  legs: 0, 
  usedRoutes: new Set(), 
  lastRouteId: null, 
  lastCo: null, 
  // 【區分「用嚟阻止即刻重複上返同一條路線」嘅 lastRouteId／lastCo】
  // 同「真正上一程實際搭緊嘅路線」嘅 lastRideRouteId／lastRideCo】：
  // 落面 transfer-walk 嘅擴展步驟會刻意將 lastRouteId／lastCo 清做
  // null（等行完一段轉車步行之後，仍然可以喺另一個站重新上返同一條
  // 路線），但呢個清空唔應該連帶累事——好多評分邏輯（跨公司轉車懲罰、
  // 九巴官方轉車站 bonus、「上一程坐到底其實已經夠近終點」嘅無謂轉車
  // 檢查等）都需要知道「就算行緊緊轉車，實際上一程搭嘅係邊條路線／
  // 邊間公司」，先計得啱。lastRideRouteId／lastRideCo 就係專門用嚟保留
  // 呢個「真實上一程」資訊，唔會被轉車步行清走。
  lastRideRouteId: null,
  lastRideCo: null,
  segs,
  heuristic: dGoal + (actualWalkDist * walkPenaltyMultiplier)
});
if (DEBUG_MODE) console.log("[frontier]", oc.stopId, etaDb.stopList[oc.stopId]?.name?.zh, "dist=", actualWalkDist, "heuristic=", dGoal + (actualWalkDist * walkPenaltyMultiplier));
  }

  const candidates = [];
  const seenRouteSeqs = new Map(); // key: 路線序列 -> candidates 陣列入面嘅 index，用嚟揀落車站最貼近終點嘅版本

  for (let round = 0; round < legsAllowed; round++){
    const byStop = new Map(); 
    for (const st of frontier){
      if (!byStop.has(st.stopId)) byStop.set(st.stopId, new Map());
      const routeBucket = byStop.get(st.stopId);
      const routeKey = st.lastRouteId || "__walk__";
      const cur = routeBucket.get(routeKey);
      if (!cur || st.heuristic < cur.heuristic) routeBucket.set(routeKey, st);
    }
    let states = [];
    for (const routeBucket of byStop.values()){
      for (const st of routeBucket.values()) states.push(st);
    }
    states.sort((a,b)=>a.heuristic-b.heuristic);
    states = states.slice(0, BEAM_WIDTH);

    const nextRaw = [];

    for (const st of states){
      const stLoc = etaDb.stopList[st.stopId];
      if (!stLoc) continue;
      const dGoal = distM(stLoc.location, {lat:destination.lat, lng:destination.lng});
      
      const allowedFinalWalk = getRegionWalkLimit(destination.lat, destination.lng, destination.name);
      if (st.legs > 0 && dGoal <= allowedFinalWalk){
        const finalSegs = st.segs.slice();
        if (dGoal > 50){
          finalSegs.push({type:"walk", fromStopId:st.stopId, toLat:destination.lat, toLng:destination.lng, toName:destination.name, distM:dGoal});
        }
        // 【修正上車站考慮邏輯】以往嘅 key 淨係計「乘搭路線序列」，唔理喺邊個站上車。
        // 令同一條路線（例如 A41P）喺唔同站上車嘅兩個候選（一個喺起點附近嘅站直接上，
        // 一個要行去總站先上），會撞正同一個 key，而下面嘅比較邏輯淨係睇「落車站
        // 距終點有幾近」，完全冇比較上車嗰段要行幾遠 —— 結果搜尋處理次序行先嘅
        // 版本（可能啱啱好係嗰個要行遠啲先上到車嘅總站版本）會霸咗個位，令真正
        // 起點附近已經有直達服務嘅、唔使點行嘅版本被捨棄，導致「明明起點已有服務，
        // 卻要行去第二個站，仲可能因而追唔到本來上到嘅一班車」。而家將第一程上車站
        // 都編入 key 入面，等唔同上車站嘅版本分別保留做獨立候選，交返落去用實時
        // 班次評估（evaluateCandidate）嗰邊，用實際到站時間去判斷邊個上車方案先至
        // 真係去得快，而唔係喺呢度就靠「有冇撞 key」武斷咁淘汰咗其中一個。
        const firstRideSeg = finalSegs.find(s => s.type === "ride");
        const boardKeyPart = firstRideSeg ? (firstRideSeg.boardStopId || "") : "";
        const key = boardKeyPart + "::" + finalSegs.filter(s=>s.type==="ride").map(s=>s.routeId).join(">");
        const existingIdx = seenRouteSeqs.get(key);
        if (existingIdx === undefined){
          const shape = analyzeCandidateShape(finalSegs, straightLineTotalM);
          candidates.push({segs:finalSegs, legs:st.legs, heuristic:dGoal, isCircuitous:shape.isCircuitous, hasRedundantHop:shape.hasRedundantHop});
          seenRouteSeqs.set(key, candidates.length - 1);
        } else if (dGoal < candidates[existingIdx].heuristic) {
          // 上車站已經一致（同一個 key），呢度純粹揀返嗰個落車後步行去終點距離
          // （dGoal）最短嘅版本，符合「落車站應該揀最貼近目的地嗰個」嘅原則。
          const shape = analyzeCandidateShape(finalSegs, straightLineTotalM);
          candidates[existingIdx] = {segs:finalSegs, legs:st.legs, heuristic:dGoal, isCircuitous:shape.isCircuitous, hasRedundantHop:shape.hasRedundantHop};
        }
      }
      
      if (dGoal <= 500) continue;
      if (st.legs >= legsAllowed) continue;

      const routesHere = stopRouteIndex.get(st.stopId) || [];
      for (const rt of routesHere){
        if (blacklist.has(rt.routeId)) continue; 
        if (st.usedRoutes.has(rt.routeId)) continue;
        if (rt.routeId === st.lastRouteId) continue;
        const r = etaDb.routeList[rt.routeId];
        if (!r) continue;

        // 【路線服務時間驗證閘門】搜尋概念重整：唔理係第一程（起點附近搵
        // 直達／往轉車站嘅路線）定係後續轉車嗰程，凡係打算擴展落去嘅路線，
        // 一律要先通過 isRouteActiveAroundTime() 核實「現時查詢時段」真係
        // 有班次運作，先至畀佢入圍做候選段。以往呢個驗證淨係做喺
        // hasDirectService()（純粹用嚟調整轉車懲罰嘅參考旗標），beam search
        // 本身展開路線時完全冇核實服務時間，令通宵線（N 開頭，日頭冇服務）
        // 或者好似 61P 咁淨係得少數特定班次運作嘅特別路線，都會被當成
        // 「隨時有得搭」而混入結果——尤其係中途轉車嗰程，用戶好難一眼睇出
        // 唔對路。而家將驗證下放到呢個共用嘅路線展開位置，確保每一程都係
        // 「搵到路線 -> 驗證服務時間 -> 通過先至放入結果」，第一程搵唔到
        // 就自然落去搵轉車站／終點路線，再用同一套驗證邏輯逐程核實落去。
        if (atTime && !isRouteActiveAroundTime(r, atTime, st.stopId, 90)) continue;

        const routePrefixText = r.route || "";
        if (/^[RH]\d/i.test(routePrefixText)) continue;
        // 若行程屬於市區內來往，放行往市區方向的 A/E 線
        if (/^[AE]/i.test(routePrefixText)) {
          if (!isLantauTrip) {
            const isCitybound = r && !LANTAU_KEYWORDS.test(r.dest?.zh || "");
            if (!isCitybound) continue; // 阻擋往機場方向的 A/E 線，避免市區短途客誤乘昂貴的去程機場巴士
          }
        }

        const routeText = (r.route||"") + (r.orig?.zh||"") + (r.dest?.zh||"");
        const isExpress = /機場|快速|公路|幹線|大橋|快線|北大嶼山/.test(routeText);
        const stopsArr = r.stops[rt.primaryCo];
        
        const end = Math.min(stopsArr.length - 1, rt.idx + LOOKAHEAD_STOPS);

        let routeDistM = 0; 

        for (let i = rt.idx + 1; i <= end; i++) {
          const alightStopId = stopsArr[i];
          const sLoc = etaDb.stopList[alightStopId];
          if (!sLoc) continue;

          const prevStopId = stopsArr[i-1];
          const prevLoc = etaDb.stopList[prevStopId];
          if (prevLoc) {
            routeDistM += distM(prevLoc.location, sLoc.location);
          }
          
          const alightDist = distM(sLoc.location, {lat:destination.lat, lng:destination.lng});
          const alightPruneRadiusM = Math.max(adaptiveEndpointWalkM, allowedFinalWalk);

          // 長途跨區行程（例如馬鞍山去屯門）好多時要先兜入市區／轉車站
          // 先至有得轉去往目的地方向嘅路線，中途嗰程好自然會暫時「遠離」咗
          // 目的地嘅直線方向。呢個剪枝條件用固定（+2000米／1.5倍）閾值
          // 判斷「係咪太遠離終點」，太嚴會將呢啲必經嘅兜路轉乘直接剪走，
          // 令搜尋完全冇候選，所以保留一定容忍度（唔再按直線距離分級）。
          const pruneOffsetM = 2000;
          const pruneMultiplier = 1.5;
          if (alightDist > alightPruneRadiusM && alightDist >= dGoal + pruneOffsetM && alightDist >= dGoal * pruneMultiplier) continue;

          const boardLoc = etaDb.stopList[st.stopId].location;
          const legDist = distM(boardLoc, sLoc.location); 
          if (st.legs > 0 && legDist < 120) continue;
          
          const newUsed = new Set(st.usedRoutes); newUsed.add(rt.routeId);
          const newAccumulated = (st.accumulatedDist || 0) + routeDistM;
          
          // 若不存在直達服務，搜尋階段的轉車懲罰也大幅降低
          let transferPenalty = directExists ? (st.legs * 8000 * transferScale) : 0;
          const detourPenalty = newAccumulated * 1.35 * detourScale;
          const remainingPenalty = alightDist * 2.2;
          
          let shortRidePenalty = 0;
          if (st.legs > 0 && legDist < 2500) {
            shortRidePenalty = (2500 - legDist) * 1.2; 
          }

          let backtrackPenalty = 0;
          if (dGoal < 2500 && alightDist > dGoal + 300) {
             backtrackPenalty = (alightDist - dGoal) * 2 * backtrackScale;
          }

          let loopPenalty = 0;

          const isOriginNonHKI = origin.lat > 22.290;
          const isDestNonHKI = destination.lat > 22.290;
          const isCrossHarbour = /^(1|3|6|9)\d{2}[A-Z]?$/.test(routeText) || /^N(1|3{6|9)\d{2}$/.test(routeText);
          
          const currentAlightName = etaDb.stopList[alightStopId]?.name?.zh || "";
          
          let crossHarbourPenalty = 0;
          if (isOriginNonHKI && isDestNonHKI && isCrossHarbour) {
              const isAlightInterchange = isOfficialInterchangeName(currentAlightName) || isMultiCompanyStation(alightStopId);
              if (isAlightInterchange) {
                  crossHarbourPenalty = 0;
              } else {
                  crossHarbourPenalty = 30 * 60; 
              }
          }

          // 【無謂轉車通用檢查】以往「上一程其實已經坐到底都得，唔使轉車」
          // 呢個檢查淨係做喺 A/E 機場線之間嘅轉車（見下面 airportTransferPenalty），
          // 但用戶反映一般巴士路線都會出現同一種情況：例如 89D 本身沿路線
          // 行落去已經夠近目的地（例如觀塘），卻因為彩虹轉車站有「跨公司/
          // 官方轉車站」bonus（interchangeBonus/kmbInterchangeBonus 等），
          // 令「中途落車轉去 15A」嘅分數，因為呢啲轉車獎勵分反而好過「坐
          // 89D 坐到底」，變成無端端揀咗一個要多轉一次車、但其實冇必要嘅
          // 方案。而家將呢個「上一程沿住佢自己完整站序，落車站之後係咪
          // 已經有站夠近目的地」嘅檢查搬出嚟做通用版本，唔再限死喺 A/E
          // 線之間先做，等所有路線嘅無謂轉車都可以被偵測同懲罰。
          let prevRouteAlreadyReachesDest = false;
          if (st.lastRideRouteId) {
              let prevAlightStopId = null;
              for (let k = st.segs.length - 1; k >= 0; k--) {
                  if (st.segs[k].type === "ride") {
                      prevAlightStopId = st.segs[k].alightStopId;
                      break;
                  }
              }
              const prevRoute = etaDb.routeList[st.lastRideRouteId];
              const prevCo = st.lastRideCo;
              if (prevRoute && prevCo && prevRoute.stops && prevRoute.stops[prevCo] && prevAlightStopId) {
                  const prevStopsArr = prevRoute.stops[prevCo];
                  const prevAlightIdxInRoute = prevStopsArr.indexOf(prevAlightStopId);
                  if (prevAlightIdxInRoute >= 0) {
                      const finalWalkLimit = Math.max(adaptiveEndpointWalkM, allowedFinalWalk);
                      for (let k = prevAlightIdxInRoute; k < prevStopsArr.length; k++) {
                          const laterStopId = prevStopsArr[k];
                          const laterLoc = etaDb.stopList[laterStopId];
                          if (!laterLoc) continue;
                          const dLater = distM(laterLoc.location, {lat:destination.lat, lng:destination.lng});
                          if (dLater <= finalWalkLimit) {
                              prevRouteAlreadyReachesDest = true;
                              break;
                          }
                      }
                  }
              }
          }

          // 無謂轉車嘅通用懲罰：上一程坐到底其實已經夠近目的地，卻仍然揀咗
          // 轉車，罰得比一般跨公司轉車更重，逼搜尋優先揀返「坐到底」嗰個
          // 方案。金額對齊返下面 crossCompanyPenalty (15分鐘) 同 kmb/interchange
          // bonus 嘅量級，確保唔會被轉車站獎勵分抵銷返。
          const redundantTransferPenalty = prevRouteAlreadyReachesDest ? (20 * 60) : 0;

          let airportTransferPenalty = 0;
          if (st.lastRideRouteId) {
              const lastRouteNo = etaDb.routeList[st.lastRideRouteId]?.route || "";
              const currRouteNo = r.route || "";
              const lastIsAE = /^[AE]/i.test(lastRouteNo);
              const currIsAE = /^[AE]/i.test(currRouteNo);
              if (lastIsAE && currIsAE) {
                  let prevAlightStopId2 = null;
                  for (let k = st.segs.length - 1; k >= 0; k--) {
                      if (st.segs[k].type === "ride") {
                          prevAlightStopId2 = st.segs[k].alightStopId;
                          break;
                      }
                  }
                  const prevAlightStopName = prevAlightStopId2 ? (etaDb.stopList[prevAlightStopId2]?.name?.zh || "") : "";
                  const boardStopName = etaDb.stopList[st.stopId]?.name?.zh || "";

                  const isExemptStop = !prevRouteAlreadyReachesDest && (
                      /裕東苑|東涌消防局|東涌纜車站|青嶼幹線/.test(prevAlightStopName) ||
                      /裕東苑|東涌消防局|東涌纜車站|青嶼幹線/.test(boardStopName)
                  );

                  if (isExemptStop) {
                      airportTransferPenalty = 0;
                  } else {
                      airportTransferPenalty = prevRouteAlreadyReachesDest ? 200 * 60 : 100 * 60;
                  }
              }
          }

          // 檢查「登車站」或「下車站」是否是多於 1 間公司路線途經的跨公司轉車站，或官方轉車站
          const stName = etaDb.stopList[st.stopId]?.name?.zh || "";
          const alightName = etaDb.stopList[alightStopId]?.name?.zh || "";
          const isOfficialInterchange = isOfficialInterchangeName(stName) || isOfficialInterchangeName(alightName);

          const isInterchangeExempt = isMultiCompanyStation(st.stopId) || isMultiCompanyStation(alightStopId) || isOfficialInterchange;
          
          let crossCompanyPenalty = 0;
          if (st.lastRideCo && st.lastRideCo !== rt.primaryCo) {
          // 全路程無直達服務免除跨公司轉車懲罰
              const isExempt = !directExists;
              crossCompanyPenalty = isExempt ? 0 : (15 * 60); 
          }

          // 【無謂轉車修正】以下呢幾個轉車獎勵分（interchangeBonus／feederBonus／
          // kmbInterchangeBonus）本意係鼓勵喺大型官方轉車站轉車，但如果上一程
          // 其實坐到底都已經夠近目的地（prevRouteAlreadyReachesDest），呢啲
          // 獎勵分反而會令一個冇必要嘅轉車喺分數上贏過「坐到底」嗰個更簡單
          // 嘅方案。所以呢種情況下，全部轉車獎勵分一律歸零，唔再獎勵呢個
          // 轉車決定。
          const interchangeBonus = (isInterchangeExempt && !prevRouteAlreadyReachesDest) ? 7000 : 0;

          // 如果第一程 (legs === 0) 屬於短途接駁至大型轉車站，給予額外分數獎勵，鼓勵接駁
          const feederBonus = (st.legs === 0 && isInterchangeExempt && legDist < 6000 && !prevRouteAlreadyReachesDest) ? 6000 : 0;

          // 免除從區內前往同樣位於區內轉車站的轉車懲罰（無謂轉車除外）
          if (isInterchangeExempt && legDist < 8000 && !prevRouteAlreadyReachesDest) {
              transferPenalty = 0; 
          }

          // 九巴路線使用旗下轉車站轉車 (給予極高優先搜尋 Bonus，無謂轉車除外)
          let kmbInterchangeBonus = 0;
          if (rt.primaryCo === "kmb" && st.lastRideCo === "kmb" && isOfficialInterchange && !prevRouteAlreadyReachesDest) {
              kmbInterchangeBonus = 8000;
          }

          let lantauBonus = 0;
          if (isLantauTrip) {
            const isPreferredLantau = /^E21/i.test(routePrefixText) || /^S/i.test(routePrefixText) || rt.primaryCo === "nlb";
            if (isPreferredLantau) {
              lantauBonus = 40; 
            } else {
              lantauBonus = -30; 
            }
          }

          const costScore = detourPenalty + remainingPenalty + transferPenalty + shortRidePenalty - interchangeBonus - feederBonus + backtrackPenalty + crossHarbourPenalty + airportTransferPenalty + crossCompanyPenalty + redundantTransferPenalty + loopPenalty - lantauBonus - kmbInterchangeBonus;

          const newSegs = st.segs.concat([{
            type:"ride", routeId:rt.routeId, 
            companies: rt.companies,       
            primaryCo: rt.primaryCo,
            r,
            boardStopId: st.stopId, boardIdx: rt.idx,
            alightStopId, alightIdx: i
          }]);

          nextRaw.push({
            stopId: alightStopId, 
            legs: st.legs+1, 
            usedRoutes: newUsed, 
            lastRouteId: rt.routeId,
            lastCo: rt.primaryCo, 
            lastRideRouteId: rt.routeId,
            lastRideCo: rt.primaryCo,
            segs: newSegs, 
            accumulatedDist: newAccumulated, 
            heuristic: costScore
          });
        }
      }
    }

    const expanded = [];
    for (const st of nextRaw){
      expanded.push(st);
      
      const stName = etaDb.stopList[st.stopId]?.name?.zh || "";
      // 【修正】以往直接讀 .location.lat／.location.lng，如果呢個站因為
      // 官方／社群資料座標對唔到（見 distM() 頂部註解，例如個別港島綫
      // 站名有異體字差異）而 location 變成 null，就會喺呢度直接噴出
      // "Cannot read properties of null (reading 'lat')"，令成個 beam
      // search 中斷、拖累所有搜尋模式只要行程牽涉嗰個站（好多時集中喺
      // 港島）就完全搜尋唔到。而家先檢查座標是否齊全，冇座標就當呢個
      // 站搵唔到鄰近轉車站（near 留空），唔會累及其他候選繼續運作。
      const stLocForNearby = etaDb.stopList[st.stopId]?.location;
      let near = (stLocForNearby && Number.isFinite(stLocForNearby.lat) && Number.isFinite(stLocForNearby.lng))
        ? nearbyStops(stLocForNearby.lat, stLocForNearby.lng, adaptiveTransferWalkM)
        : [];

      for (const n of near) {
        if (n.stopId === st.stopId) continue;      

        let actualDistM = n.dist;
        // 同站群內的不同站牌（dist為0），給予 1 分鐘轉乘時間，避免 0 分鐘瞬間移位，符合物理常規
        let walkMinutes = actualDistM === 0 ? 1 : Math.max(1, Math.ceil(actualDistM / WALK_SPEED_MPS / 60));
        
        expanded.push({
          stopId: n.stopId, 
          legs: st.legs, 
          usedRoutes: st.usedRoutes, 
          lastRouteId: null,
          lastCo: null,
          lastRideRouteId: st.lastRideRouteId,
          lastRideCo: st.lastRideCo,
          segs: st.segs.concat([{
            type: "walk", 
            fromStopId: st.stopId, 
            toStopId: n.stopId, 
            distM: actualDistM, 
            minutes: walkMinutes
          }]),
          accumulatedDist: (st.accumulatedDist || 0) + actualDistM,
          heuristic: st.heuristic
        });
      }
    }
    frontier = expanded;
    if (candidates.length >= 400) break;
  }

  candidates.sort((a,b)=> a.legs - b.legs || a.heuristic - b.heuristic);
  return selectDiverseCandidates(candidates, MAX_CANDIDATES_TO_EVAL);
}

/* ---------------- realtime evaluation (phase 2) ---------------- */
let etaCache = new Map();

async function fetchGmbEta(routeId, stopId, r) {
  try {
    if (!stopId) return [];

    let gmbRouteId = null;
    function deepFindRouteId(obj, depth = 0) {
      if (depth > 5 || !obj || typeof obj !== 'object') return;
      for (const key in obj) {
        try {
          const val = obj[key];
          if (typeof val === 'number' && val >= 2000000 && val <= 2999999) {
            gmbRouteId = val.toString();
            return;
          }
          if (typeof val === 'string' && /^2\d{6}$/.test(val)) {
            gmbRouteId = val;
            return;
          }
          if (typeof val === 'object' && val !== null && key !== 'stops' && key !== 'stopList') {
            deepFindRouteId(val, depth + 1);
            if (gmbRouteId) return;
          }
        } catch (e) {}
      }
    }

    if (r) deepFindRouteId(r);

    if (!gmbRouteId) {
      const matches = routeId.match(/\d+/g);
      gmbRouteId = matches ? matches[0] : routeId;
    }

    const parts = routeId.split('+');
    const gmbRouteSeq = parts[1] || "1";
    const cleanStopId = stopId.toString().replace(/\D/g, '');
    
    const targetUrl = `https://data.etagmb.gov.hk/eta/stop/${cleanStopId}`;
    const url = `https://seep.eu.org/${targetUrl}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
    const json = await res.json();
    
    let etas = [];
    const records = Array.isArray(json.data) ? json.data : [];
    
    let targetRecord = records.find(rec => 
      rec.route_id == gmbRouteId && 
      rec.route_seq == gmbRouteSeq
    );

    if (!targetRecord) {
      const routeRecords = records.filter(rec => rec.route_id == gmbRouteId);
      if (routeRecords.length > 0) {
        targetRecord = routeRecords[0];
      }
    }

    if (targetRecord && Array.isArray(targetRecord.eta)) {
      targetRecord.eta.forEach(item => {
        if (item.timestamp) {
          etas.push({
            etaDate: new Date(item.timestamp),
            rmk: item.remarks_tc || "",
            co: "gmb"
          });
        }
      });
    }
    
    return etas.filter(e => !isNaN(e.etaDate)).sort((a, b) => a.etaDate - b.etaDate);
  } catch (err) {
    console.error("[GMB DEBUG] fetchGmbEta 發生錯誤:", err);
    return [];
  }
}

function findEquivalentStopIdx(r, targetCo, referenceStopId) {
  const arr = r.stops && r.stops[targetCo];
  if (!arr || !arr.length) return -1;
  
  let found = arr.indexOf(referenceStopId);
  if (found >= 0) return found;
  
  const refLoc = etaDb.stopList[referenceStopId]?.location;
  if (!refLoc) return -1;
  
  let bestIdx = -1;
  let minDist = Infinity;
  for (let i = 0; i < arr.length; i++) {
    const sLoc = etaDb.stopList[arr[i]]?.location;
    if (sLoc) {
      const d = distM(refLoc, sLoc);
      if (d < minDist) {
        minDist = d;
        bestIdx = i;
      }
    }
  }
  return minDist <= 150 ? bestIdx : -1;
}

async function fetchMtrBusEta(routeName, targetStopId) {
  try {
    const response = await fetch("https://rt.data.gov.hk/v1/transport/mtr/bus/getSchedule", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ language: "zh", routeName: routeName })
    });

    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    const data = await response.json();
    
    const targetStop = etaDb.stopList[targetStopId];
    if (!targetStop || !data.busStop || !Array.isArray(data.busStop)) {
      return [];
    }

    // MTR Bus 即時 getSchedule API 實際返回嘅 busStop 資料並冇經緯度欄位，
    // 令原本純粹靠座標距離嘅配對永遠配唔到（matchedStop 恆為 null）。
    // 而家改為優先用 loadMtrBusStaticData() 建立嘅官方 busStopId 直接精確配對，
    // 座標比對就只做喺冇 busStopId 對應資料時嘅後備方案（例如日後API有機會補返座標）。
    let matchedStop = null;

    if (targetStop.mtrBusStationId) {
      matchedStop = data.busStop.find(s => s.busStopId === targetStop.mtrBusStationId) || null;
    }

    if (!matchedStop && targetStop.location) {
      let minDistance = 150;
      for (const stop of data.busStop) {
        const lat = parseFloat(stop.latitude), lng = parseFloat(stop.longitude);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) continue;
        const dist = distM(targetStop.location, { lat, lng });
        if (dist < minDistance) {
          minDistance = dist;
          matchedStop = stop;
        }
      }
    }

    if (matchedStop && Array.isArray(matchedStop.bus)) {
      let etas = [];
      const now = Date.now();
      
      matchedStop.bus.forEach(bus => {
        const secs = Number(bus.departureTimeInSecond ?? bus.arrivalTimeInSecond);
        if (!isNaN(secs) && secs >= 0 && secs < 86400) {
          etas.push({
            etaDate: new Date(now + secs * 1000),
            rmk: bus.busRemark || "",
            co: "mtrb",
            busStopId: matchedStop.busStopId 
          });
        }
      });
      return etas.sort((a, b) => a.etaDate - b.etaDate);
    }
    return [];
  } catch (err) {
    console.error("MTR Bus API 解析失敗:", err);
    return [];
  }
}

async function getEtasCached(routeId, r, co, idx){
  const key = routeId + "#" + co + "#" + idx;
  if (etaCache.has(key)) return etaCache.get(key);
  
  let p;
  if (co === "gmb") {
    const stopId = r.stops[co] ? r.stops[co][idx] : null;
    p = fetchGmbEta(routeId, stopId, r);
  } else if (co === "mtrb") {
    const stopId = r.stops[co] ? r.stops[co][idx] : null;
    p = fetchMtrBusEta(r.route, stopId);
  } else if (co === "mtr") {
    p = fetchMtrNextTrain(r, idx);
  } else if (co === "lightrail") {
    p = fetchLightRailNextTrain(r, idx);
  } else {
    p = fetchEtas({...r, co:[co], seq: idx, stopList: etaDb.stopList, language:"zh"})
      .then(list => (list||[]).map(e => ({...e, etaDate:new Date(e.eta)})).filter(e=>!isNaN(e.etaDate)).sort((a,b)=>a.etaDate-b.etaDate));
  }

  p = p.catch(() => []);
  etaCache.set(key, p);
  return p;
}

function to30HMinutes(timeInput, referenceDate = null) {
  let h = 0, m = 0;
  if (timeInput instanceof Date) {
    h = timeInput.getHours();
    m = timeInput.getMinutes();
  } else if (typeof timeInput === "string") {
    // 若含有 "-"，只切取左邊的起始時間作計算
    const startPart = timeInput.split("-")[0].trim();
    const parts = startPart.split(":");
    if (parts.length >= 2) {
      h = parseInt(parts[0], 10);
      m = parseInt(parts[1], 10);
    } else {
      const clean = startPart.replace(/\D/g, "");
      if (clean.length >= 4) {
        h = parseInt(clean.substring(0, 2), 10);
        m = parseInt(clean.substring(2, 4), 10);
      } else if (clean.length > 0) {
        h = parseInt(clean, 10);
      }
    }
  }
  
  const refHour = referenceDate ? referenceDate.getHours() : h;
  if (h >= 0 && h < 6 && (referenceDate === null || refHour >= 22 || refHour < 6)) {
    h += 24;
  }
  return h * 60 + m;
}

// 取得 GTFS Time Range 區間運作長度，精確比對 frequencies 格式
function getIntervalRange(key, atTime, nextKey = null) {
  const parts = key.split("-");
  const startMins = to30HMinutes(parts[0], atTime);
  let endMins;
  if (parts.length > 1) {
    endMins = to30HMinutes(parts[1], atTime);
    if (endMins < startMins) endMins += 24 * 60; // 處理跨午夜區間
  } else if (nextKey) {
    endMins = to30HMinutes(nextKey.split("-")[0], atTime);
    if (endMins < startMins) endMins += 24 * 60;
  } else {
    // 預設為該時段後 60 分鐘
    endMins = startMins + 60;
  }
  return { start: startMins, end: endMins, duration: endMins - startMins };
}

function scheduleFallback(r, now, isLongHaul = false, boardStopId = null){
  try{
    const isNightRoute = /^N/i.test(r.route);

    // 【serviceType 兄弟變體 - 合併全部，揀最快一班】以往呢度只會用
    // _resolveEffectiveFreqTable() 揾第一個「有資料」嘅表（r 自己或者
    // 兄弟變體之一），一旦 r 自己有資料就完全唔理其他兄弟變體，令搜尋
    // 揀中嗰一個 serviceType（可能剛好班次疏）壟斷咗成程嘅候車時間估算。
    // 而家改用 _resolveAllEffectiveFreqTables() 攞返 r 自己＋全部有停靠
    // boardStopId 嘅兄弟變體嘅 freq 表，逐個計出候車時間，揀返全部之中
    // 最快到嘅一班——同現實乘客會睇住站頭幾個唔同 serviceType 嘅班次
    // 顯示屏，見到邊班車就上邊班一致。
    const allTables = _resolveAllEffectiveFreqTables(r, now, boardStopId, r.primaryCo);
    if (!allTables.length) {
      if (!r.freq && isNightRoute) {
        return new Date(now.getTime() + 35 * 60000);
      }
      return null; // 該日子不設服務，或者兄弟變體都冇資料，避免出現不存在的班次
    }

    const lookaheadMin = isLongHaul ? 150 : 90;
    const result = _computeEarliestFreqDeparture(allTables, now, lookaheadMin);
    if (!result) return null; // 今日確實冇更多已知班次（或者重未到頭班車嘅可預見範圍）
    return result.etaDate;
  } catch (e) {
    return null;
  }
}

/* ---------------- 公共交通服務班次資料 (GTFS) ---------------- */
const HEADWAY_BASE = "https://static.data.gov.hk/td/pt-headway-en";
const HEADWAY_FETCH_TIMEOUT_MS = 15000;
let headwayDataPromise = null;

function normCoCode(co){
  return String(co || "").toLowerCase().replace(/[^a-z]/g, "");
}


/* ---------------- GTFS 比對失敗率診斷 ----------------
 * 記錄每次「靠路線編號+營辦商」去 TD headway GTFS 資料庫搵 trip 嘅結果，
 * 用嚟量度幾多百分比嘅路線係搵唔到（exact/fuzzy/完全無），方便排查「有車失敗率」。
 * 喺瀏覽器 console 打 getGtfsDebugStats() 就可以睇返呢個 session 嘅統計。
 */
const gtfsMatchStats = {
  attempts: 0,
  exactMatch: 0,
  fuzzyMatch: 0,
  noMatch: 0,
  noMatchRoutes: new Map()
};
function recordGtfsMatch(routeKey, kind){
  gtfsMatchStats.attempts++;
  if (kind === "exact") gtfsMatchStats.exactMatch++;
  else if (kind === "fuzzy") gtfsMatchStats.fuzzyMatch++;
  else {
    gtfsMatchStats.noMatch++;
    gtfsMatchStats.noMatchRoutes.set(routeKey, (gtfsMatchStats.noMatchRoutes.get(routeKey) || 0) + 1);
  }
}
function getGtfsMatchFailureRate(){
  if (!gtfsMatchStats.attempts) return { rate: 0, attempts: 0, exactMatch: 0, fuzzyMatch: 0, noMatch: 0, topMissing: [] };
  return {
    rate: +(gtfsMatchStats.noMatch / gtfsMatchStats.attempts * 100).toFixed(1),
    attempts: gtfsMatchStats.attempts,
    exactMatch: gtfsMatchStats.exactMatch,
    fuzzyMatch: gtfsMatchStats.fuzzyMatch,
    noMatch: gtfsMatchStats.noMatch,
    topMissing: [...gtfsMatchStats.noMatchRoutes.entries()].sort((a,b) => b[1]-a[1]).slice(0, 20)
  };
}
if (typeof window !== "undefined") window.getGtfsDebugStats = getGtfsMatchFailureRate;

/* 統一嘅 trip 解析入口：先試「營辦商+路線編號」精確匹配；搵唔到就退而求其次，
 * 淨係憑路線編號喺全部營辦商入面搵（因為 TD GTFS 嘅 agency_id 有時同 hk-bus-eta
 * 嘅 co code 對唔上，例如聯運/過渡性編號），交由下游用實際站點物理距離再驗證一次。
 * 呢一步係減低「路線喺 GTFS 度搵極都搵唔到」而直接判定失敗嘅主因。 */
function resolveGtfsTripIds(data, co, routeNo){
  const normRoute = String(routeNo || "").toUpperCase().trim();
  const exactKey = `${normCoCode(co)}|${normRoute}`;
  const exact = data.tripsByRouteKey.get(exactKey);
  if (exact && exact.length) {
    recordGtfsMatch(exactKey, "exact");
    return exact;
  }
  const fuzzy = data.tripsByRouteNoOnly ? data.tripsByRouteNoOnly.get(normRoute) : null;
  if (fuzzy && fuzzy.length) {
    recordGtfsMatch(exactKey, "fuzzy");
    return fuzzy;
  }
  recordGtfsMatch(exactKey, "none");
  return [];
}

// 共用 CSV tokenizer（RFC4180：支援帶逗號/換行嘅引號欄位，以及 "" 轉義引號）。
// 之前 parseHeadwayCsv／_mtrParseCsv 各自有一份幾乎一樣嘅逐字元解析迴圈，
// 而且 _mtrParseCsv 嗰份仲冇處理 "" 轉義，合併做一個先，兩邊行為都唔變、
// 亦一次過用返最完整嗰套邏輯。
function parseCsvRows(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  const t = String(text || "").replace(/^\uFEFF/, "");
  for (let i = 0; i < t.length; i++){
    const c = t[i];
    if (inQuotes){
      if (c === '"'){
        if (t[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else {
        field += c;
      }
    } else {
      if (c === '"'){ inQuotes = true; }
      else if (c === ','){ row.push(field); field = ""; }
      else if (c === '\n' || c === '\r'){
        if (field.length || row.length){ row.push(field); rows.push(row); }
        field = ""; row = [];
        if (c === '\r' && t[i+1] === '\n') i++;
      } else {
        field += c;
      }
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

function parseHeadwayCsv(text){
  const rows = parseCsvRows(text);
  if (!rows.length) return [];
  const header = rows[0];
  return rows.slice(1)
    .filter(r => r.length === header.length)
    .map(r => {
      const obj = {};
      header.forEach((h, idx) => { obj[h] = r[idx]; });
      return obj;
    });
}

async function fetchHeadwayText(filename){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), HEADWAY_FETCH_TIMEOUT_MS);
  try {
    const res = await fetch(`${HEADWAY_BASE}/${filename}`, { signal: controller.signal });
    if (!res.ok) return null;
    return await res.text();
  } catch (err) {
    return null;
  } finally {
    clearTimeout(timer);
  }
}

function gtfsTimeToMinutes(hhmmss){
  if (!hhmmss) return null;
  const parts = String(hhmmss).split(":").map(Number);
  if (parts.length < 2 || parts.some(n => Number.isNaN(n))) return null;
  return parts[0] * 60 + parts[1] + (parts[2] || 0) / 60;
}

function gtfsMinutesToDate(mins, baseDate){
  if (mins == null || Number.isNaN(mins)) return null;
  const d = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate(), 0, 0, 0, 0);
  d.setMinutes(Math.round(mins));
  return d;
}

function isCalendarServiceActiveOnDate(calRow, calExMap, when) {
  const yyyy = when.getFullYear();
  const mm = String(when.getMonth() + 1).padStart(2, '0');
  const dd = String(when.getDate()).padStart(2, '0');
  const dateStr = `${yyyy}${mm}${dd}`;

  const weekDays = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
  const currentDayName = weekDays[when.getDay()];

  if (calExMap && calExMap.has(dateStr)) {
    const exceptionType = String(calExMap.get(dateStr));
    if (exceptionType === '2') return false; 
    if (exceptionType === '1') return true;  
  }

  if (!calRow) return false;
  if (dateStr < calRow.start_date || dateStr > calRow.end_date) {
    return false;
  }
  return calRow[currentDayName] === '1' || calRow[currentDayName] === 1;
}

async function loadHeadwayData(){
  if (headwayDataPromise) return headwayDataPromise;
  headwayDataPromise = (async () => {
    try {
      // === stops.txt 用於物理距離站點匹配 ===
      const [routesTxt, tripsTxt, calTxt, calExTxt, freqTxt, stopTimesTxt, stopsTxt] = await Promise.all([
        fetchHeadwayText("routes.txt"),
        fetchHeadwayText("trips.txt"),
        fetchHeadwayText("calendar.txt"),
        fetchHeadwayText("calendar_dates.txt"),
        fetchHeadwayText("frequencies.txt"),
        fetchHeadwayText("stop_times.txt"), 
        fetchHeadwayText("stops.txt"), 
      ]);
      if (!routesTxt || !tripsTxt || !calTxt || !freqTxt) return null;

      const routes = parseHeadwayCsv(routesTxt);
      const trips = parseHeadwayCsv(tripsTxt);
      const calendar = parseHeadwayCsv(calTxt);
      const calendarDates = calExTxt ? parseHeadwayCsv(calExTxt) : [];
      const freqs = parseHeadwayCsv(freqTxt);
      const stopTimes = stopTimesTxt ? parseHeadwayCsv(stopTimesTxt) : [];
      const stops = stopsTxt ? parseHeadwayCsv(stopsTxt) : [];

      const routeMeta = new Map();
      for (const r of routes){
        routeMeta.set(r.route_id, {
          agency: normCoCode(r.agency_id),
          shortName: String(r.route_short_name || "").toUpperCase().trim()
        });
      }

      const calendarByService = new Map();
      for (const c of calendar) calendarByService.set(c.service_id, c);

      const calendarDatesByService = new Map();
      for (const cd of calendarDates){
        if (!calendarDatesByService.has(cd.service_id)) calendarDatesByService.set(cd.service_id, new Map());
        calendarDatesByService.get(cd.service_id).set(cd.date, Number(cd.exception_type));
      }

      const tripInfo = new Map();
      const tripsByRouteKey = new Map();
      for (const t of trips){
        const meta = routeMeta.get(t.route_id);
        if (!meta) continue;
        const key = `${meta.agency}|${meta.shortName}`;
        tripInfo.set(t.trip_id, { serviceId: t.service_id });
        if (!tripsByRouteKey.has(key)) tripsByRouteKey.set(key, []);
        tripsByRouteKey.get(key).push(t.trip_id);
      }

      const freqByTrip = new Map();
      for (const f of freqs){
        if (!freqByTrip.has(f.trip_id)) freqByTrip.set(f.trip_id, []);
        freqByTrip.get(f.trip_id).push(f);
      }

      const stopTimesByTrip = new Map();
      for (const st of stopTimes) {
        if (!stopTimesByTrip.has(st.trip_id)) stopTimesByTrip.set(st.trip_id, []);
        stopTimesByTrip.get(st.trip_id).push(st);
      }
      for (const seqs of stopTimesByTrip.values()) {
        seqs.sort((a, b) => parseInt(a.stop_sequence, 10) - parseInt(b.stop_sequence, 10));
      }

      // 建立 GTFS 站點經緯度索引
      const stopCoords = new Map();
      for (const s of stops) {
        stopCoords.set(s.stop_id, {
          lat: parseFloat(s.stop_lat),
          lng: parseFloat(s.stop_lon),
          name: s.stop_name
        });
      }

      // 建立「淨路線編號」次索引（唔理營辦商），供 exact key 對唔上時嘅 fuzzy fallback 使用
      const tripsByRouteNoOnly = new Map();
      for (const [key, ids] of tripsByRouteKey.entries()) {
        const routeNoPart = key.split("|")[1] || "";
        if (!routeNoPart) continue;
        if (!tripsByRouteNoOnly.has(routeNoPart)) tripsByRouteNoOnly.set(routeNoPart, []);
        tripsByRouteNoOnly.get(routeNoPart).push(...ids);
      }

      return { tripInfo, tripsByRouteKey, tripsByRouteNoOnly, calendarByService, calendarDatesByService, freqByTrip, stopTimesByTrip, stopCoords };
    } catch (err) {
      return null;
    }
  })();
  return headwayDataPromise;
}

/* 檢查某公司／路線喺指定日期是否有 GTFS 服務（對比 calendar.txt / calendar_dates.txt）。
 * 只要路線入面任何一條 trip 嘅 service_id 喺當日生效就當有服務。
 * 供第二優先（純 GTFS 預定路線推算）用嚟確認條路線今日的確喺服務時間以內。 */
async function isServiceActiveForRouteOnDate(co, routeNo, when) {
  try {
    const data = await loadHeadwayData();
    if (!data) return null; // 冇 GTFS 數據時無法判斷，交返上層自行處理
    const tripIds = resolveGtfsTripIds(data, co, routeNo);
    if (!tripIds || !tripIds.length) return null;
    for (const tripId of tripIds) {
      const info = data.tripInfo.get(tripId);
      if (!info) continue;
      const calRow = data.calendarByService.get(info.serviceId);
      const calExMap = data.calendarDatesByService.get(info.serviceId);
      if (isCalendarServiceActiveOnDate(calRow, calExMap, when)) return true;
    }
    return false;
  } catch (err) {
    return null;
  }
}

async function isRouteCurrentlyInService(co, routeNo, when){
  try {
    const data = await loadHeadwayData();
    if (!data) return null;

    const tripIds = resolveGtfsTripIds(data, co, routeNo);
    if (!tripIds || !tripIds.length) return null; 

    const yesterday = new Date(when.getTime() - 86400000);
    const minsOfDayToday = when.getHours() * 60 + when.getMinutes();
    const minsOfDayYesterday = minsOfDayToday + 24 * 60; // 相對於昨日的分鐘數 (如凌晨1點 = 25 * 60)

    let hasActiveServiceToday = false;
    let isOperatingAtThisExactTime = false;
    let currentHeadwaySecs = null;

    for (const tripId of tripIds){
      const info = data.tripInfo.get(tripId);
      if (!info) continue;
      
      const calRow = data.calendarByService.get(info.serviceId);
      const calExMap = data.calendarDatesByService.get(info.serviceId);

      const isActiveToday = isCalendarServiceActiveOnDate(calRow, calExMap, when);
      const isActiveYesterday = isCalendarServiceActiveOnDate(calRow, calExMap, yesterday);
      if (!isActiveToday && !isActiveYesterday) continue; 
      hasActiveServiceToday = true; 

      const validBases = [];
      if (isActiveToday) validBases.push(minsOfDayToday);
      if (isActiveYesterday) validBases.push(minsOfDayYesterday);

      const freqBlocks = data.freqByTrip.get(tripId);
      for (const adjMinsOfDay of validBases) {
        if (freqBlocks && freqBlocks.length > 0) {
          for (const f of freqBlocks) {
            const startMin = gtfsTimeToMinutes(f.start_time);
            let endMin = gtfsTimeToMinutes(f.end_time);
            if (startMin != null && endMin != null) {
              if (endMin < startMin) endMin += 24 * 60;
              // GTFS 規範：frequencies.txt 嘅 end_time 係「不包含」邊界，
              // 最後一班車嘅開出時間必須早於（而非等於）end_time，
              // 所以呢度用 < endMin（而唔係 <= endMin）先啱，避免誤判 end_time 嗰一刻仍然「有車」。
              if (adjMinsOfDay >= startMin && adjMinsOfDay < endMin) {
                isOperatingAtThisExactTime = true;
                currentHeadwaySecs = parseInt(f.headway_secs, 10);
                break;
              }
            }
          }
        } else {
          const rList = data.stopTimesByTrip.get(tripId);
          if (rList && rList.length > 0) {
            const firstStop = rList[0];
            const lastStop = rList[rList.length - 1];
            const startMin = gtfsTimeToMinutes(firstStop.departure_time || firstStop.arrival_time);
            let endMin = gtfsTimeToMinutes(lastStop.arrival_time);
            if (startMin != null && endMin != null) {
              if (endMin < startMin) endMin += 24 * 60;
              if (adjMinsOfDay >= startMin && adjMinsOfDay <= endMin + 30) {
                isOperatingAtThisExactTime = true;
              }
            }
          }
        }
        if (isOperatingAtThisExactTime) break;
      }
    } 
            
    if (isOperatingAtThisExactTime) {
      if (currentHeadwaySecs !== null) return Math.ceil(currentHeadwaySecs / 60); 
      return true; 
    }
    return hasActiveServiceToday ? false : null;
  } catch (err) {
    return null;
  }
}

/* ---------------- 拓樸估算：直線與物理路網距離車程 ---------------- */
// timeIntervalDb 嘅真實格式係「相鄰站鄰接圖」：{ 上站stopId: { 下站stopId: 觀測行車秒數 } }，
// 呢個係 timeinterval.hkbuseta.com 根據大量歷史實時 ETA 差值推算返嚟嘅逐段觀測行車時間，
// 唔係之前誤以為嘅「routeId -> 累積秒數陣列」格式。呢度沿住路線本身嘅逐站順序 (boardIdx
// 至 alightIdx) 一段段攞返鄰接圖入面嘅觀測秒數加埋，先係啱嘅解讀方式。
function sumTimeIntervalSeconds(stops, boardIdx, alightIdx) {
  if (!timeIntervalDb || !stops) return null;
  let totalSec = 0;
  for (let i = boardIdx; i < alightIdx; i++) {
    const fromMap = timeIntervalDb[stops[i]];
    const sec = fromMap ? Number(fromMap[stops[i + 1]]) : NaN;
    if (!Number.isFinite(sec) || sec <= 0) return null; // 缺任何一段就唔當「完整」，交返上層 fallback
    totalSec += sec;
  }
  return totalSec;
}

async function estimateSegmentDuration(r, co, boardIdx, alightIdx, now = new Date()){
  const stops = r.stops[co] || r.stops[r.primaryCo];
  if (!stops || boardIdx >= alightIdx) return 2;

  // 【修正「預估輕鐧行程完全冇 call LR.json」】輕鐧用嘅係獨立、逐小時
  // 更新嘅 LR.json（見 getLightRailSegmentMinutes()／getLightRailIntervalSeconds()），
  // 同其他公司共用嘅 all.json 鄰接圖（下面 sumTimeIntervalSeconds 用嗰個）
  // 唔同源，亦冚唔中輕鐧嗰批 "LR-<code>" 虛擬站 ID，一定會 miss，跌落去
  // 用底下嗰條為馬路調校嘅直線距離／車速公式，對輕鐧完全唔準。呢個函數
  // 除咗喺 dfs() 入面計最終車程用到之外，亦係揀選/評分候選路線階段
  // （evaluateCandidate() 嘅 estimatedCandidateTotalMin）用嚟「預估」總
  // 車程嘅入口，之前淨係後者冇特殊處理輕鐧，而家喺呢度優先處理，等
  // 「預估」呢一步都真正用到 LR.json。
  if (co === "lightrail" && Array.isArray(r.lrStationCodes) && r.lrStationCodes.length) {
    try {
      const lrMins = await getLightRailSegmentMinutes(r.lrStationCodes, boardIdx, alightIdx, now);
      if (lrMins !== null) return Math.max(lrMins, 1.0);
    } catch (e) { /* 跌落去用返粗略估算，唔會令預估爆錶 */ }
    // LR.json 冇齊觀測數據時嘅粗略估算，同 dfs() 入面嘅 fallback 一致
    // （輕鐧站與站之間一般 1-2 分鐧）。
    return Math.max(1, (alightIdx - boardIdx) * 1.6);
  }

  // 優先使用 JSON 提供之逐站觀測車程時間 (特別針對單邊 ETA 或純 GTFS 路線)
  const intervalSec = sumTimeIntervalSeconds(stops, boardIdx, alightIdx);
  if (intervalSec !== null) {
    return Math.max(intervalSec / 60, 1.0);
  }

  const hour = now.getHours();
  const isRushHour = (hour >= 7 && hour <= 9) || (hour >= 17 && hour <= 19);
  let totalMinutes = 0;
  
  for (let i = boardIdx; i < alightIdx; i++){
    const a = etaDb.stopList[stops[i]];
    const b = etaDb.stopList[stops[i+1]];
    
    if (a && b) {
      const segmentDistM = distM(a.location, b.location);
      let speedKmh = 20;
      let multiplier = 1.15; 

      if (segmentDistM > 3500) {
        multiplier = 1.3; 
        speedKmh = isRushHour ? 40 : 50; 
      } else if (segmentDistM > 1500) {
        multiplier = 1.2;
        speedKmh = isRushHour ? 25 : 38; 
      } else if (segmentDistM > 600) {
        multiplier = 1.15;
        speedKmh = isRushHour ? 12 : 18; 
      } else if (segmentDistM > 250) {
        multiplier = 1.15;
        speedKmh = isRushHour ? 10 : 14; 
      } else {
        multiplier = 1.3;
        speedKmh = isRushHour ? 8 : 11; 
      }

      const travelMin = ((segmentDistM * multiplier) / 1000) / speedKmh * 60;
      totalMinutes += Math.max(travelMin, 1.0);
    }
  }
  return Math.max(totalMinutes, 1.5);
}

/* ---------------- 站與站「預定」行車時間基準：優先用 timeinterval.hkbuseta.com
 * 嘅逐站觀測數據 (較貼近現實，且覆蓋唔少 GTFS 冧唔到嘅專線小巴/GMB 路線)，
 * 唔齊全先退返用 GTFS stop_times.txt 靜態排班表。呢個函數係計算「基準行車時間」
 * 嘅統一入口，畀 calibrateDurationOneSidedGeneral 用嚟同實時 ETA 比對。 ---------------- */
async function getBaselineSegmentMinutes(co, routeNo, stops, from, to, when) {
  if (!stops || !stops[from] || !stops[to] || from >= to) return null;
  const intervalSec = sumTimeIntervalSeconds(stops, from, to);
  if (intervalSec !== null) return Math.max(intervalSec / 60, 1.0);
  return await estimateDurationFromStopTimes(co, routeNo, stops[from], stops[to], when);
}

/* ---------------- 官方排班表估算：從 stop_times.txt 獲取時間 ---------------- */
async function estimateDurationFromStopTimes(co, routeNo, boardStopId, alightStopId, when) {
  try {
    const data = await loadHeadwayData();
    if (!data || !data.stopTimesByTrip) return null;

    const tripIds = resolveGtfsTripIds(data, co, routeNo);
    if (!tripIds || !tripIds.length) return null;

    let activeTripId = null;
    for (const tripId of tripIds) {
      const info = data.tripInfo.get(tripId);
      if (!info) continue;
      
      const calRow = data.calendarByService.get(info.serviceId);
      const calExMap = data.calendarDatesByService.get(info.serviceId);
      if (isCalendarServiceActiveOnDate(calRow, calExMap, when)) {
        activeTripId = tripId;
        break; 
      }
    }

    if (!activeTripId) return null;

    return await getTripStopDurationByTripId(activeTripId, boardStopId, alightStopId);
  } catch (err) {
    return null;
  }
}

/* ---------------- 分站時間合理性驗證：動態經緯度匹配 ----------------
 * 不再使用容易出錯的靜態 index 數組，改為利用 GPS 物理位置（150米容錯）動態匹配 GTFS 對應站點。
 * 1) 路線比對：exact「營辦商+編號」搵唔到就 fuzzy 退到「淨編號」比對（resolveGtfsTripIds）。
 * 2) 頻率班次展開：以往淨係讀 stop_times.txt 入面嗰一條「範本」trip 嘅單一時間，
 *    對於用 frequencies.txt 定義班次（無實際逐班 stop_times）嘅高頻路線／專線小巴，
 *    會誤以為成日淨得一班車。而家會將 frequencies.txt 嘅 start_time/end_time/headway_secs
 *    展開做嗰個時段入面實際嘅逐班到站時間（模板到站時間 - 模板頭站開出時間 = 到站相對於
 *    行程起點嘅時間差，加返落每一個展開咗嘅發車時刻度就得到實際到站時間)。
 * 3) 搜尋範圍收窄做「現時鄰近 windowMinutes 分鐘（預設2小時，前後對稱）」，
 *    一來符合「鄰近兩小時仲有冇班次」嘅要求，二來俾埋過去嗰半段畀上層邏輯
 *    用嚟判斷「今日呢條路線係咪其實仲有服務、只係啱啱好而家喺兩班車之間嘅空檔」，
 *    避免將高頻路線嘅正常班距空隙誤判做「尾班車已經開出」。
 */
async function getStopArrivalScheduleList(co, routeNo, targetStopId, when, windowMinutes = 120) {
  try {
    const data = await loadHeadwayData();
    if (!data || !data.stopTimesByTrip || !data.stopCoords) return { found: false, all: [] };

    const tripIds = resolveGtfsTripIds(data, co, routeNo);
    if (!tripIds || !tripIds.length) return { found: false, all: [] };

    const targetStop = etaDb.stopList[targetStopId];
    if (!targetStop) return { found: false, all: [] };
    const targetLoc = targetStop.location;

    const baseDate = new Date(when.getFullYear(), when.getMonth(), when.getDate());
    const windowStart = new Date(when.getTime() - windowMinutes * 60000);
    const windowEnd = new Date(when.getTime() + windowMinutes * 60000);
    const results = [];

    for (const tripId of tripIds) {
      const info = data.tripInfo.get(tripId);
      const rList = data.stopTimesByTrip.get(tripId);
      if (!rList || !rList.length || !info) continue;

      if (!isCalendarServiceActiveOnDate(data.calendarByService.get(info.serviceId), data.calendarDatesByService.get(info.serviceId), when)) continue;

      // 在 GTFS trip 中以物理距離尋找與目標站最接近的節點。
      // 【放寬容錯半徑】由 200 米放寬到同 MERGE_RADIUS_M（見檔案 529-536
      // 行註解）一致嘅 220 米——大型總站/公共運輸交匯處入面，唔同公司／
      // 唔同月台嘅實際站牌位置相距超過 200 米係好平常嘅事，200 米嘅門檻
      // 喺呢類大站經常配對唔中啱嘅 GTFS 節點，令總站呢個候選搵唔到準確嘅
      // 靜態時刻表，被逼跌落去用粗糙嘅 r.freq 估算。
      let bestNode = null;
      let minDist = MERGE_RADIUS_M; // 容許同「同一個站」判定一致嘅偏差
      for (const node of rList) {
        const coord = data.stopCoords.get(node.stop_id);
        if (!coord) continue;
        const d = distM(targetLoc, coord);
        if (d < minDist) { minDist = d; bestNode = node; }
      }
      if (!bestNode) continue;

      const templateMin = gtfsTimeToMinutes(bestNode.arrival_time || bestNode.departure_time);
      if (templateMin == null) continue;

      const freqBlocks = data.freqByTrip.get(tripId);
      if (freqBlocks && freqBlocks.length) {
        // === 頻率式班次：以 frequencies.txt 嘅 headway 展開實際多班次時間 ===
        const firstStop = rList[0];
        const firstMin = gtfsTimeToMinutes(firstStop.departure_time || firstStop.arrival_time);
        const offsetFromStart = (firstMin != null) ? (templateMin - firstMin) : 0;

        for (const f of freqBlocks) {
          const startMin = gtfsTimeToMinutes(f.start_time);
          let endMin = gtfsTimeToMinutes(f.end_time);
          const headwaySecs = parseInt(f.headway_secs, 10);
          if (startMin == null || endMin == null || !headwaySecs) continue;
          if (endMin < startMin) endMin += 24 * 60;

          const headwayMin = headwaySecs / 60;
          let n = 0;
          let guard = 0;
          while (guard < 3000) {
            guard++;
            const instanceStartMin = startMin + n * headwayMin;
            // GTFS 規範：frequencies.txt 嘅 end_time 係「不包含」邊界 —— 呢個時段入面
            // 最後一班車嘅開出時間必須早於 end_time（如果 start_time == end_time，
            // 即使得一個起點都唔應該當有班次），所以呢度要用 >=（而唔係 >）先啱，
            // 否則會喺 end_time 嗰一刻多展開一班實際上唔存在嘅「幽靈班次」。
            if (instanceStartMin >= endMin) break;
            const arrivalMin = instanceStartMin + offsetFromStart;
            const etaDate = gtfsMinutesToDate(arrivalMin, baseDate);
            if (etaDate >= windowStart && etaDate <= windowEnd) {
              results.push({ tripId, etaDate, viaFrequency: true, headwaySecs });
            } else if (etaDate > windowEnd) {
              break;
            }
            n++;
          }
        }
      } else {
        // === 固定班次：直接使用 stop_times.txt 記錄嘅時間 ===
        const etaDate = gtfsMinutesToDate(templateMin, baseDate);
        if (etaDate >= windowStart && etaDate <= windowEnd) {
          results.push({ tripId, etaDate, viaFrequency: false });
        }
      }
    }
    results.sort((a, b) => a.etaDate - b.etaDate);
    return { found: true, all: results };
  } catch (err) {
    return { found: false, all: [] };
  }
}

// 【專門判斷「今日尾班車係咪已經開出」，唔受 ±windowMinutes 範圍限制】
// getStopArrivalScheduleList() 嘅 windowMinutes（一般 ±120～±130 分鐘）係為
// 咗「附近有冇班次」呢個一般用途而設，但對於好似 798P 呢類全日淨係一、兩班
// （例如淨朝早一班）嘅稀疏路線，一旦而家嘅時間同嗰班車相隔超過 windowMinutes，
// 個窗口入面就乜都搵唔到（recentPastTrips 同 futureTrips 都係空），令上層
// pastLastKnownTrip 呢個「尾班車已開」嘅判斷完全失效，於是又跌落去用粗略嘅
// scheduleFallback／r.freq 估算，砌一個唔存在嘅「推算班次」出嚟。
// 呢個函數改為掃描「今日成日」（唔限窗口），直接答返：
//   - true  : 今日之後（now 或以後）仲有至少一班預定班次
//   - false : 今日確實搵到過班次紀錄，但全部都已經早過 now（尾班車已開出）
//   - null  : 完全搵唔到任何可信紀錄（冇資料判斷，交返上層原有處理）
async function hasAnyRemainingTripToday(co, routeNo, targetStopId, when) {
  try {
    const data = await loadHeadwayData();
    if (!data || !data.stopTimesByTrip || !data.stopCoords) return null;

    const tripIds = resolveGtfsTripIds(data, co, routeNo);
    if (!tripIds || !tripIds.length) return null;

    const targetStop = etaDb.stopList[targetStopId];
    if (!targetStop) return null;
    const targetLoc = targetStop.location;

    const baseDate = new Date(when.getFullYear(), when.getMonth(), when.getDate());
    const cutoff = new Date(when.getTime() - 30000);

    let sawAnyTripToday = false;
    let hasFutureTripToday = false;

    for (const tripId of tripIds) {
      const info = data.tripInfo.get(tripId);
      const rList = data.stopTimesByTrip.get(tripId);
      if (!rList || !rList.length || !info) continue;
      if (!isCalendarServiceActiveOnDate(data.calendarByService.get(info.serviceId), data.calendarDatesByService.get(info.serviceId), when)) continue;

      let bestNode = null;
      let minDist = MERGE_RADIUS_M; // 放寬到同「同一個站」判定一致嘅 220 米，理由見上面 getStopArrivalScheduleList()
      for (const node of rList) {
        const coord = data.stopCoords.get(node.stop_id);
        if (!coord) continue;
        const d = distM(targetLoc, coord);
        if (d < minDist) { minDist = d; bestNode = node; }
      }
      if (!bestNode) continue;

      const templateMin = gtfsTimeToMinutes(bestNode.arrival_time || bestNode.departure_time);
      if (templateMin == null) continue;

      const freqBlocks = data.freqByTrip.get(tripId);
      if (freqBlocks && freqBlocks.length) {
        const firstStop = rList[0];
        const firstMin = gtfsTimeToMinutes(firstStop.departure_time || firstStop.arrival_time);
        const offsetFromStart = (firstMin != null) ? (templateMin - firstMin) : 0;

        for (const f of freqBlocks) {
          const startMin = gtfsTimeToMinutes(f.start_time);
          let endMin = gtfsTimeToMinutes(f.end_time);
          const headwaySecs = parseInt(f.headway_secs, 10);
          if (startMin == null || endMin == null || !headwaySecs) continue;
          if (endMin < startMin) endMin += 24 * 60;

          const headwayMin = headwaySecs / 60;
          let n = 0, guard = 0;
          while (guard < 3000) {
            guard++;
            const instanceStartMin = startMin + n * headwayMin;
            if (instanceStartMin >= endMin) break;
            const arrivalMin = instanceStartMin + offsetFromStart;
            const etaDate = gtfsMinutesToDate(arrivalMin, baseDate);
            sawAnyTripToday = true;
            if (etaDate >= cutoff) { hasFutureTripToday = true; break; }
            n++;
          }
        }
      } else {
        const etaDate = gtfsMinutesToDate(templateMin, baseDate);
        sawAnyTripToday = true;
        if (etaDate >= cutoff) hasFutureTripToday = true;
      }

      if (hasFutureTripToday) break;
    }

    if (!sawAnyTripToday) return null; // 冇搵到今日任何可信班次紀錄，唔足夠判斷
    return hasFutureTripToday;
  } catch (err) {
    return null;
  }
}

async function getTripStopDurationByTripId(tripId, boardStopId, alightStopId) {
  try {
    const data = await loadHeadwayData();
    if (!data || !data.stopTimesByTrip || !data.stopCoords) return null;
    const rList = data.stopTimesByTrip.get(tripId);
    if (!rList || !rList.length) return null;

    const boardLoc = etaDb.stopList[boardStopId]?.location;
    const alightLoc = etaDb.stopList[alightStopId]?.location;
    if (!boardLoc || !alightLoc) return null;

    let boardNode = null;
    let minDistBoard = MERGE_RADIUS_M; // 放寬到同「同一個站」判定一致嘅 220 米，理由見 getStopArrivalScheduleList()
    let boardSeq = -1;
    let alightNode = null;
    let minDistAlight = MERGE_RADIUS_M;
    let alightSeq = -1;

    for (const node of rList) {
      const coord = data.stopCoords.get(node.stop_id);
      if (!coord) continue;
      const seq = parseInt(node.stop_sequence, 10);
      
      const dBoard = distM(boardLoc, coord);
      if (dBoard < minDistBoard) {
        minDistBoard = dBoard;
        boardNode = node;
        boardSeq = seq;
      }
      
      const dAlight = distM(alightLoc, coord);
      if (dAlight < minDistAlight) {
        minDistAlight = dAlight;
        alightNode = node;
        alightSeq = seq;
      }
    }

    if (boardNode && alightNode && boardSeq < alightSeq) {
      const boardMin = gtfsTimeToMinutes(boardNode.departure_time || boardNode.arrival_time);
      const alightMin = gtfsTimeToMinutes(alightNode.arrival_time);
      if (boardMin != null && alightMin != null && alightMin >= boardMin) {
        return Math.max(alightMin - boardMin, 1.5);
      }
    }
    return null;
  } catch (err) {
    return null;
  }
}

function resolveStopIdxForCo(r, seg, co, primaryIdx) {
  const primaryStops = r.stops[seg.primaryCo];
  if (!primaryStops || primaryIdx < 0 || primaryIdx >= primaryStops.length) return -1;
  if (co === seg.primaryCo) return primaryIdx;
  const refStopId = primaryStops[primaryIdx];
  return findEquivalentStopIdx(r, co, refStopId);
}

/* ---------------- 泛用單邊/相鄰/前班次校準：第一優先／第二優先車程估算 ----------------
 *
 * 第一優先（完整起訖 ETA，直接相減）：
 *   適用於呢班車喺起點同終點（或途經站）都有實時 ETA 嘅情況。
 *   由上車站開始，逐個站攞返 json 實時 ETA，同 GTFS 預定嘅站與站行車時間（getBaseDurationFn）
 *   對比是否合理（容忍 0.4x ~ 3x），逐站配對落去，一直去到落車站為止。
 *   如果成條鏈都配對成功（即由上車站到落車站全部站都對得上），先算「完整」，
 *   可以直接用實時 ETA 相減 (matchedActualMin) 得出精準行車時間。
 *   但要留意：落車時間必須喺查詢時間（now）之後一小時之內先當呢個結果新鮮可靠，
 *   太遠期嘅 ETA 準確度成疑，唔應該用嚟做「精準」行車時間。
 *
 * 第二優先（起點有 ETA、終點缺乏實時 ETA，主要依賴 GTFS 預定路線）：
 *   如果對唔晒（落車時間唔喺一小時新鮮窗口內），
 *   就退返用已經配對到嘅（哪怕係部分）實時站點，計算「實際 / GTFS 預定」嘅比率，
 *   將呢個比率套用喺餘下（未有實時 ETA 覆蓋）嘅 GTFS 預定路段度，
 *   從而推算出貼近現況嘅估計行車時間。
 *   呢個做法必須先確認條路線喺當日（dep.etaDate 所在日期）根據 calendar.txt /
 *   calendar_dates.txt 仍然喺服務時間以內，如果當日冇服務就直接放棄呢個估算
 */
async function calibrateDurationOneSidedGeneral(r, seg, usedCo, dep, currentTime, matchedRefs, getBaseDurationFn, now) {
  const primaryStops = r.stops[seg.primaryCo];
  if (!primaryStops) return null;

  // 第一優先需要行到落車站先算「完整」；受限於 ONESIDED_MAX_HOPS，避免逐站掃太多次 API。
  const hopCeilingIdx = Math.min(seg.alightIdx, seg.boardIdx + ONESIDED_MAX_HOPS);

  let matchedActualMin = 0;
  let matchedBaseMin = 0;
  let matchedHops = 0;
  let lastMatchedIdx = seg.boardIdx;
  let lastMatchedTime = dep.etaDate;

  // 【效能修正】以往呢個逐站比對係一個 for 迴圈入面逐個 await getEtasCached，
  // 最多 14 個站就要 14 次「攞完先攞下一個」嘅序列請求，非常慢。呢啲請求其實
  // 互不相依（每一站攞返嚟嘅原始 ETA 清單，並唔需要靠前一站嘅配對結果），
  // 所以而家先用 Promise.all 一次過並行攞晒所有候選站嘅 ETA 清單，
  // 再喺低下逐站做返配對邏輯（呢部分冇 API 請求，純粹本地比對，好快）。
  const hopIndices = [];
  for (let i = seg.boardIdx + 1; i <= hopCeilingIdx; i++) hopIndices.push(i);
  const hopLists = await Promise.all(hopIndices.map(async (candidateIdx) => {
    const coIdx = resolveStopIdxForCo(r, seg, usedCo, candidateIdx);
    if (coIdx < 0) return null;
    try {
      const list = await getEtasCached(seg.routeId, r, usedCo, coIdx);
      return (list && list.length) ? list : null;
    } catch (e) { return null; }
  }));

  // === 逐站將 json 實時 ETA 對比 GTFS 預定行車時間，確認是否同一班次 ===
  // 就算起訖點都有實時 ETA，都必須逐站行呢條鏈落去，唔可以淨係憑起訖兩點
  // 就直接相減，避免誤配到前一（幾）班已經開出嘅車嘅 ETA，導致估快車程。
  for (let hi = 0; hi < hopIndices.length; hi++) {
    const candidateIdx = hopIndices[hi];
    const list = hopLists[hi];
    if (!list) continue;

    const baseChunk = await getBaseDurationFn(lastMatchedIdx, candidateIdx);
    if (baseChunk === null || baseChunk <= 0) continue;

    let best = null, bestErr = Infinity;
    for (const e of list) {
      if (e.isFallback) continue; // 只計真正實時 ETA，唔可以係 GTFS 推算出嚟嘅假班次
      if (e.etaDate <= lastMatchedTime) continue;
      const diffMins = (e.etaDate.getTime() - lastMatchedTime.getTime()) / 60000;
      if (diffMins < baseChunk * 0.4 || diffMins > baseChunk * 3) continue; // 同 GTFS 預定時間比對是否合理
      const err = Math.abs(diffMins - baseChunk);
      if (err < bestErr) { bestErr = err; best = { diffMins, etaDate: e.etaDate }; }
    }

    if (!best) continue;

    matchedActualMin += best.diffMins;
    matchedBaseMin += baseChunk;
    matchedHops++;
    lastMatchedIdx = candidateIdx;
    lastMatchedTime = best.etaDate;
  }

  const reachedAlightStop = matchedHops > 0 && lastMatchedIdx >= seg.alightIdx;

  // === 第一優先：完整起訖 ETA 鏈，直接相減 ===
  if (reachedAlightStop) {
    const referenceNow = now instanceof Date ? now : currentTime;
    const minutesFromQuery = (lastMatchedTime.getTime() - referenceNow.getTime()) / 60000;
    if (minutesFromQuery <= PRIORITY1_ALIGHT_FRESH_WINDOW_MIN) {
      return Math.max(matchedActualMin, 1.5);
    }
    // 落車時間超出查詢後一小時嘅新鮮窗口，呢個「完整鏈」結果唔當精準，
    // falls through 落第二優先，用返比率推算方式。
  }

  // === 第二優先：起點（或部分途經站）有 ETA，但去唔到終點實時 ETA，主要靠 GTFS 校準 ===
  let ratio = null;
  if (matchedHops > 0 && matchedBaseMin > 0) {
    ratio = matchedActualMin / matchedBaseMin;
  } else if (matchedRefs && matchedRefs.length > 0) {
    // 【修正】以往呢度淨係揀「同 dep.etaDate 絕對時間最接近」嘅終點 ETA 當參考，
    // 完全冇檢查個差值是否合理 —— 若果終點站啱啱好有一班「較早、已經喺上車站
    // 開出咗」嘅車嘅 ETA 喺絕對時間上更接近，就會誤將嗰班已經開出嘅前一班車
    // 嘅到站時間當做同一班車，計出嚴重偏快、唔合理嘅車程。而家改為：預先攞
    // 返 GTFS 預定嘅全程行車時間（refBase）做參考基準，只揀「實際差值喺
    // refBase 嘅 0.4x～3x 合理範圍內」嘅終點 ETA，喺呢啲合理候選入面揀
    // 「差值最細（即最快到達、最貼近下一班車）」嗰個，先真正對應返同一班車，
    // 而唔係盲目揀絕對時間最近嘅嗰個。
    const refBase = await getBaseDurationFn(seg.boardIdx, seg.alightIdx);
    if (refBase && refBase > 0) {
      let bestRef = null, bestDiffMin = Infinity;
      for (const ref of matchedRefs) {
        if (ref.isFallback) continue; // 同樣只信真正實時 ETA
        const actualDurMin = (ref.etaDate.getTime() - dep.etaDate.getTime()) / 60000;
        if (!(actualDurMin > 0) || !Number.isFinite(actualDurMin)) continue;
        if (actualDurMin < refBase * 0.4 || actualDurMin > refBase * 3) continue; // 同 GTFS 預定時間比對是否合理
        if (actualDurMin < bestDiffMin) { bestDiffMin = actualDurMin; bestRef = { actualDurMin }; }
      }
      if (bestRef) {
        ratio = bestRef.actualDurMin / refBase;
      }
    }
  }

  if (ratio === null || !Number.isFinite(ratio)) return null;
  ratio = Math.min(2.5, Math.max(0.4, ratio));

  // 第二優先需要靠 GTFS 預定路線推算餘下路段，所以必須先確認條路線
  // 喺 dep.etaDate 當日（根據 calendar.txt / calendar_dates.txt）仍然喺服務時間以內。
  const serviceActive = await isServiceActiveForRouteOnDate(usedCo, r.route, dep.etaDate);
  if (serviceActive === false) return null;

  // 如果之前「完整鏈」有配對到落車站，但因為唔夠新鮮而 fall through 落嚟，
  // 就直接用已配對到嘅實際時間，唔需要再用比率去推算（本身已經係最準確嘅數據）。
  if (reachedAlightStop) {
    return Math.max(matchedActualMin, 1.5);
  }

  const remainBase = await getBaseDurationFn(lastMatchedIdx, seg.alightIdx);
  if (remainBase === null) return null;
  const total = matchedActualMin + (remainBase * ratio);
  return Math.max(total, 1.5);
}

// 【轉車站重新優化】beam search 揀 A 程落車站嗰陣，純粹跟「距離終點最近」
// 呢個 heuristic 揀（見 runBeamSearch() 嘅 alightDist 相關邏輯）——嗰一步
// 根本仲未知道 B 程會用邊條路線，所以完全冇考慮「呢個落車站離 B 程嘅上車站
// 有幾遠」。結果好可能 A 程沿住自己路線行多幾個站，先真正最貼近 B 程嘅
// 上車站（例如觀塘轉車站呢類官方轉車站，兩條路線可能啱啱好喺嗰個站，或者
// 好近嘅站分別停靠），但因為 beam search 揀落車站嗰陣睇唔到呢個關係，就
// 揀咗一個要行 300 幾米先轉到車嘅組合。
//
// 呢個 function 喺 A、B 兩程路線已經固定之後（即係 evaluateCandidate() 呢
// 一步）先做，喺 A 程原本落車站、B 程原本上車站附近（各自 ±TRANSFER_REOPT_
// WINDOW 個站，唔會超出各自路線嘅站序範圍，亦唔會超越自己嗰程嘅上／落車站）
// 逐一比對兩程站與站之間嘅真實距離，揀返所有組合入面最近嘅一對。如果比原本
// 嗰對近夠多（超過 TRANSFER_REOPT_MIN_IMPROVEMENT_M），先採用呢個新組合做
// 落車／上車站，並同步更新（近到當同一個站群就整段刪走；仲有明顯步行距離
// 就更新／新增轉車步行段）。
const TRANSFER_REOPT_WINDOW = 20;
const TRANSFER_REOPT_MIN_IMPROVEMENT_M = 80;
const TRANSFER_REOPT_SAME_STOP_M = 30;

function _optimizeTransferPoints(originalSegs) {
  const segs = originalSegs.map(s => ({ ...s }));

  for (let i = 0; i < segs.length; i++) {
    if (segs[i].type !== "ride") continue;

    let j = i + 1;
    let walkIdx = -1;
    if (j < segs.length && segs[j].type === "walk") { walkIdx = j; j++; }
    if (j >= segs.length || segs[j].type !== "ride") continue;

    const legA = segs[i];
    const legB = segs[j];

    // 只處理站到站嘅轉車步行（唔理起點／終點嗰種掛鈎 GPS 座標而非
    // stopId 嘅步行段），避免搞亂咗起點/終點嗰段。
    if (walkIdx >= 0) {
      const w = segs[walkIdx];
      if (!w.fromStopId || !w.toStopId) continue;
    }

    const stopsA = legA.r && legA.r.stops ? legA.r.stops[legA.primaryCo] : null;
    const stopsB = legB.r && legB.r.stops ? legB.r.stops[legB.primaryCo] : null;
    if (!stopsA || !stopsB) continue;

    const aLoLimit = Math.max(legA.boardIdx + 1, legA.alightIdx - TRANSFER_REOPT_WINDOW);
    const aHiLimit = Math.min(stopsA.length - 1, legA.alightIdx + TRANSFER_REOPT_WINDOW);
    const bLoLimit = Math.max(0, legB.boardIdx - TRANSFER_REOPT_WINDOW);
    const bHiLimit = Math.min(legB.alightIdx - 1, legB.boardIdx + TRANSFER_REOPT_WINDOW);
