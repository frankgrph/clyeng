let lastResults = [];

// 利用 Geolocation API 獲取用戶位置並自動填入「起點」的按鈕邏輯
$("#gpsBtn").addEventListener("click", async () => {
  const gpsBtn = $("#gpsBtn");
  if (!navigator.geolocation) {
    alert("瀏覽器不支援 GPS 定位服務");
    return;
  }
  
  gpsBtn.disabled = true;
  gpsBtn.textContent = "定位中";
  
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      
      if (!etaDb) {
        gpsBtn.disabled = false;
        gpsBtn.textContent = "取用 GPS 為起點";
        alert("資料庫載入中，請稍後再試");
        return;
      }
      
      const near = nearbyStops(lat, lng, 600);
      if (!near.length) {
        gpsBtn.disabled = false;
        gpsBtn.textContent = "取用 GPS 為起點";
        alert("附近 600 米內找不到任何巴士站");
        return;
      }
      
      const closestStopId = near[0].stopId;
      const s = etaDb.stopList[closestStopId];
      // 以往呢度將 origin.lat/lng 都覆寫成「最近巴士站」嘅座標，
      // 導致 runBeamSearch 入面第一個 originAlts（{stopId, dist:0}）永遠假設用戶已經企喺
      // 嗰個站，完全冇補返「由用戶實際 GPS 位置，步行去嗰個上車站」呢一段步行時間／距離。
      // 而家保留返用戶嘅真實 GPS 經緯度，並唔再帶 stopId（等 runBeamSearch 用
      // nearbyStops() 對所有候選車站，計返準確嘅步行距離同時間，包括最近嗰個站）。
      origin = { stopId: null, name: s.name.zh || s.name.en, lat: lat, lng: lng };
      originInput.value = s.name.zh || s.name.en;
      
      gpsBtn.disabled = false;
      gpsBtn.textContent = "定位成功";
      setTimeout(() => {
        gpsBtn.textContent = "取用 GPS 為起點";
      }, 3000);
    },
    (err) => {
      console.error(err);
      gpsBtn.disabled = false;
      gpsBtn.textContent = "取用 GPS 為起點";
      alert("請確保已開啟瀏覽器 GPS 權限");
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
});

// 指定時間出發之 datetime-local 及按鈕切換邏輯
const timeNowBtn = $("#timeNowBtn");
const timeCustomBtn = $("#timeCustomBtn");
const timePickerWrap = $("#timePickerWrap");
const customTimeInput = $("#customTimeInput");

let useSpecifiedTime = false;

timeNowBtn.addEventListener("click", () => {
  timeNowBtn.classList.add("active");
  timeCustomBtn.classList.remove("active");
  timePickerWrap.style.display = "none";
  useSpecifiedTime = false;
});

timeCustomBtn.addEventListener("click", () => {
  timeCustomBtn.classList.add("active");
  timeNowBtn.classList.remove("active");
  timePickerWrap.style.display = "block";
  useSpecifiedTime = true;
  
  const now = new Date();
  const tzoffset = now.getTimezoneOffset() * 60000; 
  const localISOTime = (new Date(now.getTime() - tzoffset)).toISOString().slice(0, 16);
  customTimeInput.value = localISOTime;
});

searchBtn.addEventListener("click", async () => {
  if (!origin || !destination) {
    statusLine.textContent = "請先輸入並選擇起點同終點巴士站";
    statusLine.classList.add("err");
    return;
  }
  if (origin.stopId && origin.stopId === destination.stopId) {
    statusLine.textContent = "起點同終點不能為同一站";
    statusLine.classList.add("err");
    return;
  }

  statusLine.textContent = "";
  statusLine.classList.remove("err");
  searchBtn.disabled = true;
  searchBtn.textContent = "計算路線中";
  resultsWrap.innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      正在搜尋班次
    </div>
  `;

  try {
    etaCache.clear();
    const startTime = useSpecifiedTime ? new Date(customTimeInput.value) : new Date();
    
    const candidates = await runBeamSearch(origin, destination, new Set(), startTime);
    
    if (!candidates.length) {
      resultsWrap.innerHTML = `<div class="empty-state">搵唔到可行嘅行程組合，或超出步行搜尋限制</div>`;
      searchBtn.disabled = false;
      searchBtn.textContent = "搜尋行程";
      return;
    }

    const evaluated = [];
    const step = 15;
    for (let i = 0; i < candidates.length; i += step) {
      const chunk = candidates.slice(i, i + step);
      // 指定時間出發時，未來時段未必有實時 ETA 資料，改用寬鬆模式，
      // 靠 GTFS calendar／班次表推算該時段是否有服務，避免因為冇實時
      // 數據就將成條路線判失敗。
      const chunkRes = await Promise.all(chunk.map(c => evaluateCandidate(c, startTime, useSpecifiedTime)));
      chunkRes.forEach(r => { if (r) evaluated.push(r); });
      // 【改善路線多樣性】以往呢個上限係 25，配合 selectDiverseCandidates()
      // 舊有「純 heuristic 排名」嘅揀選方式，好容易 25 個都畫俾同一條路線
      // 嘅近似版本佔滿，令另一條路線（heuristic 稍差、但實際上班次密好多）
      // 完全冇機會評估到就已經 break 咗。而家 selectDiverseCandidates() 已經
      // 加咗 per-route 上限保證多樣性，但仍然要提高呢個門檻，等呢批更多樣
      // 化嘅候選有足夠空間被評估落去，先至真正睇得出邊條路線實際到站時間
      // 較快。
      if (evaluated.length >= 45) break; 
    }

    if (!evaluated.length) {
      resultsWrap.innerHTML = `<div class="empty-state">目前無實時班次，或該時段路線皆已停駛。</div>`;
      searchBtn.disabled = false;
      searchBtn.textContent = "搜尋行程";
      return;
    }

    const uniquePlans = [];
    const seenPlanKeys = new Set();
    for (const plan of evaluated) {
      const planKey = plan.legs.map(l => l.type === "ride" ? l.routeId + "@" + l.boardStopId : "walk").join("->");
      if (!seenPlanKeys.has(planKey)) {
        seenPlanKeys.add(planKey);
        uniquePlans.push(plan);
      }
    }

    lastResults = pruneDominatedPlans(uniquePlans);
    sortResults(lastResults);
    renderResults(lastResults.slice(0, RESULTS_TO_SHOW));

  } catch (err) {
    console.error(err);
    statusLine.textContent = "發生未知錯誤,請重試";
    statusLine.classList.add("err");
    resultsWrap.innerHTML = "";
  } finally {
    searchBtn.disabled = false;
    searchBtn.textContent = "搜尋行程";
  }
});

// 計算成個行程組合入面所有「步行」路段嘅總距離（米），用嚟喺到達時間／
// 轉車次數／車費都一樣嘅情況下，判斷邊個組合先至真係「行少啲」，
// 避免因為 candidates 陣列順序而隨機揀咗個要行多咗嘅版本。
function totalWalkDistM(plan){
  return (plan.legs || []).reduce((sum, l) => sum + (l.type === "walk" ? (l.distM || 0) : 0), 0);
}

function sortResults(results){
  const fareOf = p => typeof p.totalFare === "number" ? p.totalFare : Infinity;
  if (sortMode === "time") {
    // 最早到達模式：淨係比較實際到達時間，唔再加返轉車／跨公司轉車等人為懲罰分數
    // (嗰啲懲罰淨係喺搜尋階段用嚟揀路線，唔應該再影響最終「邊個最早到」嘅排序)，
    // 到達時間一樣先至用總車費做次要比較準則。
    results.sort((a,b) => {
      const timeDiff = a.arriveTime - b.arriveTime;
      if (timeDiff !== 0) return timeDiff;
      const fareDiff = fareOf(a) - fareOf(b);
      if (fareDiff !== 0) return fareDiff;
      // 到達時間、車費都一樣，先至比較邊個組合行少啲路（避免無謂步行嘅版本
      // 純粹因為順序關係排咗喺前面）。
      return totalWalkDistM(a) - totalWalkDistM(b);
    });
  } else if (sortMode === "fare") {
    // 車費模式：優先車費平嘅放最上，車費一樣先至比較邊個到達時間較早。
    results.sort((a,b) => {
      const fareDiff = fareOf(a) - fareOf(b);
      if (fareDiff !== 0) return fareDiff;
      return a.arriveTime - b.arriveTime;
    });
  } else if (sortMode === "transfers") {
    // 轉車最少模式：優先轉車次數少嘅放最上，轉車次數一樣先至比較總車費邊個平。
    results.sort((a,b) => {
      if (a.transfers !== b.transfers) return a.transfers - b.transfers;
      return fareOf(a) - fareOf(b);
    });
  }
}

// 剔除「被支配」嘅組合：如果另一個組合到達時間唔遲於佢、轉車次數唔多過佢、
// 車費都唔貴過佢、行嘅路都唔行多過佢，而且喺其中最少一項係實際上更好，
// 咁呢個組合就係無謂嘅——
// 例如搭緊 87D 途中提早落車再轉車，但其實坐同一班 87D 直達已經有得計到（且更快更平），
// 咁前者純粹製造多餘步行同轉車，應該過濾走，唔應該擺出嚟畀用戶揀。
// 【修正】以往呢度冇比較「總步行距離」，令兩個到達時間／轉車／車費完全
// 一樣，但其中一個要行多好多路先上到車嘅組合，都會一齊被視為「冇被支配」
// 而保留低嚟，最終邊個排先淨係靠陣列原有順序決定，令「明明起點附近已經
// 有得上車」嘅版本有機會被埋沒。而家加返步行距離做多一個判斷維度。
function pruneDominatedPlans(plans){
  return plans.filter(p => {
    const pWalk = totalWalkDistM(p);
    return !plans.some(q => {
      if (q === p) return false;
      const notLaterArrival = q.arriveTime <= p.arriveTime;
      const notMoreTransfers = q.transfers <= p.transfers;
      const qFare = typeof q.totalFare === "number" ? q.totalFare : null;
      const pFare = typeof p.totalFare === "number" ? p.totalFare : null;
      const notCostlier = (qFare === null || pFare === null) ? true : qFare <= pFare;
      const qWalk = totalWalkDistM(q);
      const notMoreWalk = qWalk <= pWalk;
      if (!notLaterArrival || !notMoreTransfers || !notCostlier || !notMoreWalk) return false;
      const strictlyBetter =
        q.arriveTime < p.arriveTime ||
        q.transfers < p.transfers ||
        (qFare !== null && pFare !== null && qFare < pFare) ||
        qWalk < pWalk;
      return strictlyBetter;
    });
  });
}

function renderResults(plans){
  resultsWrap.innerHTML = "";
  
  if (DEBUG_MODE) {
    const stats = getGtfsMatchFailureRate();
    const debugBox = document.createElement("div");
    debugBox.style.cssText = "background:#eae6df; padding:10px 14px; margin-bottom:12px; font-size:11px; color:#555; border:1px solid var(--line); line-height:1.4;";
    debugBox.innerHTML = `
      <b>⚙️ GTFS 診斷統計 (僅 Debug 模式顯示)</b><br>
      匹配請求總數：${stats.attempts} 次<br>
      精確匹配：${stats.exactMatch} 次 | 模糊匹配：${stats.fuzzyMatch} 次 | 匹配失敗：${stats.noMatch} 次 (失敗率: <span style="color:#a4132b;font-weight:bold">${stats.rate}%</span>)<br>
      ${stats.noMatch > 0 ? `<b>主要未匹配到的 key:</b> ${stats.topMissing.map(m => `${m[0]}(${m[1]}次)`).join(", ")}` : ""}
    `;
    resultsWrap.appendChild(debugBox);
  }

  const metaRow = document.createElement("div");
  metaRow.className = "result-meta";
  metaRow.innerHTML = `<span> ${plans.length} 個行程組合</span> <button id="refreshBtn">重新整理</button>`;
  resultsWrap.appendChild(metaRow);

  metaRow.querySelector("#refreshBtn").addEventListener("click", () => {
    searchBtn.click();
  });

  plans.forEach((plan, idx) => {
    const card = document.createElement("div");
    card.className = "result-card";

    const rankText = idx === 0 ? `方案 ${0 + 1}` : `方案 ${idx + 1}`;

    const firstLeg = plan.legs[0];
    const lastLeg = plan.legs[plan.legs.length - 1];
    
    card.innerHTML = `
      <div class="result-head">
        <div>
          <span class="rank-tag">${rankText}</span>
          <span class="times">
            ${fmtTime(firstLeg.departTime)}<span class="sep">➔</span><span class="arr">${fmtTime(lastLeg.arriveTime)}</span>
          </span>
        </div>
        <div class="stats">
          <b>${plan.totalMinutes}</b> 分鐘<br>
          ${plan.transfers === 0 ? "直達" : `轉車 ${plan.transfers} 次`}
          ${typeof plan.totalFare === "number" ? `<br><span style="color:var(--ink);font-weight:700;">$${plan.totalFare.toFixed(1)}</span>${plan.fareDiscount > 0 ? `<span style="color:var(--good);font-size:11px;font-weight:700;"> (已扣轉乘優惠 $${plan.fareDiscount.toFixed(1)})</span>` : ""}` : ""}
        </div>
      </div>
      <div class="legs"></div>
    `;

    const legsContainer = card.querySelector(".legs");
    
    plan.legs.forEach((leg, lIdx) => {
      const legEl = document.createElement("div");
      
      if (leg.type === "walk") {
        legEl.className = "leg walk";
        const isInterchange = lIdx > 0 && lIdx < plan.legs.length - 1;
        legEl.innerHTML = `
          <div class="rail"><div class="dot"></div><div class="bar"></div></div>
          <div class="content">
            <div class="stopname">${escapeHtml(leg.fromName)}</div>
            <div class="walkbox">
              🚶 ${isInterchange ? "轉乘步行" : "步行"}約 ${fmtDist(leg.distM)} (約 ${leg.minutes} 分鐘)
            </div>
          </div>
        `;
      } else {
        legEl.className = "leg ride";
        const isLive = !leg.isSpeculative;
        const tagHtml = isLive 
          ? `<span class="live-tag">實時班次</span>`
          : `<span class="est-tag">推算班次</span>`;
        const fareHtml = (typeof leg.fare === "number" && leg.fare > 0) ? `<span class="dur">$${leg.fare.toFixed(1)}</span>` : "";
        // 城巴 L1/L2 轉乘優惠：官方資料證實有折扣資格，但原始資料源冇提供
        // 實際 $ 金額，所以唔改動上面顯示嘅車費數字，淨係加個提示話俾
        // 用戶知實際拍卡應該平過現時顯示嘅價錢
        const ctbDiscountHint = leg.hasUnquantifiedCtbDiscount
          ? `<span class="ctb-discount-hint" title="城巴官方資料顯示呢程符合轉乘優惠資格，但未有提供實際扣減金額，實際車費以拍卡為準">符合城巴轉乘優惠</span>`
          : "";
        
        // 判斷是否為同名站點，若是則標註原站轉乘
        const prevLeg = lIdx > 0 ? plan.legs[lIdx-1] : null;
        const isSameStopTransfer = prevLeg && prevLeg.type === "walk" && prevLeg.distM === 0;
        const sameStopLabel = isSameStopTransfer ? `<span class="samestop"> 原站轉乘</span>` : "";

        legEl.innerHTML = `
          <div class="rail"><div class="dot"></div><div class="bar"></div></div>
          <div class="content">
            <div class="stopname">
              ${escapeHtml(stopName(leg.boardStopId))}${sameStopLabel}
              <span class="t">${fmtTime(leg.departTime)}</span>
            </div>
            <div class="ridebox">
              <span class="routeno ${escapeHtml(String(leg.co || "").trim().toLowerCase())}">${escapeHtml(leg.routeNo)}</span>
              往 ${escapeHtml(leg.r?.dest?.zh || "目的地")} 
              <span class="dur">(約 ${Math.round((leg.arriveTime - leg.departTime)/60000)} 分鐘)</span>
              ${fareHtml}
              ${tagHtml}
              ${ctbDiscountHint}
            </div>
            <div class="stopname" style="margin-top:4px;">
              ${escapeHtml(stopName(leg.alightStopId))}
              <span class="t">${fmtTime(leg.arriveTime)}</span>
            </div>
          </div>
        `;
      }
      
      if (lIdx === plan.legs.length - 1) {
        const bar = legEl.querySelector(".bar");
        if (bar) bar.style.display = "none";
      }
      
      legsContainer.appendChild(legEl);
    });

    resultsWrap.appendChild(card);
  });
}

/* ---------------------------------------------------- */
/*                    🚇 港鐵 (MTR) 資料模組                    */
/* ---------------------------------------------------------------
 * 只用喺「自選行程」模式：等用戶可以自己揀港鐵綫＋站，計算實時到站時間、
 * 車程估算、車費。唔會將港鐵路線注入 stopRouteIndex／自動搜尋（beam
 * search）用嘅索引，所以唔會影響現有巴士自動搜尋邏輯——buildIndices()
 * 喺 init() 已經行完先至輪到呢個模組載入，時序上自然做到「只喺自選模式
 * 生效」。
 *
 * 資料來源：
 * 1) 港鐵綫 (輕鐵除外) 及車站 CSV — 站序、站代號
 *    https://opendata.mtr.com.hk/data/mtr_lines_and_stations.csv
 * 2) 港鐵綫 (機場快綫及輕鐵除外) 車費 CSV — 站名/站 ID 對應車費
 *    https://opendata.mtr.com.hk/data/mtr_lines_fares.csv
 * 3) 港鐵實時列車服務資訊 API — 每站最多 4 班即將到站列車
 *    https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=<LINE>&sta=<STA>
 *    【假設，未能在此驗證】回應格式假定為坊間常見寫法：
 *    { status:1, data:{ "<LINE>-<STA>": { UP:[{seq,dest,plat,time,ttnt,valid}], DOWN:[...] } } }
 *    time 為 "YYYY-MM-DD HH:mm:ss" 字串。如果官方實際格式有出入，
 *    fetchMtrNextTrain() 會 catch 咗直接當冇實時班次，falls back 用推算，
 *    唔會整個 app 咁樣爆。
 * 4) hketa 逐站觀測車程 — 用站代號首兩位字母做檔案名
 *    https://timeinterval.hkbuseta.com/times_hourly/<星期0-6，0=日>/<HH>/<PREFIX>.json
 * 5) 港鐵站出口座標 — 用嚟畫站嘅大約經緯度（各出口平均）
 *    https://data.hkbus.app/exits.mtr.json
 * ------------------------------------------------------------- */

let mtrDb = null;              // { lines:{LINE:{DIR:[{code,seq}]}}, stationIdByCode, stationNameByCode, stationCoordByCode }
let mtrFareDb = null;          // { [fromStationId]: { [toStationId]: {oct, single} } }
let mtrRouteList = null;       // 港鐵虛擬「路線」清單，格式仿 etaDb.routeList 個別 record
let mtrLoadPromise = null;
const mtrIntervalCache = new Map();
// 【輕鐵擴充】exits.mtr.json 出口座標聚合結果，喺 loadMtrData() 入面填入，
// 供 _lightRailStationCoord() 借用嚟幫輕鐵站（CSV 本身冇座標）搵返座標。
let mtrExitSumByZh = null;
let mtrExitSumByEn = null;

// 【輕鐵站資料／路線】以往淨係載入、parse 好放埋喺度做「站名撞名」badge
// 用途，唔會接入實際嘅行程計算引擎。而家喺 loadLightRailData() 順便多
// 解析埋 Direction／建立 stationNameByCode 同 lines（路線代號→方向→
// 站序），等 _buildLightRailRouteList() 可以砌返一套仿 mtrRouteList 嘅
// 輕鐵虛擬路線,接入自選行程模式。
let lightRailDb = null;          // { stopNameSet, stops, stopNameByCode:{code:{zh,en}}, lines:{routeCode:{dirKey:[{code,seq}]}} }
let lightRailLoadPromise = null;
let lrFareDb = null;             // { [fromCode]: { [toCode]: {oct, single} } }
let lrRouteList = null;          // 輕鐵虛擬「路線」清單，格式仿 mtrRouteList
let lrFullLoadPromise = null;
const lrIntervalCache = new Map();

async function loadLightRailData() {
  if (lightRailDb) return;
  if (lightRailLoadPromise) return lightRailLoadPromise;

  lightRailLoadPromise = (async () => {
    try {
      const res = await fetch("https://seep.eu.org/https://opendata.mtr.com.hk/data/light_rail_routes_and_stops.csv");
      const text = await res.text();
      const rows = _mtrParseCsv(text);
      if (!rows.length) { lightRailDb = { stopNameSet: new Set(), stops: [], stopNameByCode: {}, lines: {} }; return; }

      // 用「欄位標頭關鍵字」嚟搵返中文/英文名／代號／路線／方向／序號分別
      // 喺邊一欄，唔靠寫死欄位位置——因為呢份 CSV 未經逐欄核實過確實格式，
      // 用關鍵字比對比較穩陣，就算欄位次序同 mtr_lines_and_stations.csv
      // 唔一致都仲搵得到。
      //
      // 【修正「撞錯欄」令 LR.json／官方即時 API 成班都查唔到】呢份 CSV
      // 好可能同時有「Stop Code」（英文字母簡稱，例如 "TIS"）同「Stop ID」
      // （純數字，官方 rt.data.gov.hk/.../lrt/getSchedule 同 hketa 嘅
      // LR.json 兩邊都係用呢個純數字 ID）兩欄。舊寫法淨係用寬鬆 substring
      // 比對、逐個關鍵字揾第一個岩嘅欄，一旦標頭順序令「Stop Code」行先
      // 撞中，就會攞咗個唔啱嘅代號格式，令之後 fetchLightRailNextTrain()
      // 嘅官方即時到站查詢、同 getLightRailIntervalSeconds() 嘅 LR.json
      // 逐站觀測車程查詢，永遠對唔上、次次都跌返去用粗略估算頂替──呢個
      // 正正就係用戶反映「預估輕鐧行程容易導致搜尋失敗」嘅根本成因。而家
      // 同輕鐧車費 CSV（見 _loadLightRailFareDb()）一致做法：關鍵字優先揾
      // 完全相符嘅欄名，揾唔到先退而求其次做寬鬆 substring 比對；亦將
      // 「Stop ID／Station ID」（純數字，同官方 API 一致）排喺「Stop
      // Code／Station Code」之前，優先攞啱嘅代號格式。
      const header = rows[0].map(h => String(h || "").trim().toLowerCase());
      const idxOf = (...keywords) => {
        for (const k of keywords) {
          const exact = header.findIndex(h => h === k);
          if (exact !== -1) return exact;
        }
        for (const k of keywords) {
          const idx = header.findIndex(h => h.includes(k) && !h.includes("name"));
          if (idx !== -1) return idx;
        }
        return header.findIndex(h => keywords.some(k => h.includes(k)));
      };
      const zhIdx = idxOf("chinese", "中文");
      const enIdx = idxOf("english", "英文");
      const codeIdx = idxOf("stop_id", "station_id", "stop id", "station id", "stop_code", "station_code", "stop code", "station code");
      const routeIdx = idxOf("route");
      const dirIdx = idxOf("direction", "方向", "bound");
      const seqIdx = idxOf("sequence");

      const stopNameSet = new Set();
      const stops = [];
      const stopNameByCode = {};
      const lines = {};

      if (zhIdx !== -1) {
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          if (!row || !row[zhIdx]) continue;
          const zh = row[zhIdx].trim();
          if (!zh) continue;
          const code = codeIdx !== -1 ? (row[codeIdx] || "").trim() : "";
          const en = enIdx !== -1 ? (row[enIdx] || "").trim() : "";
          const routeCode = routeIdx !== -1 ? (row[routeIdx] || "").trim() : "";
          // 冇 Direction 欄嗰陣退而求其次，全部行當同一個方向（dirKey
          // 固定做 "0"），起碼仲砌得到一條（單方向）虛擬路線，好過完全
          // 冇得揀。
          const dirKey = dirIdx !== -1 ? (row[dirIdx] || "").trim() : "0";
          // 冇 Sequence 欄就用返行喺 CSV 入面出現嗰個次序做序（假設 CSV
          // 本身已經按站序排好）。
          const seq = seqIdx !== -1 ? parseFloat(row[seqIdx]) : i;

          stopNameSet.add(_mtrNormalizeStationName(zh));
          stops.push({ zh, en, code, routeCode, seq: Number.isFinite(seq) ? seq : null });

          if (code && !stopNameByCode[code]) stopNameByCode[code] = { zh, en };

          if (routeCode && code && Number.isFinite(seq)) {
            lines[routeCode] = lines[routeCode] || {};
            lines[routeCode][dirKey] = lines[routeCode][dirKey] || [];
            lines[routeCode][dirKey].push({ code, seq });
          }
        }
      }

      for (const routeCode of Object.keys(lines)) {
        for (const dirKey of Object.keys(lines[routeCode])) {
          lines[routeCode][dirKey].sort((a, b) => a.seq - b.seq);
        }
      }

      lightRailDb = { stopNameSet, stops, stopNameByCode, lines };
    } catch (err) {
      console.error("背景載入輕鐵路線/站資料失敗:", err);
      lightRailDb = { stopNameSet: new Set(), stops: [], stopNameByCode: {}, lines: {} };
    }
  })();

  return lightRailLoadPromise;
}

const MTR_LINE_NAME_ZH = {
  AEL: "機場快綫", TCL: "東涌綫", TWL: "荃灣綫", ISL: "港島綫",
  KTL: "觀塘綫", SIL: "南港島綫", TKL: "將軍澳綫", EAL: "東鐵綫",
  TML: "屯馬綫", DRL: "迪士尼綫"
};

function _mtrParseCsv(text) {
  // 改用共用 parseCsvRows()（見 parseHeadwayCsv 上面）。parseCsvRows 本身
  // 對於淨係換行嘅空行都唔會 push（field/row 都係空），同原本呢度逐行
  // .trim() 檢查空行嘅效果一致；同時修正咗原本呢度冇處理 CSV 標準 ""
  // 轉義引號嘅問題。
  return parseCsvRows(text);
}

// 已知會喺「官方 mtr_lines_and_stations.csv」同「社群 exits.mtr.json」
// 兩個資料源之間唔一致嘅異體字對照表，等站名比對唔會因為用字唔同就失敗。
// 例：荔景／荔枝角嘅「荔」，官方 CSV 用返《康熙字典》正字「茘」。
const MTR_STATION_NAME_CHAR_VARIANTS = { "茘": "荔" };
function _mtrNormalizeStationName(name) {
  if (!name) return "";
  let s = String(name).trim();
  for (const [from, to] of Object.entries(MTR_STATION_NAME_CHAR_VARIANTS)) {
    s = s.split(from).join(to);
  }
  return s;
}

async function loadMtrData() {
  if (mtrDb && mtrRouteList) return;
  if (mtrLoadPromise) return mtrLoadPromise;

  mtrLoadPromise = (async () => {
    try {
      const [linesRes, faresRes, exitsRes] = await Promise.all([
        fetch("https://seep.eu.org/https://opendata.mtr.com.hk/data/mtr_lines_and_stations.csv"),
        fetch("https://seep.eu.org/https://opendata.mtr.com.hk/data/mtr_lines_fares.csv"),
        fetch("https://data.hkbus.app/exits.mtr.json").catch(() => null)
      ]);

      const linesText = await linesRes.text();
      const linesRows = _mtrParseCsv(linesText);

      const db = { lines: {}, stationIdByCode: {}, stationNameByCode: {}, stationCoordByCode: {} };
      // 標頭: Line Code, Direction, Station Code, Station ID, Chinese Name, English Name, Sequence
      for (let i = 1; i < linesRows.length; i++) {
        const row = linesRows[i];
        if (!row || row.length < 7 || !row[0]) continue;
        const [lineCode, direction, staCode, staId, zhName, enName, seqStr] = row;
        const seq = parseFloat(seqStr);
        if (!lineCode || !staCode || !Number.isFinite(seq)) continue;
        db.lines[lineCode] = db.lines[lineCode] || {};
        db.lines[lineCode][direction] = db.lines[lineCode][direction] || [];
        db.lines[lineCode][direction].push({ code: staCode, seq });
        db.stationIdByCode[staCode] = staId;
        db.stationNameByCode[staCode] = { zh: zhName, en: enName };
      }
      for (const lineCode of Object.keys(db.lines)) {
        for (const dir of Object.keys(db.lines[lineCode])) {
          db.lines[lineCode][dir].sort((a, b) => a.seq - b.seq);
        }
      }

      // 出口座標：用嚟做每個站嘅大約中心點（各出口平均），純粹畫圖／步行
      // 距離估算用，唔影響班次或收費計算。exits.mtr.json 用車站中文/英文
      // 名做 key，唔係站代號，所以要用返 db.stationNameByCode 對照。
      //
      // 【修正】荃灣綫／東涌綫共用嘅荔景站，官方 mtr_lines_and_stations.csv
      // 用返《康熙字典》正字「茘景」，但 exits.mtr.json（社群資料源）用返
      // 現代慣用嘅「荔景」，單憑中文名完全比對唔到，令 stationCoordByCode
      // 對荔景（LAK）永遠攞唔到座標、location 變成 null——由於荔景喺荃灣綫
      // 美孚站前一個站、亦係東涌綫嘅中途站，任何途經或以荔景做終點嘅自選
      // 行程（例如荃灣→美孚、東涌→荔景一帶各站）計行車時間時行到呢一站
      // 就會撞板。而家加入「異體字對照表」normalize 之後先比對，比對唔到
      // 先退而求其次改用英文站名（大小寫／前後空格唔敏感）做後備比對。
      //
      // 【輕鐵擴充】呢兩個 Map 而家提升做模組層變數（mtrExitSumByZh／
      // mtrExitSumByEn），等 _buildLightRailRouteList() 之後可以借用嚟
      // 幫輕鐵站（CSV 本身冇座標）搵返座標——exits.mtr.json 係社群統整
      // 「全部港鐧出口」資料，唔止得重鐧站，好多輕鐧站（尤其同西鐧共用
      // 名嘅屯門／兆康／天水圍／朗屏／元朗）都撞得中。
      if (exitsRes && exitsRes.ok) {
        try {
          const exits = await exitsRes.json();
          const sumByZh = new Map(); // normalize 過嘅 zhName -> {sumLat,sumLng,count}
          const sumByEn = new Map(); // normalize 過嘅 enName -> {sumLat,sumLng,count}
          for (const ex of exits) {
            if (!Number.isFinite(ex.lat) || !Number.isFinite(ex.lng)) continue;
            const zh = ex.name_zh || (ex.name && ex.name.zh);
            const en = ex.name_en || (ex.name && ex.name.en);
            if (zh) {
              const key = _mtrNormalizeStationName(zh);
              const cur = sumByZh.get(key) || { sumLat: 0, sumLng: 0, count: 0 };
              cur.sumLat += ex.lat; cur.sumLng += ex.lng; cur.count++;
              sumByZh.set(key, cur);
            }
            if (en) {
              const key = String(en).trim().toUpperCase();
              const cur = sumByEn.get(key) || { sumLat: 0, sumLng: 0, count: 0 };
              cur.sumLat += ex.lat; cur.sumLng += ex.lng; cur.count++;
              sumByEn.set(key, cur);
            }
          }
          mtrExitSumByZh = sumByZh;
          mtrExitSumByEn = sumByEn;
          for (const staCode of Object.keys(db.stationNameByCode)) {
            const meta = db.stationNameByCode[staCode];
            let agg = sumByZh.get(_mtrNormalizeStationName(meta.zh));
            if (!agg || !agg.count) {
              agg = sumByEn.get(String(meta.en || "").trim().toUpperCase());
            }
            if (agg && agg.count) {
              db.stationCoordByCode[staCode] = { lat: agg.sumLat / agg.count, lng: agg.sumLng / agg.count };
            }
          }
        } catch (e) { /* 出口座標非必要，出錯就跳過 */ }
      }


      const faresText = await faresRes.text();
      const faresRows = _mtrParseCsv(faresText);
      const fareDb = {};
      // 標頭: SRC_STATION_NAME, SRC_STATION_ID, DEST_STATION_NAME, DEST_STATION_ID,
      // OCT_ADT_FARE, OCT_STD_FARE, OCT_JOYYOU_SIXTY_FARE, SINGLE_ADT_FARE, ...
      for (let i = 1; i < faresRows.length; i++) {
        const row = faresRows[i];
        if (!row || row.length < 8) continue;
        const srcId = row[1], destId = row[3];
        const octAdt = parseFloat(row[4]);
        const singleAdt = parseFloat(row[7]);
        if (!srcId || !destId) continue;
        fareDb[srcId] = fareDb[srcId] || {};
        fareDb[srcId][destId] = {
          oct: Number.isFinite(octAdt) ? octAdt : null,
          single: Number.isFinite(singleAdt) ? singleAdt : null
        };
      }

      mtrDb = db;
      mtrFareDb = fareDb;
      _buildMtrRouteList();
      _injectMtrIntoSearchIndices();
    } catch (err) {
      mtrDb = null;
      mtrFareDb = null;
      mtrRouteList = null;
    }
  })();

  return mtrLoadPromise;
}

// 將港鐵每一綫、每一個方向組裝成一個「虛擬路線」，格式仿 etaDb.routeList
// 入面單一 record 嘅形狀（.route/.orig/.dest/.stops[co]），咁樣先可以直接
// 沿用現有 searchRoutes()／populateStops()／getCompanies() 呢一套邏輯，
// 唔使另外寫一套自選 UI。同時將每個站注入 etaDb.stopList，行程組合結果
// 頁面（renderResults）先搵到站名／座標。
function _buildMtrRouteList() {
  mtrRouteList = {};
  if (!mtrDb || !etaDb || !etaDb.stopList) return;

  for (const lineCode of Object.keys(mtrDb.lines)) {
    for (const dir of Object.keys(mtrDb.lines[lineCode])) {
      const seq = mtrDb.lines[lineCode][dir];
      if (!seq.length) continue;
      const stationCodes = seq.map(s => s.code);
      const stopIds = stationCodes.map(code => `MTR-${code}`);

      stopIds.forEach((stopId, idx) => {
        if (etaDb.stopList[stopId]) return;
        const code = stationCodes[idx];
        const meta = mtrDb.stationNameByCode[code] || {};
        const coord = mtrDb.stationCoordByCode[code] || null;
        etaDb.stopList[stopId] = {
          name: { zh: meta.zh || code, en: meta.en || code },
          location: coord
        };
      });

      const origMeta = mtrDb.stationNameByCode[stationCodes[0]] || {};
      const destMeta = mtrDb.stationNameByCode[stationCodes[stationCodes.length - 1]] || {};
      const routeId = `MTR-${lineCode}-${dir}`;
      mtrRouteList[routeId] = {
        route: lineCode, // 只用英文簡寫顯示（例如 "TML"），唔再用 MTR_LINE_NAME_ZH 嘅中文全名，
                          // 避免同一條線／方向喺自選行程選單度同時見到中英文兩個選擇
        mtrLineCode: lineCode,
        mtrDirection: dir,
        mtrStationCodes: stationCodes,
        co: "mtr",
        primaryCo: "mtr",
        orig: { zh: origMeta.zh || stationCodes[0] },
        dest: { zh: destMeta.zh || stationCodes[stationCodes.length - 1] },
        stops: { mtr: stopIds },
        isMtr: true
      };
    }
  }

  // 併入 etaDb.routeList，令 searchRoutes() 一齊搵到。
  if (etaDb && etaDb.routeList) {
    Object.assign(etaDb.routeList, mtrRouteList);
  }
}

// 【港鐵轉乘巴士搜尋能力】以往 buildIndices()（喺 init() 執行，建立
// stopRouteIndex／gridIndex 呢兩個一般／自動搜尋 beam search 賴以搵路線、
// 搵鄰近站嘅索引）行嗰陣，港鐵資料仲未載入，所以港鐵路線／站完全冇入到
// 呢兩個索引，一般搜尋見到嘅只有巴士／小巴／電車路線，永遠揀唔到任何
// 途經港鐵嘅組合（包括起點/終點就喺港鐵站隔籬呢類最基本情況）。
//
// 而家喺港鐵資料背景載入完成、_buildMtrRouteList() 整理好 mtrRouteList
// 之後，將呢批虛擬路線用同 buildIndices() 一模一樣嘅格式追加入
// stopRouteIndex，並且重新起 gridIndex（呢陣 etaDb.stopList 已經包含晒
// 港鐵站嘅座標），等 beam search 嘅路線展開／transfer 搜尋、以及起點終點
// 嘅 nearbyStops() 鄰近站搜尋，都可以自然噉搵到港鐵站同港鐵路線，
// 同其他公司路線一視同仁咁參與埋一齊做候選（包括「巴士→港鐵」「港鐵→
// 巴士」，甚至「港鐵→港鐵」轉綫）。
//
// 呢個函數淨係「追加」，唔會清空/重建成個 stopRouteIndex，所以就算執行
// 兩次（例如切去自選行程分頁再觸發一次 loadMtrData()）都唔會累積重複
// 記錄——loadMtrData() 本身已經有 mtrDb/mtrLoadPromise 做嘅一次性保護，
// 呢個函數亦只會喺 _buildMtrRouteList() 之後執行一次。
function _injectMtrIntoSearchIndices() {
  if (!etaDb || !etaDb.routeList || !stopRouteIndex || !mtrRouteList) return;

  for (const [routeId, r] of Object.entries(mtrRouteList)) {
    const companies = getCompanies(r); // getCompanies() 直接跟 r.co（呢度即係 "mtr"）判斷,唔再靠任何固定公司名單
    if (!companies.length) continue;
    const primaryCo = companies[0];
    const stops = r.stops[primaryCo];
    if (!stops) continue;
    stops.forEach((stopId, idx) => {
      if (!stopId) return;
      if (!stopRouteIndex.has(stopId)) stopRouteIndex.set(stopId, []);
      stopRouteIndex.get(stopId).push({ routeId, idx, companies, primaryCo });
    });
  }

  // 港鐵站已經加入咗 etaDb.stopList（連座標），重新起一次 gridIndex 先至
  // 令 nearbyStops() 搵到呢批新增嘅站。呢個操作只係重新掃一次
  // etaDb.stopList 起返個 hashmap，成本好細，唔會影響效能。
  buildGridIndex(etaDb.stopList);
}

// 港鐵實時到站：揀返「目的地站代號同呢個方向嘅終點站一致」嗰批班次，
// 唔靠寫死嘅 UP/DOWN 對應方向（因為唔同綫 UP/DOWN 代表嘅實際方向唔一致，
// 用官方回應入面嘅 dest 站代號自己核實方向會穩陣好多）。
async function fetchMtrNextTrain(r, idx) {
  if (!r || !r.mtrLineCode || !r.mtrStationCodes) return [];
  const staCode = r.mtrStationCodes[idx];
  if (!staCode) return [];
  const destCode = r.mtrStationCodes[r.mtrStationCodes.length - 1];

  try {
    const resp = await fetch(`https://rt.data.gov.hk/v1/transport/mtr/getSchedule.php?line=${encodeURIComponent(r.mtrLineCode)}&sta=${encodeURIComponent(staCode)}`);
    const json = await resp.json();
    if (!json || json.status !== 1 || !json.data) return [];
    const entry = json.data[`${r.mtrLineCode}-${staCode}`];
    if (!entry) return [];

    const upList = Array.isArray(entry.UP) ? entry.UP : [];
    const downList = Array.isArray(entry.DOWN) ? entry.DOWN : [];
    const all = [...upList, ...downList];
    const matched = all.filter(t => String(t.dest || "").toUpperCase() === destCode.toUpperCase());
    const candidates = matched.length ? matched : all; // 完全冇 dest 對得上先兜底用全部

    return candidates
      .map(t => ({
        etaDate: new Date(String(t.time || "").replace(" ", "T")),
        rmk: t.valid === "N" ? "非正常班次" : "",
        isFallback: false
      }))
      .filter(e => !isNaN(e.etaDate))
      .sort((a, b) => a.etaDate - b.etaDate);
  } catch (err) {
    return [];
  }
}

// 逐站觀測車程（hketa，timeinterval.hkbuseta.com）：檔案以「星期＋鐘頭＋
// 站代號首兩個字母」分割，例如 3/08/WK.json（星期三 08 時，WK 開頭嘅站）。
// getDay() 本身 0=日 1=一 2=二 3=三……剛好同「3 代表星期三」對應，唔使轉換。
async function getMtrIntervalSeconds(fromCode, toCode, when) {
  const dow = when.getDay();
  const hh = String(when.getHours()).padStart(2, "0");
  const prefix = fromCode.substring(0, 2).toUpperCase();
  const cacheKey = `${dow}/${hh}/${prefix}`;

  if (!mtrIntervalCache.has(cacheKey)) {
    const p = fetch(`https://timeinterval.hkbuseta.com/times_hourly/${dow}/${hh}/${prefix}.json`)
      .then(res => res.ok ? res.json() : null)
      .catch(() => null);
    mtrIntervalCache.set(cacheKey, p);
  }

  const json = await mtrIntervalCache.get(cacheKey);
  if (!json || !json[fromCode]) return null;
  const sec = Number(json[fromCode][toCode]);
  return (Number.isFinite(sec) && sec > 0) ? sec : null;
}

// 逐站加總 boardIdx→alightIdx 之間嘅觀測車程；任何一段冇數據就當唔完整，
// 傳 null 交返上層用啟發式估算頂住。
async function getMtrSegmentMinutes(stationCodes, boardIdx, alightIdx, when) {
  let totalSec = 0;
  for (let i = boardIdx; i < alightIdx; i++) {
    const sec = await getMtrIntervalSeconds(stationCodes[i], stationCodes[i + 1], when);
    if (sec === null) return null;
    totalSec += sec;
  }
  return totalSec / 60;
}

// 車費：用 SRC/DEST 站 ID 對照 mtr_lines_fares.csv。預設用八達通成人票價
// (OCT_ADT_FARE)，冇嘅話退用單程票 (SINGLE_ADT_FARE)。
function getMtrFare(fromCode, toCode) {
  if (!mtrFareDb || !mtrDb) return null;
  const fromId = mtrDb.stationIdByCode[fromCode];
  const toId = mtrDb.stationIdByCode[toCode];
  if (fromId == null || toId == null) return null;
  const row = mtrFareDb[fromId] && mtrFareDb[fromId][toId];
  if (!row) return null;
  return Number.isFinite(row.oct) ? row.oct : row.single;
}

// 【公平性修正】getCompanies() 已經改為直接跟 r.co 判斷,唔再需要將
// "mtr"／"lightrail" 呢類虛擬公司額外塞入任何全域公司名單。

/* -------------------------------------------------------------
 *                    🚈 輕鐵 (Light Rail) 資料模組
 * -------------------------------------------------------------
 * 只用喺「自選行程」模式：用戶自己揀輕鐧路線＋站，計算實時到站時間、
 * 車程估算、車費。做法仿照上面嘅港鐧模組——砌一批「虛擬路線」merge 入
 * etaDb.routeList／etaDb.stopList，等 searchRoutes()／populateStops()
 * 呢套現成 UI 邏輯可以直接攞嚟用，唔使另外寫一套。同港鐧模組一樣，唔會
 * 接入 stopRouteIndex／自動搜尋（beam search）索引，所以只喺自選行程
 * 分頁生效，唔影響一般（自動）搜尋。
 *
 * 資料來源：
 * 1) 輕鐧路線及站 CSV — 站序、站代號（見 loadLightRailData()）
 *    https://opendata.mtr.com.hk/data/light_rail_routes_and_stops.csv
 * 2) 輕鐧車費 CSV — 站代號對應車費
 *    https://opendata.mtr.com.hk/data/light_rail_fares.csv
 *    【假設，未能在此驗證】欄位名跟 mtr_lines_fares.csv 同一家族命名
 *    習慣，用關鍵字（見 idxOf）搵返 SRC/DEST 及車費所在欄，搵唔到就
 *    當呢程冇車費資料，唔會整個計算爆錶。
 * 3) 輕鐧實時到站 API — 每個站台最多幾班即將到站班次
 *    https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?station_id=<CODE>
 *    【假設，未能在此驗證】回應格式假定為坊間常見寫法：
 *    { system_time:"YYYY-MM-DD HH:mm:ss", platform_list:[{ platform_id,
 *      route_list:[{route_no,dest_ch,dest_en,time_ch,time_en,...}] }] }
 *    如果實際格式有出入，fetchLightRailNextTrain() 會 catch 咗直接當冇
 *    實時班次，跌返用 hketa／粗略估算頂住，唔會令個 app 咁樣爆。
 * 4) hketa 逐站觀測車程 — 輕鐧固定用 "LR" 做檔案名前綴（唔似重鐧用返
 *    站代號首兩位，因為輕鐧站代號係純數字，冇意義嘅前綴分組）
 *    https://timeinterval.hkbuseta.com/times_hourly/<星期0-6，0=日>/<HH>/LR.json
 * ------------------------------------------------------------- */

// 輕鐧 CSV 本身冇座標,借用 exits.mtr.json 出口座標（見 loadMtrData() 入面
// mtrExitSumByZh／mtrExitSumByEn）做第一層後備；比對唔中再退而求其次,
// 睇下現有巴士/小巴站入面有冇一個一字不差撞名嘅站,借用佢嘅座標——好多
// 輕鐧站本身就同附近巴士站叫同一個名。兩者都搵唔到就回傳 null（等上層
// 嘅步行距離計算自然跳過呢一段,唔會整個計算爆錶）。
function _lightRailStationCoord(zh, en) {
  if (mtrExitSumByZh) {
    const agg = mtrExitSumByZh.get(_mtrNormalizeStationName(zh || ""));
    if (agg && agg.count) return { lat: agg.sumLat / agg.count, lng: agg.sumLng / agg.count };
  }
  if (mtrExitSumByEn && en) {
    const agg = mtrExitSumByEn.get(String(en).trim().toUpperCase());
    if (agg && agg.count) return { lat: agg.sumLat / agg.count, lng: agg.sumLng / agg.count };
  }
  if (etaDb && etaDb.stopList && zh) {
    const target = _mtrNormalizeStationName(zh);
    for (const s of Object.values(etaDb.stopList)) {
      if (!s || !s.location || !s.name) continue;
      if (_mtrNormalizeStationName(s.name.zh || "") === target) return s.location;
    }
  }
  return null;
}

// 車費 CSV 載入,做法同 loadMtrData() 嘅 faresRes 一段一致,用關鍵字搵返
// SRC/DEST 及車費所在欄,唔寫死欄位位置。
async function _loadLightRailFareDb() {
  try {
    const res = await fetch("https://seep.eu.org/https://opendata.mtr.com.hk/data/light_rail_fares.csv");
    const text = await res.text();
    const rows = _mtrParseCsv(text);
    if (!rows.length) return {};

    const header = rows[0].map(h => String(h || "").trim().toLowerCase());
    // 【修正「輕鐧車費完全冇顯示」】舊版 idxOf 淨係用寬鬆嘅 substring 比對，
    // 對 SRC/DEST 呢兩隻欄尤其危險——CSV 欄位次序同 mtr_lines_fares.csv
    // 一樣係「先 NAME 後 ID」（例如 SRC_STOP_NAME 排喺 SRC_STOP_ID 之前），
    // 而 "src_stop" 呢個關鍵字本身就係 "src_stop_name" 嘅子字串，會令
    // findIndex 撞正 NAME 嗰欄先返回，令 srcIdx/destIdx 實際指向站名欄，
    // 唔係站代號欄。結果 fareDb 變成用站名做 key，但 getLightRailFare()
    // 攞嘅係站代號（lrStationCodes），永遠對唔上，車費永遠計唔到（而
    // computeTripFare() 要求全部程都有車費先顯示，一程計唔到就成程車費
    // 都唔顯示）。而家改為：優先揾完全相符嘅欄名；揾唔到先退而求其次，
    // 用 substring 比對但明確排除包含 "name" 嘅欄；再唔到先退返舊版
    // 寬鬆比對做最後保險。
    const idxOf = (...keywords) => {
      for (const k of keywords) {
        const exact = header.findIndex(h => h === k);
        if (exact !== -1) return exact;
      }
      for (const k of keywords) {
        const idx = header.findIndex(h => h.includes(k) && !h.includes("name"));
        if (idx !== -1) return idx;
      }
      return header.findIndex(h => keywords.some(k => h.includes(k)));
    };
    const srcIdx = idxOf("src_station_id", "src_stop_id", "src_stop", "src_station_code", "src_station", "src");
    const destIdx = idxOf("dest_station_id", "dest_stop_id", "dest_stop", "dest_station_code", "dest_station", "dest");
    const octIdx = idxOf("oct_adt_fare", "oct_adt", "octopus_adult", "oct");
    const singleIdx = idxOf("single_adt_fare", "single_adt", "single");

    const fareDb = {};
    if (srcIdx === -1 || destIdx === -1) return fareDb;
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row) continue;
      const src = (row[srcIdx] || "").trim();
      const dest = (row[destIdx] || "").trim();
      if (!src || !dest) continue;
      const oct = octIdx !== -1 ? parseFloat(row[octIdx]) : NaN;
      const single = singleIdx !== -1 ? parseFloat(row[singleIdx]) : NaN;
      fareDb[src] = fareDb[src] || {};
      fareDb[src][dest] = {
        oct: Number.isFinite(oct) ? oct : null,
        single: Number.isFinite(single) ? single : null
      };
    }
    return fareDb;
  } catch (err) {
    console.error("背景載入輕鐧車費資料失敗:", err);
    return {};
  }
}

// 將輕鐧每一條路線、每一個方向組裝成一個「虛擬路線」,格式仿 mtrRouteList，
// 等 searchRoutes()／populateStops()／getCompanies() 呢一套現成邏輯可以
// 直接攞嚟用。同時將每個站注入 etaDb.stopList,行程組合結果頁面
// （renderResults）先搵到站名。
function _injectLightRailIntoSearchIndices() {
  if (!etaDb || !etaDb.routeList || !stopRouteIndex || !lrRouteList) return;

  for (const [routeId, r] of Object.entries(lrRouteList)) {
    const companies = getCompanies(r); // 即 ["lightrail"]
    if (!companies.length) continue;
    const primaryCo = companies[0];
    const stops = r.stops[primaryCo];
    if (!stops) continue;
    stops.forEach((stopId, idx) => {
      if (!stopId) return;
      if (!stopRouteIndex.has(stopId)) stopRouteIndex.set(stopId, []);
      stopRouteIndex.get(stopId).push({ routeId, idx, companies, primaryCo });
    });
  }

  // 輕鐵站已經加入咗 etaDb.stopList（連座標，見 _buildLightRailRouteList()），
  // 同 _injectMtrIntoSearchIndices() 一樣，重新起一次 gridIndex 先至令
  // nearbyStops() 搵到呢批新增嘅站。
  buildGridIndex(etaDb.stopList);
}

function _buildLightRailRouteList() {
  lrRouteList = {};
  if (!lightRailDb || !lightRailDb.lines || !etaDb || !etaDb.stopList) return;

  for (const routeCode of Object.keys(lightRailDb.lines)) {
    for (const dirKey of Object.keys(lightRailDb.lines[routeCode])) {
      const seq = lightRailDb.lines[routeCode][dirKey];
      if (!seq.length) continue;
      const stationCodes = seq.map(s => s.code);
      const stopIds = stationCodes.map(code => `LR-${code}`);

      stopIds.forEach((stopId, idx) => {
        if (etaDb.stopList[stopId]) return;
        const code = stationCodes[idx];
        const meta = (lightRailDb.stopNameByCode && lightRailDb.stopNameByCode[code]) || {};
        const coord = _lightRailStationCoord(meta.zh, meta.en);
        etaDb.stopList[stopId] = {
          name: { zh: meta.zh || code, en: meta.en || code },
          location: coord
        };
      });

      const origMeta = (lightRailDb.stopNameByCode && lightRailDb.stopNameByCode[stationCodes[0]]) || {};
      const destMeta = (lightRailDb.stopNameByCode && lightRailDb.stopNameByCode[stationCodes[stationCodes.length - 1]]) || {};
      const routeId = `LR-${routeCode}-${dirKey}`;
      lrRouteList[routeId] = {
        route: routeCode,
        lrRouteCode: routeCode,
        lrDirection: dirKey,
        lrStationCodes: stationCodes,
        co: "lightrail",
        primaryCo: "lightrail",
        orig: { zh: origMeta.zh || stationCodes[0] },
        dest: { zh: destMeta.zh || stationCodes[stationCodes.length - 1] },
        stops: { lightrail: stopIds },
        isLightRailRoute: true
      };
    }
  }

  if (etaDb && etaDb.routeList) {
    Object.assign(etaDb.routeList, lrRouteList);
  }
}

// 輕鐵資料載入
async function loadLightRailFullData() {
  if (lrRouteList) return;
  if (lrFullLoadPromise) return lrFullLoadPromise;

  lrFullLoadPromise = (async () => {
    try {
      await Promise.all([loadLightRailData(), loadMtrData()]);
      _buildLightRailRouteList();
      // 【修正「輕鐵車費完全冇載入」】以往呢度淨係將輕鐧路線 merge 落
      // etaDb.routeList,但一般（自動）搜尋靠嘅 stopRouteIndex／gridIndex
      // 喺 init() 一早已經起好,唔會自動見到呢批新加嘅輕鐧站/路線。結果
      // 一般搜尋如果撞到輕鐧,好可能靠其他不完整途徑（例如冇 lrStationCodes
      // 嘅殘缺 entry）拼湊出嚟,令 getLightRailFare() 攞唔到站代號而回傳
      // null。而家同 _injectMtrIntoSearchIndices() 一致,將呢批已經砌好、
      // 帶齊 lrStationCodes／車費資料嘅正式輕鐧路線一併注入索引。
      _injectLightRailIntoSearchIndices();
      lrFareDb = await _loadLightRailFareDb();
    } catch (err) {
      console.error("輕鐧行程資料整合失敗:", err);
    }
  })();

  return lrFullLoadPromise;
}

// 輕鐵實時到站
async function fetchLightRailNextTrain(r, idx) {
  if (!r || !r.lrStationCodes) return [];
  const staCode = r.lrStationCodes[idx];
  if (!staCode) return [];

  try {
    const resp = await fetch(`https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?station_id=${encodeURIComponent(staCode)}`);
    const json = await resp.json();
    if (!json) return [];

    const platformList = json.platform_list || json.platformList || [];
    const nowBase = _parseLrSystemTime(json.system_time || json.systemTime) || new Date();
    const destZh = String((r.dest && r.dest.zh) || "").trim();
    const routeNo = String(r.route || r.lrRouteCode || "").trim();

    const entries = [];
    for (const plat of platformList) {
      const routeArr = plat.route_list || plat.routeList || [];
      for (const item of routeArr) {
        const itemRouteNo = String(item.route_no || item.routeNo || "").trim();
        if (routeNo && itemRouteNo && itemRouteNo !== routeNo) continue;

        const itemDest = String(item.dest_ch || item.destCh || item.dest_en || item.destEn || "").trim();
        if (destZh && itemDest && !(itemDest.includes(destZh) || destZh.includes(itemDest))) continue;

        const timeStr = String(item.time_ch || item.timeCh || item.time_en || item.timeEn || "");
        const mins = _parseLrEtaMinutes(timeStr);
        if (mins === null) continue;

        entries.push({
          etaDate: new Date(nowBase.getTime() + mins * 60000),
          rmk: "",
          isFallback: false
        });
      }
    }

    return entries.sort((a, b) => a.etaDate - b.etaDate);
  } catch (err) {
    return [];
  }
}

function _parseLrSystemTime(s) {
  if (!s) return null;
  const d = new Date(String(s).replace(" ", "T"));
  return isNaN(d) ? null : d;
}

// 解析「3 min.」「3 分鐧」「即將抵達」「-」呢類到站時間文字,揈出分鐧數。
function _parseLrEtaMinutes(s) {
  const str = String(s || "").trim();
  if (!str) return null;
  if (/即將|arriving/i.test(str)) return 0;
  const m = str.match(/-?\d+(\.\d+)?/);
  if (!m) return null;
  const v = parseFloat(m[0]);
  return Number.isFinite(v) ? Math.max(0, v) : null;
}

// 逐站觀測車程（hketa，timeinterval.hkbuseta.com）：輕鐧固定用 "LR" 做
// 檔案名前綴（唔似重鐧用返站代號首兩位嗰種分組法——輕鐧站代號係純數字,
// 冇意義嘅字母前綴,hketa 索性將全部輕鐧站歸做一份 LR.json）。
async function getLightRailIntervalSeconds(fromCode, toCode, when) {
  const dow = when.getDay();
  const hh = String(when.getHours()).padStart(2, "0");
  const cacheKey = `${dow}/${hh}/LR`;

  if (!lrIntervalCache.has(cacheKey)) {
    const p = fetch(`https://timeinterval.hkbuseta.com/times_hourly/${dow}/${hh}/LR.json`)
      .then(res => res.ok ? res.json() : null)
      .catch(() => null);
    lrIntervalCache.set(cacheKey, p);
  }

  const json = await lrIntervalCache.get(cacheKey);
  if (!json) return null;

  // 【容忍站代號格式唔完全一致】我哋自己嗰邊嘅 lrStationCodes 嚟自
  // light_rail_routes_and_stops.csv 嘅欄位，同 LR.json 入面實際用嗰個
  // 代號格式，未必 100% 一致（例如一邊有前導零、一邊冇），一旦格式對
  // 唔上就會令 json[fromCode] 永遠搵唔到，變成成個 LR.json 形同虛設、
  // 逐次都跌返去粗略估算。而家逐個候選格式（原字串／去除前導零／
  // 數字化再轉字串）都試一次先放棄。
  const candidates = (code) => {
    const s = String(code == null ? "" : code).trim();
    const out = new Set([s]);
    const stripped = s.replace(/^0+(?=\d)/, "");
    if (stripped) out.add(stripped);
    const n = Number(s);
    if (Number.isFinite(n)) out.add(String(n));
    return [...out];
  };

  for (const fc of candidates(fromCode)) {
    const inner = json[fc];
    if (!inner) continue;
    for (const tc of candidates(toCode)) {
      const sec = Number(inner[tc]);
      if (Number.isFinite(sec) && sec > 0) return sec;
    }
  }
  return null;
}

// 輕鐧站與站之間搵唔到觀測數據時嘅單一段粗略估算（分鐘）：同下面
// getLightRailSegmentMinutes() 嘅整體 fallback 比例（1.6 分鐘／站）一致，
// 用嚟補漏——而唔係一旦有一段冧空就成程車程都放棄用 LR.json。
const LR_SEGMENT_FALLBACK_MIN_PER_STOP = 1.6;

// 【修正「一段冇數據就成程放棄用 LR.json」】以往但凡途中有一個站對站
// interval 喺 LR.json 搵唔到，就即刻 return null，令呢一程完全跌返去
// 用「站數 × 1.6 分鐘」嘅粗略估算，就算頭尾九成幾個站都有真實觀測數據
// 都照樣捨棄晒——呢個係用戶反映「預估輕鐧行程容易導致搜尋失敗」嘅主要
// 成因：粗略估算同真實車程可以差好遠（例如天水圍一段輕鐧站距特別疏，
// 1.6 分鐘／站遠遠低估），令推算出嚟嘅落車時間同下一程嘅實際班次對唔
// 上，搜尋因而誤判做「已經冇服務／過咗尾班車」。而家改為：搵到幾多得
// 幾多，搵唔到嘅個別分段先至用返呢個粗略估算頂替，儘量以真實觀測數據
// 為主。
async function getLightRailSegmentMinutes(stationCodes, boardIdx, alightIdx, when) {
  let totalSec = 0;
  let hasAnyRealData = false;
  for (let i = boardIdx; i < alightIdx; i++) {
    const sec = await getLightRailIntervalSeconds(stationCodes[i], stationCodes[i + 1], when);
    if (sec === null) {
      totalSec += LR_SEGMENT_FALLBACK_MIN_PER_STOP * 60;
    } else {
      totalSec += sec;
      hasAnyRealData = true;
    }
  }
  // 全部分段都搵唔到真實數據（例如 LR.json 呢個鐘數完全冇資料）：交返
  // null，等上層用返佢自己嗰套整體粗略估算，行為同以往一致，唔會扭曲
  // 個「搵唔到就用返粗略估算」嘅語義。
  if (!hasAnyRealData) return null;
  return totalSec / 60;
}

// 車費：用站代號直接對照 light_rail_fares.csv（假設呢個 CSV 用嘅 SRC/DEST
// 就係站代號本身,唔似重鐧要多轉一次 Station ID——輕鐧冇重鐧嗰種「代號
// 同 ID 分開」設計）。預設用八達通成人票價,冇嘅話退用單程票。
function getLightRailFare(fromCode, toCode) {
  if (!lrFareDb) return null;
  const row = lrFareDb[fromCode] && lrFareDb[fromCode][toCode];
  if (!row) return null;
  return Number.isFinite(row.oct) ? row.oct : row.single;
}

// 城巴分支名稱（由已載入嘅 ctb_route_ids.json／ctbRouteIdsDb 提供）：同一路線
// ＋方向底下可能有多個服務分支（例如「正常路線」／「晨早班次，經金鐘」等），
// 單憑起訖點名稱完全睇唔出分支差異（見自選行程搜尋結果會出現多條睇落一樣
// 嘅 788 往中環），所以要額外查表攞返分支名稱顯示出嚟，方便用戶分辨清楚
// 揀啱班次。ctbRouteIdsDb 結構：{ [路線]: { [方向 O/I]: { variants: {
// [serviceType]: { longId: "序號||類型||路線分支碼||分支描述||內部完整ID||" } } } } }，
// 分支描述就係 longId 用 "||" 分隔後嘅第 4 個欄位（index 3）。
function getCtbVariantDesc(r) {
  if (!r || !ctbRouteIdsDb) return null;
  // 【修正冇顯示分支名】以往呢度假設 r.co／r.bound／r.serviceType 一定係
  // 「用公司代號做 key」嘅物件（例如 {ctb:"O"}），但 hk-bus-eta 對於只有
  // 一間公司經營嘅路線，呢幾個欄位有時會係直接一個字串（例如 "O"、"1"），
  // 唔一定包一層 {ctb: ...}。以往嘅寫法一撞到呢種形狀就會 return null，
  // 城巴嘅分支名完全顯示唔出嚕，即使 ctb_route_ids.json 明明有資料。
  // 而家改為兩種形狀都支援。
  const coList = r.co;
  const isCtb = Array.isArray(coList)
    ? coList.includes("ctb")
    : typeof coList === "string"
      ? coList.toLowerCase().includes("ctb")
      : false;
  if (!isCtb) return null;
  const routeKey = String(r.route || "").toUpperCase().trim();
  const boundsObj = ctbRouteIdsDb[routeKey];
  if (!boundsObj) return null;
  const rawBound = r.bound && typeof r.bound === "object" ? r.bound.ctb : r.bound;
  if (!rawBound) return null;
  const boundData = boundsObj[rawBound] || boundsObj[String(rawBound).toUpperCase()] || boundsObj[String(rawBound).toLowerCase()];
  if (!boundData || !boundData.variants) return null;
  const rawSvcType = r.serviceType && typeof r.serviceType === "object" ? r.serviceType.ctb : r.serviceType;
  if (!rawSvcType) return null;
  const svcKey = String(rawSvcType).trim();
  const variant = boundData.variants[svcKey] || boundData.variants[svcKey.replace(/^0+/, "")];
  if (!variant || !variant.longId) return null;
  const parts = String(variant.longId).split("||");
  const desc = parts[3] ? parts[3].trim() : "";
  return desc || null;
}

// 嶼巴分支標籤
function getNlbVariantDesc(r) {
  if (!r || !nlbRouteTagDb || !r.nlbId) return null;
  const isNlb = r.co
    ? (Array.isArray(r.co) ? r.co.includes("nlb") : String(r.co).toLowerCase().includes("nlb"))
    : false;
  if (!isNlb) return null;
  return nlbRouteTagDb.get(String(r.nlbId)) || null;
}

function isUnusableNativeMtrEntry(r) {
  if (!r || !r.co) return false;
  const isMtrCo = Array.isArray(r.co) ? r.co.includes("mtr") : String(r.co).toLowerCase().includes("mtr");
  return isMtrCo && !r.isMtr;
}

// 移除港巴士 dummy 資料
function isUnusableNativeMtrbEntry(r) {
  if (!r || !r.co) return false;
  const isMtrbCo = Array.isArray(r.co) ? r.co.includes("mtrb") : String(r.co).toLowerCase().includes("mtrb");
  return isMtrbCo && !r.isMtrBusVerified;
}

// 搜尋邏輯
function searchRoutes(query, limit = 20) {
  const q = query.trim().toUpperCase();
  if (!q || !etaDb || !etaDb.routeList) return [];
  
  const out = [];
  for (const [routeId, r] of Object.entries(etaDb.routeList)) {
    if (!r || !r.route) continue;
    if (isUnusableNativeMtrEntry(r)) continue;
    if (isUnusableNativeMtrbEntry(r)) continue;
    // 【修正「路線冇站位資料就揀唔到」】自選行程揀咗條路線之後,populateStops()
    // 靠 getCompanies(r) 揾返有齊站點資料嘅公司先至填得到上車/下車站選單；
    // 如果一條路線根本冇任何公司有齊站點資料（例如 etaDb 原始資料自帶嘅
    // 不完整/dummy 路線),揀落去只會見到兩個空嘅選單、乜都揀唔到。而家
    // 喺呢度提早用返同一個 getCompanies() 檢查,冇齊站點資料嘅路線直接
    // 唔會出現喺建議清單,唔止靠上面兩個 mtr/mtrb 專門 case,亦一併防到
    // 其他公司嘅類似情況。
    if (!getCompanies(r).length) continue;
    
    const routeStr = String(r.route).toUpperCase();
    const mtrCodeMatch = r.mtrLineCode && String(r.mtrLineCode).toUpperCase().includes(q);
    if (routeStr.includes(q) || mtrCodeMatch) {
      out.push({ 
        routeId, 
        route: r.route, 
        orig: r.orig?.zh || r.orig || "", 
        dest: r.dest?.zh || r.dest || "",
        ctbVariant: getCtbVariantDesc(r),
        nlbTag: getNlbVariantDesc(r)
      });
    }
  }

  out.sort((a, b) => {
    const aRoute = String(a.route).toUpperCase();
    const bRoute = String(b.route).toUpperCase();
    
    const aExact = aRoute === q;
    const bExact = bRoute === q;
    if (aExact && !bExact) return -1;
    if (!aExact && bExact) return 1;
    
    const aStart = aRoute.startsWith(q);
    const bStart = bRoute.startsWith(q);
    if (aStart && !bStart) return -1;
    if (!aStart && bStart) return 1;
    
    if (aRoute.length !== bRoute.length) {
      return aRoute.length - bRoute.length;
    }
    
    return aRoute.localeCompare(bRoute, undefined, { numeric: true });
  });

  return out.slice(0, limit);
}

// 【港鐵轉乘巴士搜尋改善】用戶喺港鐵站落車後，好多時淨係知道自己喺邊個站，
// 唔一定記得轉乘嘅巴士路線編號。呢個函數用上一程（必須係港鐵）嘅落車站
// 座標，搵返附近實際有嘅巴士／小巴／嶼巴路線，等下一程嘅路線搜尋框一
// focus（未打字之前）就可以直接揀，唔使自己估估吓路線編號先至打得中。
function getNearbyBusRoutesFromMtr(card, radiusM = 500, limit = 20) {
  if (!etaDb || !stopRouteIndex || !gridIndex) return [];
  const prevCard = card.previousElementSibling;
  if (!prevCard || !prevCard.classList || !prevCard.classList.contains("custom-leg-card")) return [];

  const prevRouteId = prevCard.dataset.routeId;
  const prevRoute = prevRouteId ? etaDb.routeList[prevRouteId] : null;
  const isPrevMtr = prevRoute && prevRoute.co
    ? (Array.isArray(prevRoute.co) ? prevRoute.co.includes("mtr") : String(prevRoute.co).toLowerCase().includes("mtr"))
    : false;
  if (!isPrevMtr) return [];

  const alightSelect = prevCard.querySelector(".custom-alight-select");
  if (!alightSelect || !alightSelect.value) return [];
  let alight;
  try { alight = JSON.parse(alightSelect.value); } catch (e) { return []; }
  const loc = alight && alight.location;
  if (!loc || !Number.isFinite(loc.lat) || !Number.isFinite(loc.lng)) return [];

  // 【改善港鐵轉乘巴士連接能力】部分大型港鐵站（例如屯門、
  // 沙田、大埔墟、將軍澳呢類多月台大站）嘅巴士/小巴站可能距離站中心
  // 遠過 500 米,如果第一輪半徑搵唔夠路線,就逐步擴大搜尋半徑（每次
  // 加倍,最多擴到 3 倍即 1500 米），盡量提升搵到實際可轉乘路線嘅
  // 機會,唔會死守住一個固定半徑令用戶漏搵到轉乘選擇。
  const MIN_WANTED = 6;
  const MAX_RADIUS_M = radiusM * 3;
  let out = [];
  let curRadius = radiusM;
  while (true) {
    out = _collectNearbyBusRoutes(loc, curRadius, limit);
    if (out.length >= MIN_WANTED || curRadius >= MAX_RADIUS_M) break;
    curRadius = Math.min(curRadius * 2, MAX_RADIUS_M);
  }
  return out;
}

// 由 getNearbyBusRoutesFromMtr() 抽出嘅實際收集邏輯,等上面果個 function
// 可以用唔同半徑重複調用嚌住做「逐步擴大搜尋範圍」。
function _collectNearbyBusRoutes(loc, radiusM, limit) {
  const nearby = nearbyStops(loc.lat, loc.lng, radiusM);
  nearby.sort((a, b) => a.dist - b.dist);

  const seenRoutes = new Set();
  const out = [];
  for (const ns of nearby) {
    const entries = stopRouteIndex.get(ns.stopId);
    if (!entries) continue;
    for (const e of entries) {
      if (seenRoutes.has(e.routeId)) continue;
      const r = etaDb.routeList[e.routeId];
      if (!r || !r.route) continue;
      if (isUnusableNativeMtrEntry(r)) continue;
      if (isUnusableNativeMtrbEntry(r)) continue;
      // 呢度想搵嘅係轉乘巴士，港鐵轉港鐵留返用路線編號直接搜
      const isMtrRoute = r.co
        ? (Array.isArray(r.co) ? r.co.includes("mtr") : String(r.co).toLowerCase().includes("mtr"))
        : false;
      if (isMtrRoute) continue;

      seenRoutes.add(e.routeId);
      const stopMeta = etaDb.stopList[ns.stopId];
      out.push({
        routeId: e.routeId,
        route: r.route,
        orig: r.orig?.zh || r.orig || "",
        dest: r.dest?.zh || r.dest || "",
        ctbVariant: getCtbVariantDesc(r),
        nlbTag: getNlbVariantDesc(r),
        nearbyIdx: e.idx,
        nearbyStopName: (stopMeta && stopMeta.name && stopMeta.name.zh) || "",
        nearbyDistM: Math.round(ns.dist)
      });
      if (out.length >= limit) break;
    }
    if (out.length >= limit) break;
  }
  return out;
}

function wireCustomLegEvents(card) {
  const routeInput = card.querySelector(".custom-route-input");
  const routeSuggest = card.querySelector(".custom-route-suggest");
  const boardSelect = card.querySelector(".custom-board-select");
  const alightSelect = card.querySelector(".custom-alight-select");
  
  let selectedRoute = null;
  let debounce;
  
  function getCleanQuery(val) {
    let q = val.trim();
    const bracketIdx = q.indexOf(" (往");
    if (bracketIdx !== -1) {
      q = q.substring(0, bracketIdx);
    }
    return q;
  }

  // 統一嘅「揀咗一條路線」處理：搜尋結果／附近路線結果都共用呢個。
  // 如果 routeObj 帶有 nearbyIdx（即係由「附近路線」建議揀出嚟），
  // populateStops() 完成之後仲會自動幫手揀返嗰個貼近港鐵站嘅上車站，
  // 唔使用戶自己再喺一大堆站之中搵返啱嗰個。
  function selectRoute(routeObj) {
    selectedRoute = etaDb.routeList[routeObj.routeId];
    selectedRoute.routeId = routeObj.routeId;
    const variantDesc = routeObj.ctbVariant || routeObj.nlbTag || getCtbVariantDesc(selectedRoute) || getNlbVariantDesc(selectedRoute);
    const destName = selectedRoute.dest.zh || selectedRoute.dest;
    routeInput.value = variantDesc
      ? `${selectedRoute.route} (往 ${destName}・${variantDesc})`
      : `${selectedRoute.route} (往 ${destName})`;
    card.dataset.routeId = routeObj.routeId;

    populateStops(selectedRoute, boardSelect, alightSelect);

    if (Number.isFinite(routeObj.nearbyIdx)) {
      for (const opt of boardSelect.options) {
        if (!opt.value) continue;
        try {
          if (JSON.parse(opt.value).idx === routeObj.nearbyIdx) {
            boardSelect.value = opt.value;
            break;
          }
        } catch (e) { /* 忽略單一 option 解析失敗 */ }
      }
    }
  }
  
  routeInput.addEventListener("input", () => {
    clearTimeout(debounce);
    const cleanVal = getCleanQuery(routeInput.value);
    
    if (!cleanVal) {
      // 【港鐵轉乘巴士】輸入框打到清空咗,如果上一程係港鐧就同 focus
      // 事件一樣直接列出附近巴士路線,唔使用戶刻意再撳一次 focus。
      const nearby = getNearbyBusRoutesFromMtr(card);
      if (nearby.length) {
        renderRouteSuggest(routeSuggest, nearby, selectRoute, { headerText: "港鐵站附近巴士路線" });
      } else {
        routeSuggest.innerHTML = "";
        routeSuggest.hidden = true;
      }
      return;
    }
    
    debounce = setTimeout(() => {
      const results = searchRoutes(cleanVal);
      // 【港鐧轉乘巴士連接能力改善】就算用戶已經打緊字,如果上一程係
      // 港鐧,都一併搵埋附近路線,加喺主要搜尋結果下面（撇除已經喺主要
      // 結果出現過嘅路線,唔重複顯示同一條路線兩次）,等用戶打錯字或者
      // 唔記得完整路線編號嗰陣都仲有機會見到轉乘建議。
      const nearby = getNearbyBusRoutesFromMtr(card);
      if (nearby.length) {
        const nearbyFiltered = nearby.filter(n => !results.some(r => r.routeId === n.routeId));
        renderRouteSuggest(routeSuggest, results, selectRoute, {
          extra: nearbyFiltered.length ? { results: nearbyFiltered, headerText: "港鐵站附近巴士路線" } : null
        });
      } else {
        renderRouteSuggest(routeSuggest, results, selectRoute);
      }
    }, 120);
  });
  
  routeInput.addEventListener("focus", () => {
    routeInput.select();
    
    const cleanVal = getCleanQuery(routeInput.value);
    if (cleanVal) {
      const results = searchRoutes(cleanVal);
      const nearby = getNearbyBusRoutesFromMtr(card);
      if (nearby.length) {
        const nearbyFiltered = nearby.filter(n => !results.some(r => r.routeId === n.routeId));
        renderRouteSuggest(routeSuggest, results, selectRoute, {
          extra: nearbyFiltered.length ? { results: nearbyFiltered, headerText: "港鐵站附近巴士路線" } : null
        });
      } else {
        renderRouteSuggest(routeSuggest, results, selectRoute);
      }
      return;
    }

    // 【港鐵轉乘巴士】輸入框未打字，但上一程係港鐵，就直接列出港鐵站
    // 附近實際有嘅巴士／小巴路線，方便用戶轉乘唔使自己估路線編號。
    const nearby = getNearbyBusRoutesFromMtr(card);
    if (nearby.length) {
      renderRouteSuggest(routeSuggest, nearby, selectRoute, { headerText: " 港鐵站附近巴士路線" });
    }
  });
  
  document.addEventListener("click", (e) => {
    if (!routeSuggest.contains(e.target) && e.target !== routeInput) routeSuggest.hidden = true;
  });
}

function renderRouteSuggest(suggestEl, results, onPick, opts = {}) {
  suggestEl.innerHTML = "";

  const hasExtra = !!(opts.extra && opts.extra.results && opts.extra.results.length);
  if (!results.length && !hasExtra) {
    suggestEl.innerHTML = `<div class="empty">搵唔到相符嘅路線</div>`;
    suggestEl.hidden = false;
    return;
  }

  const renderGroup = (list, headerText) => {
    if (headerText) {
      const header = document.createElement("div");
      header.style.cssText = "padding:6px 10px; font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.3px;";
      header.textContent = headerText;
      suggestEl.appendChild(header);
    }
    for (const r of list) {
      const btn = document.createElement("button");
      btn.type = "button";
      const variantBadge = r.ctbVariant
        ? `<small style="display:inline-block; color:var(--ctb); background:rgba(246,168,0,.14); padding:1px 7px; margin-left:6px; font-weight:700;">${escapeHtml(r.ctbVariant)}</small>`
        : r.nlbTag
          ? `<small style="display:inline-block; color:var(--nlb); background:rgba(15,107,63,.12); padding:1px 7px; margin-left:6px; font-weight:700;">${escapeHtml(r.nlbTag)}</small>`
          : "";
      const nearbyBadge = Number.isFinite(r.nearbyDistM)
        ? `<small style="display:inline-block; color:var(--walk); background:rgba(138,131,119,.16); border-radius:8px; padding:1px 7px; margin-left:6px; font-weight:700;">📍 ${escapeHtml(r.nearbyStopName || "附近")}・${r.nearbyDistM}米</small>`
        : "";
      btn.innerHTML = `<b style="font-size:15px; color:var(--kmb);">${escapeHtml(r.route)}</b> <small style="display:inline; color:var(--muted); margin-left:8px;">往 ${escapeHtml(r.dest)}</small>${variantBadge}${nearbyBadge}`;
      btn.addEventListener("click", () => {
        onPick(r);
        suggestEl.hidden = true;
      });
      suggestEl.appendChild(btn);
    }
  };

  if (results.length) {
    renderGroup(results, opts.headerText);
  }
  // 【港鐧轉乘巴士連接能力改善】就算用戶已經打緊字（唔淨係喺輸入框
  // 未打字嗰陣先有效），只要上一程係港鐧,都喺主要搜尋結果下面多加一組
  // 「附近巴士路線」建議,等用戶打錯字/唔記得路線編號時都仲搵到轄鐘
  // 可以轉乘嘅路線,唔一定要清空輸入框先睇到附近有咩揀。
  if (hasExtra) {
    renderGroup(opts.extra.results, opts.extra.headerText);
  }

  suggestEl.hidden = false;
}

// 填充站點安全化
function populateStops(route, boardSelect, alightSelect) {
  boardSelect.innerHTML = `<option value="">請選擇上車站</option>`;
  alightSelect.innerHTML = `<option value="">請選擇下車站</option>`;
  
  const companies = getCompanies(route);
  if (!companies || !companies.length) return;
  
  const stops = (route.stops && route.stops[companies[0]]) ? route.stops[companies[0]] : null;
  if (!stops) return;
  
  stops.forEach((stopId, idx) => {
    const s = etaDb.stopList ? etaDb.stopList[stopId] : null;
    if (!s) return;
    
    // 確保我們取得有效的中文及英文站名
    const zhName = s.name?.zh || s.name || "未知站點";
    const enName = s.name?.en || "";
    const displayName = `${idx + 1}. ${zhName}`;
    
    // 將站點的所有必要關鍵欄位打包進 option.value，防止後面取值時丟失
    const stopData = { 
      stopId, 
      idx, 
      co: companies[0],
      name: { zh: zhName, en: enName },
      location: s.location || null
    };
    
    const optBoard = document.createElement("option");
    optBoard.value = JSON.stringify(stopData);
    optBoard.textContent = displayName;
    boardSelect.appendChild(optBoard);
    
    const optAlight = document.createElement("option");
    optAlight.value = JSON.stringify(stopData);
    optAlight.textContent = displayName;
    alightSelect.appendChild(optAlight);
  });
}

calcCustomBtn.addEventListener("click", async () => {
  const cards = customLegsContainer.querySelectorAll(".custom-leg-card");
  if (!cards.length) return;
  
  statusLine.textContent = "";
  statusLine.classList.remove("err");
  calcCustomBtn.disabled = true;
  calcCustomBtn.textContent = "計算行程中";
  resultsWrap.innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      正在搜尋
    </div>
  `;
  
  try {
    if (typeof etaCache !== 'undefined' && etaCache.clear) {
      etaCache.clear();
    }
    const startTime = useSpecifiedTime ? new Date(customTimeInput.value) : new Date();
    
    // 構建自選路線虛擬 Candidate
    const segs = [];
    
    for (let i = 0; i < cards.length; i++) {
      const card = cards[i];
      const routeId = card.dataset.routeId;
      const boardVal = card.querySelector(".custom-board-select").value;
      const alightVal = card.querySelector(".custom-alight-select").value;
      
      if (!routeId || !boardVal || !alightVal) {
        throw new Error(`請填妥第 ${i+1} 程的所有路線及上下車車站`);
      }
      
      const route = etaDb.routeList[routeId];
      const board = JSON.parse(boardVal);
      const alight = JSON.parse(alightVal);
      
      if (board.idx >= alight.idx) {
        throw new Error(`第 ${i+1} 程的下車站必須在車程上車站之後`);
      }
      
      // 🚨 【超級安全防護門】：注入虛擬站點至 etaDb.stopList 中！
      // 避免核心計算/渲染引擎試圖用 stopId 查表卻查到 null，進而噴出 "Cannot read properties of null (reading 'name')"
      if (etaDb && etaDb.stopList) {
        if (!etaDb.stopList[board.stopId]) {
          etaDb.stopList[board.stopId] = { name: board.name, location: board.location };
        }
        if (!etaDb.stopList[alight.stopId]) {
          etaDb.stopList[alight.stopId] = { name: alight.name, location: alight.location };
        }
      }
      
      // 如果不是第一程，且上一程下車和本程上車屬於不同物理位置，自動插入步行
      if (i > 0) {
        const prevAlightVal = cards[i-1].querySelector(".custom-alight-select").value;
        const prevAlight = JSON.parse(prevAlightVal);
        
        // 取得位置的安全防禦
        const prevLoc = prevAlight.location || (etaDb.stopList[prevAlight.stopId] ? etaDb.stopList[prevAlight.stopId].location : null);
        const currLoc = board.location || (etaDb.stopList[board.stopId] ? etaDb.stopList[board.stopId].location : null);
        
        if (prevLoc && currLoc) {
          const distance = distM(prevLoc, currLoc);
          if (distance > 15) { // 超過 15 米視為需要步行/移動
            segs.push({
              type: "walk",
              fromStopId: prevAlight.stopId,
              toStopId: board.stopId,
              distM: distance
            });
          }
        }
      }
      
      segs.push({
        type: "ride",
        routeId,
        companies: getCompanies(route),
        primaryCo: board.co,
        r: route,
        boardStopId: board.stopId,
        boardIdx: board.idx,
        alightStopId: alight.stopId,
        alightIdx: alight.idx
      });
    }
    
    const virtualCandidate = { segs, isCircuitous: false, hasRedundantHop: false };
    // 自選行程：
    // 1) 若用戶揀咗「指定時間出發」，未來時段未必有實時 ETA，全程一律用
    //    寬鬆模式，靠 GTFS 估算是否有服務。
    // 2) 就算係「現在出發」，第一程之後嘅車程都應該用寬鬆模式（見
    //    treatSecondaryLegsRelaxed），確保用戶自己揀嘅組合唔會因為個別
    //    車程冇實時 ETA 就令成程「無法計算」。
    const plan = await evaluateCandidate(virtualCandidate, startTime, useSpecifiedTime, { treatSecondaryLegsRelaxed: true });
    
    if (!plan) {
      resultsWrap.innerHTML = `<div class="empty-state">無法計算該行程。可能是所選路線今日已過尾班車，或實時數據連接失敗</div>`;
      return;
    }
    
    renderResults([plan]);
    
  } catch (err) {
    statusLine.textContent = err.message || "計算行程出錯";
    statusLine.classList.add("err");
    resultsWrap.innerHTML = "";
  } finally {
    calcCustomBtn.disabled = false;
    calcCustomBtn.textContent = "計算行程時間";
  }
});
</script>
